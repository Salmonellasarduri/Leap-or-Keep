<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leap or Keep — One more leap.</title>
<style>
:root{
  --bg:#070b14; --bg2:#0d1426; --panel:#101a30; --panel2:#16233f;
  --line:#23365c; --txt:#dce6f5; --dim:#7d8fb0;
  --cyan:#39d0ff; --amber:#ffb347; --red:#ff5566; --green:#56e39f;
  --move:#2a4a7f; --fight:#7f2a3a; --gold:#ffd700;
  font-size:15px;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{background:radial-gradient(ellipse at 50% -20%, #0e1830 0%, var(--bg) 60%); color:var(--txt);
  font-family:"Yu Gothic UI","Hiragino Sans","Meiryo",system-ui,sans-serif; min-height:100vh;}
#app{max-width:1180px; margin:0 auto; padding:10px 14px;}
button{cursor:pointer; font-family:inherit; color:var(--txt); background:var(--panel2);
  border:1px solid var(--line); border-radius:8px; padding:8px 14px; font-size:0.95rem;}
button:hover{border-color:var(--cyan); background:#1b2c50;}
button:focus-visible{outline:2px solid var(--cyan); outline-offset:2px;}
button:disabled{opacity:.4; cursor:not-allowed;}
button.primary{background:#173a5e; border-color:var(--cyan); font-weight:700;}
button.danger{border-color:var(--red);}
h1,h2{letter-spacing:.06em;}
.muted{color:var(--dim); font-size:.85rem;}

/* icons */
.ic{width:15px; height:15px; vertical-align:-3px; stroke:currentColor; fill:none;
  stroke-width:2; stroke-linecap:round; stroke-linejoin:round; display:inline-block;}
.ic.big{width:20px; height:20px; vertical-align:-5px;}
.statline{display:flex; gap:5px; align-items:center; justify-content:center; flex-wrap:wrap; font-weight:700;}
.statline .num{font-size:.95em;}
/* カード可読性(Sol UI処方): アイコン→文字→数字の三重符号化。色はカテゴリ固定・数字は白のまま */
.st{display:inline-flex; align-items:baseline; gap:2px; white-space:nowrap;}
.st svg{width:12px; height:12px; align-self:center;}
.st i{font-style:normal; font-size:.66rem; font-weight:600; letter-spacing:.02em; opacity:.92;}
.st b{font-size:1.02rem; font-weight:800; color:var(--txt); line-height:1;}
.stag{display:inline-flex; align-items:baseline; gap:1px; font-size:.62rem; font-weight:600; padding:0 4px;
  border:1px solid; border-radius:4px; opacity:.85; line-height:1.5;}
.stag b{font-size:.72rem; color:var(--txt);}
.stsep{opacity:.3; font-weight:400;}
.stemoji{font-size:.85rem; color:var(--txt);}
.st-mv{color:#55d8ff;} .st-atk{color:#ff667a;} .st-rg{color:#f2c94c;} .st-def{color:#58d68d;} .st-sp{color:#b98cff;}
/* unit svg & idle animations */
.usvg{width:48px; height:48px; display:block;}
/* トンマナ規約(SPEC §10.7): 敵=赤 / ハザード=信号色(岩=灰・機雷=警告イエロー)+破線で二重符号化 / 戦利品=金 */
.unit.hazard{background:#1a1a22; border:2px dashed #8a8aa0;}
.unit.hazard.mine{background:#2a2208; border:2px dashed #ffb347;}
/* 重力渦: セル地形(中立=紫系。敵=赤/味方=緑/中立=灰・橙の色規約 §10.7) */
.cell.gravwell{background:radial-gradient(circle, #2a1838 0%, #150b22 70%); box-shadow:inset 0 0 14px #7b4dff44;}
.wellswirl{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:1.5rem; opacity:.8; animation:wellspin 5s linear infinite; pointer-events:none;}
@keyframes wellspin{from{transform:rotate(0deg);}to{transform:rotate(-360deg);}}
.unit .usvg .flame{animation:flame .5s infinite alternate; transform-origin:50% 80%;}
@keyframes flame{from{transform:scaleY(.55); opacity:.7;}to{transform:scaleY(1.15); opacity:1;}}
.unit .usvg .blink{animation:blink 1.6s infinite;}
@keyframes blink{0%,72%,100%{opacity:1}80%,92%{opacity:.15}}
.unit .usvg .tent{animation:sway 2.4s ease-in-out infinite alternate; transform-origin:50% 30%;}
.unit .usvg .tent.t2{animation-delay:.4s} .unit .usvg .tent.t3{animation-delay:.9s}
@keyframes sway{from{transform:rotate(-7deg)}to{transform:rotate(7deg)}}
.unit .usvg .eye{animation:eyepulse 2.2s ease-in-out infinite;}
@keyframes eyepulse{0%,100%{opacity:.65}50%{opacity:1}}
.unit.charging .usvg .eye{animation:eyecharge .5s infinite alternate; filter:drop-shadow(0 0 6px var(--amber));}
@keyframes eyecharge{from{opacity:.7}to{opacity:1}}
.unit.hitfx{animation:hitfx .4s;}
@keyframes hitfx{0%{filter:brightness(3) saturate(0);}100%{filter:none;}}
/* fx layer */
#fx{position:absolute; inset:0; pointer-events:none; z-index:30; overflow:visible;}
.fxfloat{position:absolute; font-weight:900; font-size:1rem; transform:translate(-50%,-50%);
  animation:fxfloat 1s ease-out forwards; text-shadow:0 0 6px #000, 0 0 2px #000; white-space:nowrap;}
.fxfloat.bad{color:var(--red);} .fxfloat.good{color:var(--green);} .fxfloat.dim{color:var(--dim);} .fxfloat.warn{color:var(--amber);}
@keyframes fxfloat{0%{opacity:0; margin-top:0;}15%{opacity:1;}100%{opacity:0; margin-top:-34px;}}
.fxp{position:absolute; width:7px; height:7px; border-radius:2px; background:var(--amber);
  transform:translate(-50%,-50%); animation:fxp .65s ease-out forwards;}
@keyframes fxp{0%{opacity:1; translate:0 0; scale:1;}100%{opacity:0; translate:var(--dx) var(--dy); scale:.3;}}
.fxring{position:absolute; width:18px; height:18px; border-radius:50%; border:3px solid var(--amber);
  transform:translate(-50%,-50%); animation:fxring .5s ease-out forwards; pointer-events:none;}
@keyframes fxring{0%{opacity:1; scale:.4; border-width:6px;}100%{opacity:0; scale:4.5; border-width:1px;}}
.fxstamp.big{font-size:2rem; color:#ffd700; text-shadow:0 0 12px #ffea00aa, 0 0 28px #ff5a0088, 2px 2px 0 #000;}
/* 爆発の白い芯: まず白黄で発光→橙→外周赤(発光の階層) */
.fxcore{position:absolute; width:64px; height:64px; border-radius:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:30;
  background:radial-gradient(circle, #fff 0 10%, #fff36a 18%, #ff9d00 42%, #ff3d00 72%, transparent 100%);
  mix-blend-mode:screen; animation:fxcore .26s cubic-bezier(.12,.9,.2,1) forwards;}
@keyframes fxcore{0%{opacity:1; scale:.35;}55%{opacity:1; scale:1.25;}100%{opacity:0; scale:.9;}}
/* 着弾ショックリング: 爆発の「瞬間」と「熱」を分離する1枚(Codex処方) */
.fxshock{position:absolute; width:36px; height:36px; border-radius:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:31;
  border:2px solid rgba(255,245,150,.85); filter:blur(1px);
  animation:fxshock .23s ease-out forwards; animation-delay:.07s; opacity:0;}
@keyframes fxshock{0%{opacity:1; scale:1;}100%{opacity:0; scale:3.1;}}
/* 誘爆ビーム: 爆心→巻き込み先へ走る光(なぜ連鎖したかを1コマで見せる) */
.fxbeam{position:absolute; height:5px; transform-origin:left center; pointer-events:none; z-index:25;}
.fxbeam::before{content:""; display:block; height:100%; border-radius:3px;
  background:linear-gradient(90deg,#7cfbff,#ffe600); box-shadow:0 0 10px #6fffd2, 0 0 22px #ffe600;
  transform-origin:left center; animation:fxbeam .2s ease-out forwards;}
@keyframes fxbeam{0%{transform:scaleX(0); opacity:1;}45%{transform:scaleX(1); opacity:1;}78%{opacity:.9;}100%{transform:scaleX(1); opacity:0;}}
/* 爆発の焦げ跡: 通った跡が1秒強残る(GIFの残光) */
.fxscorch{position:absolute; width:76px; height:76px; border-radius:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:5;
  background:radial-gradient(circle, rgba(255,120,0,.38) 0%, rgba(80,30,8,.45) 38%, transparent 72%);
  animation:fxscorch 1.3s ease-out forwards;}
@keyframes fxscorch{0%{opacity:.9;}100%{opacity:0;}}
/* 連鎖コンボカウンタ: 盤面上部中央で数字が育つ */
#fxchain{position:absolute; left:50%; top:12%; translate:-50% -50%; font-weight:900; color:#fff200; z-index:45; pointer-events:none; white-space:nowrap;
  opacity:.92; text-shadow:0 0 12px #ffea00, 0 0 28px #ff5a00, 2px 2px 0 #000;}
#fxchain.pop{animation:chainpop .18s cubic-bezier(.2,1.4,.4,1);}
@keyframes chainpop{0%{scale:1.35; opacity:1;}100%{scale:1; opacity:.92;}}
/* 爆発中はHUDを一瞬沈めて盤面を主役にする */
#side,#hand{transition:opacity .25s,filter .25s;}
#app.boomdim #side, #app.boomdim #hand{opacity:.55; filter:brightness(.85);}
.fxconf{position:absolute; width:8px; height:12px; border-radius:2px; animation:fxconf 1.4s ease-in forwards; pointer-events:none;}
@keyframes fxconf{0%{opacity:1; transform:translateY(0) rotate(0);}100%{opacity:.1; transform:translateY(480px) rotate(560deg);}}
/* ボス */
.bossbar{margin:2px auto 6px; max-width:520px; position:relative; height:20px; background:#1a0a10;
  border:1px solid var(--red); border-radius:10px; overflow:hidden;}
.bossbar .fill{height:100%; background:linear-gradient(90deg,#7a1525,#ff5566); transition:width .5s;}
.bossbar .nm{position:absolute; inset:0; text-align:center; font-size:.72rem; font-weight:800; color:#fff;
  text-shadow:0 0 4px #000; line-height:20px; letter-spacing:.1em;}
.warnband{background:repeating-linear-gradient(45deg,#3a0a12 0 18px,#1a0508 18px 36px); border:2px solid var(--red);
  border-radius:12px; padding:26px 30px; text-align:center; animation:warnflash 1s infinite;}
@keyframes warnflash{0%,100%{box-shadow:0 0 16px #ff556644;}50%{box-shadow:0 0 44px #ff5566aa;}}
.warnband h1{color:var(--red); letter-spacing:.4em; font-size:2rem; margin-bottom:8px;}
.cell.firing{animation:firing .45s;}
@keyframes firing{0%{background:#ff5566aa;}100%{}}
.fxstamp{position:absolute; transform:translate(-50%,-50%) rotate(-6deg); font-weight:900; font-size:1.35rem;
  color:var(--gold); text-shadow:0 0 10px #000, 2px 2px 0 #000; letter-spacing:.06em; white-space:nowrap;
  animation:fxstamp .9s ease-out forwards; z-index:40;}
@keyframes fxstamp{0%{opacity:0; scale:.65;}12%{opacity:1; scale:1.18;}24%{scale:1;}75%{opacity:1; translate:0 0;}100%{opacity:0; scale:1.02; translate:0 -28px;}}
#board.shake{animation:bshake .35s;}
@keyframes bshake{0%,100%{translate:0 0}20%{translate:5px -4px}40%{translate:-6px 3px}60%{translate:4px 4px}80%{translate:-3px -3px}}
/* 連鎖段数に応じたカメラパンチ(filterはpreserve-3dを壊すので使わない — L-030系) */
#board.shake2{animation:bshake2 .32s;}
@keyframes bshake2{0%,100%{translate:0 0; rotate:0deg;}15%{translate:8px -6px; rotate:-.4deg;}35%{translate:-9px 5px; rotate:.3deg;}55%{translate:7px 6px;}80%{translate:-5px -4px;}}
#board.shake3{animation:bshake3 .42s;}
@keyframes bshake3{0%,100%{translate:0 0; rotate:0deg;}12%{translate:11px -8px; rotate:-.6deg;}30%{translate:-12px 7px; rotate:.5deg;}50%{translate:10px 8px; rotate:-.3deg;}70%{translate:-8px -6px;}88%{translate:5px 4px;}}
.container-item{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:1.6rem; pointer-events:none; filter:drop-shadow(0 0 8px var(--gold)); animation:eyepulse 1.8s infinite;}
/* 方向選択矢印(トーラスで2方向が同マスに着くとき) */
.dirpick{position:absolute; inset:0; display:flex; align-items:center; justify-content:space-around; z-index:8;}
.dirpick button{padding:2px 8px; font-size:1.05rem; background:#0c1a30ee; border-color:var(--cyan);}
/* 3D俯瞰時: preserve-3dでは奥行きがz-indexに勝つ — 直立ユニットに覆われないよう矢印もビルボード化して前へ(ラム方向選択が押せないバグの修正) */
#board.tilt .dirpick{transform:rotateX(calc(var(--tilt) * -1)) translateZ(34px); transform-origin:50% 92%;}
/* tooltip */
#tt{position:fixed; z-index:200; display:none; max-width:300px; background:#0a1222f2;
  border:1px solid var(--cyan); border-radius:8px; padding:8px 10px; font-size:.78rem;
  line-height:1.55; color:var(--txt); pointer-events:none; box-shadow:0 4px 18px #000a;}
#tt b{color:var(--amber);} #tt .kill{color:var(--red); font-weight:800;}
[data-tt]{cursor:help;}
button[data-tt],.half[data-tt],.unit[data-tt],.cell[data-tt],.pick[data-tt]{cursor:pointer;}

/* header */
#hud{display:flex; align-items:center; gap:18px; padding:8px 4px; flex-wrap:wrap;}
.reltag{display:inline-block; font-size:.62rem; font-weight:700; padding:1px 7px; border:1px solid var(--cyan);
  border-radius:4px; color:var(--cyan); vertical-align:middle; letter-spacing:.1em;}
.quitlink{margin-left:auto; padding:2px 10px; font-size:.9rem; opacity:.55; border-color:var(--line);}
.quitlink:hover{opacity:1; border-color:var(--red); color:var(--red);}
#quitconfirm{position:fixed; inset:0; z-index:65; display:flex; align-items:center; justify-content:center;
  background:#000a; backdrop-filter:blur(2px);}
/* 姿勢制御(restshift): 盤面を見ながら選べるよう、暗幕なしで下部にドッキング(FB: ボードが見えず方向を選べない) */
#overlay.ov-side{background:transparent; backdrop-filter:none; pointer-events:none; align-items:flex-end; justify-content:center;}
#overlay.ov-side .modal{pointer-events:auto; margin-bottom:6vh; background:rgba(8,16,30,.94); box-shadow:0 8px 30px #000c;}
#hud .zone{font-weight:800; color:var(--amber); font-size:1.05rem; white-space:nowrap;}
.lifebar{display:flex; gap:3px; align-items:center;}
.lifebar .seg{width:14px; height:20px; border-radius:3px; border:1px solid var(--line);}
.seg.hand{background:var(--cyan);} .seg.discard{background:#1f5e74;}
.seg.reserve{background:#27406e;} .seg.pool{background:#27406e;}
.seg.lost{background:#1a1020; border-color:#3a2030; position:relative;}
.seg.lost::after{content:"×"; color:#5a2a3a; position:absolute; inset:0; text-align:center; font-size:11px; line-height:18px;}
#cargo{display:flex; gap:6px; align-items:center;}
.cargochip{background:var(--panel); border:1px solid var(--gold); color:var(--gold);
  border-radius:6px; padding:2px 8px; font-size:.8rem;}

/* layout */
#battle{display:grid; grid-template-columns: 1fr 300px; gap:14px; align-items:start;}
#boardwrap{display:flex; flex-direction:column; align-items:center; gap:8px;}
:root{--cell:92px; --tilt:34deg;}
/* ===== 強調の文法(SPEC §10.5) =====
   .cue=今クリックすべき一次対象(明滅) / .sub-cue=任意の二次対象(静かな点線) /
   ⛔=不可+理由 / 固定アウトライン=選択済み */
@keyframes cuepulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.45)}}
.cue{animation:cuepulse 1.3s ease-in-out infinite;}
/* セルはfilter禁止(preserve-3dが死んで直立ユニットが潰れる) — 背景/枠線で明滅 */
@keyframes cellcue{0%,100%{background-color:#10324a; border-color:#39d0ff88;}50%{background-color:#17486e; border-color:var(--cyan);}}
.cell.cue{animation:cellcue 1.3s ease-in-out infinite;}
@keyframes subpulse{0%,100%{outline-color:#56e39f33}50%{outline-color:#56e39faa}}
.sub-cue{outline:2px dashed #56e39f55; outline-offset:2px; animation:subpulse 2.4s infinite;}
@keyframes softcue{0%,100%{box-shadow:inset 0 0 0 0 transparent}50%{box-shadow:inset 0 0 12px #39d0ff33}}
.cue-soft{animation:softcue 2s ease-in-out infinite;}
/* 星空(2層パララックス) */
#vig{position:fixed; inset:0; pointer-events:none; z-index:60;
  background:radial-gradient(ellipse at 50% 42%, transparent 55%, #00000055 100%);}
#stars1,#stars2{position:fixed; inset:-50% 0 0 0; pointer-events:none; z-index:-3;}
/* 大判アート層(art/が無ければ透明のまま=劣化動作) */
#zonebg{position:fixed; inset:0; pointer-events:none; z-index:-2;
  background-size:cover; background-position:center; opacity:0; transition:opacity 1.2s;
  filter:brightness(.45) saturate(.9);}
#zonebg.on{opacity:.66;}
/* 卓プレート(サルベージ船オペレーター席)。art/deskbg.webp が無ければ透明のまま */
#deskbg{position:fixed; inset:0; pointer-events:none; z-index:-2;
  background-size:cover; background-position:center bottom; opacity:0; transition:opacity 1.2s;}
#deskbg.on{opacity:1;}
/* 卓が出ている間: ゾーン背景は上部「窓外の光」へ退き、下部は卓に譲る */
#deskbg.on ~ #zonebg{-webkit-mask-image:linear-gradient(180deg,#000 0%,#000 28%,transparent 58%);
  mask-image:linear-gradient(180deg,#000 0%,#000 28%,transparent 58%);}
#deskbg.on ~ #zonebg.on{opacity:.5;}
/* 卓が出ている間: ビネットを深めて光だまりを強調 */
#deskbg.on ~ #vig{background:radial-gradient(ellipse at 50% 42%, transparent 46%, #00000088 100%);}
/* 手札域の局所スクリーン(Sol指摘#1): 卓の前縁・黄色光とカードの競合を鎮める */
#deskbg.on::after{content:""; position:absolute; inset:55% 0 0; pointer-events:none;
  background:linear-gradient(to bottom, transparent 0%, rgba(2,7,15,.28) 24%, rgba(2,7,15,.68) 100%);}
/* 盤面の接地影(Sol指摘#2): 左上ランプに合わせ右下へ落とす */
#deskbg.on ~ #app #board{box-shadow:0 0 26px hsl(var(--zh,215) 70% 50% / .14),
  14px 20px 22px #000c, 4px 6px 8px #000a;}
/* 操作説明のコントラスト固定(Sol指摘#3): 背景に依存しない暗色ピル */
#deskbg.on ~ #app #prompt{display:table; margin-left:auto; margin-right:auto;
  padding:6px 12px; border-radius:8px; background:rgba(3,9,18,.66);
  box-shadow:0 4px 12px rgba(0,0,0,.35); text-shadow:0 1px 2px rgba(0,0,0,.9);}
#titlehero{position:fixed; inset:0; pointer-events:none; z-index:-2;
  background-size:cover; background-position:center 30%; opacity:0; transition:opacity 1s;}
#titlehero.on{opacity:.7; animation:kenburns 36s ease-in-out infinite alternate;}
@keyframes kenburns{from{transform:scale(1);}to{transform:scale(1.07);}}
#titlehero::after{content:""; position:absolute; inset:0;
  background:linear-gradient(180deg,#070b1488 0%,transparent 35%,#070b14ee 88%);}
.relicart{width:200px; aspect-ratio:1; object-fit:cover; border-radius:10px; float:right;
  margin:0 0 10px 14px; border:1px solid var(--gold); box-shadow:0 0 18px #ffd70033;}
.shipart{width:100%; height:110px; object-fit:cover; border-radius:8px; margin-bottom:8px;
  border:1px solid var(--line);}
#stars1{background-image:radial-gradient(1px 1px at 22% 31%, #ffffff99, transparent),
  radial-gradient(1px 1px at 64% 12%, #aaccff88, transparent),
  radial-gradient(1.5px 1.5px at 83% 57%, #ffffffaa, transparent),
  radial-gradient(1px 1px at 41% 78%, #ffddaa77, transparent);
  background-size:340px 340px; animation:stardrift 120s linear infinite;}
#stars2{background-image:radial-gradient(1px 1px at 10% 60%, #ffffff55, transparent),
  radial-gradient(1px 1px at 55% 40%, #88aaff55, transparent),
  radial-gradient(1px 1px at 90% 85%, #ffffff44, transparent);
  background-size:220px 220px; animation:stardrift 60s linear infinite;}
@keyframes stardrift{from{transform:translateY(0)}to{transform:translateY(340px)}}
#boardwrap{perspective:1050px;}
#board{display:grid; gap:5px; background:var(--bg2); padding:10px; border-radius:14px;
  border:1px solid hsl(var(--zh,215) 50% 38%); position:relative;
  box-shadow:0 0 26px hsl(var(--zh,215) 70% 50% / .14);}
/* ===== 俯瞰ジオラマモード =====
   盤は倒し、ユニットは立てる(ロックマンエグゼ式ビルボード)。タイルに厚み、足元に影、奥に霞 */
#board.tilt{transform:rotateX(var(--tilt)); transform-style:preserve-3d; margin-top:-14px;}
#board.tilt .cell{transform-style:preserve-3d; transition:transform .15s;
  background:linear-gradient(180deg,#111d33,#0b1322 60%); /* 上面に光(エグゼ式の厚み表現) */
  box-shadow:0 3px 0 -1px #0a1322, 0 7px 0 -1px #04080f, 0 10px 12px #000b;}
#board.tilt .cell.sel-ok{transform:translateZ(10px);}
#board.tilt .cell.threat{background:linear-gradient(180deg,#451526,#300d1c 60%);}
#board.tilt .uinner{transform:rotateX(calc(var(--tilt) * -1)); transform-origin:50% 92%;}
#board.tilt::after{content:""; position:absolute; inset:0; border-radius:14px; pointer-events:none;
  background:linear-gradient(180deg,#0004,transparent 26%,transparent 80%,#0004);}
#board.tilt .fxfloat,#board.tilt .fxstamp{transform:translate(-50%,-50%) rotateX(calc(var(--tilt) * -1));}
#board.tilt #fxchain{transform:rotateX(calc(var(--tilt) * -1));}
.uinner{width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; position:relative;}
.unit::before{content:""; position:absolute; bottom:1px; left:14%; width:72%; height:11px; border-radius:50%;
  background:radial-gradient(ellipse, #000b 0%, transparent 70%); pointer-events:none;}
.cell{width:var(--cell); height:var(--cell); background:#0b1322; border:1px solid #1b2a4a; border-radius:10px;
  position:relative; display:flex; align-items:center; justify-content:center; transition:background .15s, box-shadow .15s;}
.cell.sel-ok{background:#10324a; border-color:var(--cyan); cursor:pointer; box-shadow:inset 0 0 14px #39d0ff33;}
.cell.sel-ok:hover{background:#15446a;}
.cell.threat{background:#3a1020; border-color:var(--red);}
.cell.charge{background:#3a2a10; border-color:var(--amber);}
.cell.intent-move{outline:2px dashed #6a7da8; outline-offset:-4px;}
.cell.hl{box-shadow:inset 0 0 0 3px var(--amber); }
.cell.blockedhint{background:#16101a; cursor:help;}
.cell.blockedhint::after{content:"⛔"; position:absolute; top:4px; left:6px; opacity:.5; font-size:.8rem;}
.dmgnum{position:absolute; top:3px; right:5px; color:var(--red); font-weight:900; font-size:.85rem; text-shadow:0 0 4px #000;}
.cell.charge .dmgnum{color:var(--amber);}
.unit{width:78px; height:78px; border-radius:12px; position:relative; font-size:1.7rem; cursor:default;}
.unit .nm{font-size:.6rem; color:var(--dim); line-height:1;}
.unit.player{background:#10243f; border:2px solid var(--cyan);}
.unit.enemy{background:#2a1018; border:2px solid var(--red);}
.unit.pick{cursor:pointer; box-shadow:0 0 12px var(--cyan);}
.unit.target{cursor:pointer; box-shadow:0 0 12px var(--red);}
.unit.acting{animation:acting .7s infinite; z-index:5;}
@keyframes acting{0%,100%{box-shadow:0 0 6px var(--red);}50%{box-shadow:0 0 26px var(--red);}}
.unit.hl{box-shadow:0 0 0 3px var(--amber);}
.unit.actorsel{outline:2px solid var(--green); outline-offset:2px;}
.unit.actorsel::after{content:"操縦"; position:absolute; bottom:-10px; left:50%; transform:translateX(-50%);
  font-size:.56rem; color:var(--green); background:#0c1526; padding:0 4px; border-radius:3px; border:1px solid var(--green);}
.hp{display:flex; gap:2px;}
.hp i{width:11px; height:11px; border-radius:2px; background:var(--green); display:inline-block; box-shadow:0 0 3px #0008;}
.bestburst{color:var(--gold); font-weight:900; letter-spacing:.1em; animation:bestburst 1s ease-out, flash 1.4s 1s infinite;}
@keyframes bestburst{0%{transform:scale(.3); opacity:0;}55%{transform:scale(1.35);}100%{transform:scale(1); opacity:1;}}
.hp i.off{background:#26344f;}
.hp i.sh{background:var(--cyan);}
.drift{position:absolute; top:-10px; right:-10px; min-width:24px; height:24px; border-radius:12px;
  background:var(--amber); border:1px solid #fff3; color:#231a05; font-size:15px; font-weight:900;
  display:flex; align-items:center; justify-content:center; box-shadow:0 0 8px #ffb34788; padding:0 3px;}
.badgeN{position:absolute; top:-9px; left:-9px; width:22px; height:22px; border-radius:50%;
  background:#2a1018; border:1px solid var(--red); color:var(--red); font-size:12px; font-weight:800;
  display:flex; align-items:center; justify-content:center;}
/* ghosts */
.dghost{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:1.5rem; opacity:.38; pointer-events:none; filter:saturate(.6);}
.dghost .darr{position:absolute; top:4px; left:6px; font-style:normal; font-size:.9rem; color:var(--amber); opacity:1;}
.dghost.boom{opacity:.8; font-size:1.2rem;}
.mghost{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:1.4rem; opacity:.34; pointer-events:none;}
.mghost .mN{position:absolute; bottom:4px; right:6px; font-size:.72rem; color:#aab8d8; opacity:1; font-weight:700;}
.pvghost{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:1.6rem; opacity:.6; pointer-events:none; filter:drop-shadow(0 0 6px var(--cyan));}
.pvghost2{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:1.3rem; opacity:.35; pointer-events:none;}
.pvghost2 i{font-style:normal; position:absolute; top:4px; left:6px; color:var(--amber); font-size:.9rem; opacity:1;}
.pvbrake{position:absolute; bottom:4px; left:6px; font-size:.66rem; color:var(--cyan);
  border:1px solid var(--cyan); border-radius:4px; padding:0 4px; pointer-events:none; opacity:.9;}

/* hand */
#hand{display:flex; gap:10px; justify-content:center; padding:10px 0 4px; flex-wrap:wrap;}
.card{width:148px; border:1px solid var(--line); border-radius:10px; background:var(--panel);
  overflow:hidden; transition:transform .12s, box-shadow .12s; user-select:none;}
.card .ttl{padding:5px 8px; font-size:.78rem; font-weight:700; background:#0c1526; text-align:center;
  border-bottom:1px solid var(--line); min-height:2.2em; display:flex; align-items:center; justify-content:center;}
.card .half{padding:7px 8px; font-size:.74rem; min-height:3.4em; cursor:pointer; line-height:1.35;}
.card .half.top{background:linear-gradient(180deg,#16294a,#101d36); border-bottom:1px dashed #2a3c63;}
.card .half.bot{background:linear-gradient(180deg,#33141d,#23101a);}
.card .half:hover{filter:brightness(1.35);}
.card .half.chosen{outline:2px solid var(--cyan); outline-offset:-2px; filter:brightness(1.3);}
.card .half.faded{opacity:.35;}
.card.locked{opacity:.45;}
.card.relic-card .ttl{color:var(--gold);}
.card.selcard{outline:2px solid var(--cyan); box-shadow:0 0 14px #39d0ff44;}
.card .selmark{position:absolute; margin-top:-2px; color:var(--cyan); font-weight:900;}
.tag{font-size:.62rem; color:var(--dim);}

/* prompt bar / log */
#prompt{margin-top:6px; text-align:center; min-height:2.4em; color:var(--amber); font-weight:600;}
#prompt .sub{color:var(--dim); font-weight:400; font-size:.82rem;}
#side{display:flex; flex-direction:column; gap:10px;}
.panel{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:10px 12px;}
.panel h3{font-size:.85rem; color:var(--cyan); margin-bottom:6px; letter-spacing:.08em;}
#log{height:190px; overflow-y:auto; font-size:.76rem; line-height:1.55; color:#aebcd8;}
#log .warn{color:var(--amber);} #log .bad{color:var(--red);} #log .good{color:var(--green);}
.intent{font-size:.76rem; padding:6px 7px; border:1px solid var(--line); border-radius:8px; margin-bottom:6px;
  background:var(--bg2); line-height:1.5;}
.intent:hover{border-color:var(--amber);}
.intent b{color:var(--txt);}
.intent .what{color:var(--dim);}
.intent .atk{color:var(--red);} .intent .chg{color:var(--amber);}
.intent.dead{opacity:.35; text-decoration:line-through;}
.legend{font-size:.72rem; color:var(--dim); line-height:1.7;}
.legend .sw{display:inline-block; width:11px; height:11px; border-radius:3px; vertical-align:-1px; margin-right:3px;}
.banner{color:var(--cyan); font-size:.82rem; text-align:center; min-height:1.2em;}

/* overlay/modal */
#overlay{position:fixed; inset:0; background:#04060ccc; display:flex; align-items:center;
  justify-content:center; z-index:50; backdrop-filter:blur(2px);}
.modal{background:var(--panel); border:1px solid var(--cyan); border-radius:14px; padding:22px 26px;
  max-width:780px; width:min(92vw,780px); max-height:88vh; overflow-y:auto; box-shadow:0 0 40px #39d0ff22;}
.modal h2{color:var(--amber); margin-bottom:10px; font-size:1.15rem;}
.modal .opts{display:flex; gap:12px; margin-top:14px; flex-wrap:wrap;}
.cardpick{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;}
.cardpick .pick{border:1px solid var(--line); border-radius:8px; padding:6px 10px; cursor:pointer;
  background:var(--panel2); font-size:.8rem;}
.cardpick .pick:hover{border-color:var(--red); background:#3a1525;}
.cardpick .pick.on{border-color:var(--cyan); background:#143052;}
.scale{display:grid; grid-template-columns:1fr 1fr; gap:18px; margin:14px 0; position:relative; z-index:1;}
.scale .pan{background:var(--bg2); border-radius:12px; padding:16px;}
.scale .pan h4{font-size:1.02rem; margin-bottom:10px; letter-spacing:.06em;}
.scale .keep{border:1px solid #56e39f66; box-shadow:inset 0 0 30px #56e39f12, 0 0 18px #56e39f22;}
.scale .leap{border:1px solid #ff556677; box-shadow:inset 0 0 30px #ff556614, 0 0 18px #ff556633;}
.scale .keep h4{color:var(--green);} .scale .leap h4{color:var(--red);}
.scale li{font-size:.84rem; margin-left:1.2em; margin-bottom:5px;}
.lkwm{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:5.2rem; font-weight:900; color:#ffffff07; letter-spacing:.2em; pointer-events:none; z-index:0; white-space:nowrap;}
.lkradio{color:var(--cyan); text-align:center; font-style:italic; margin:6px 0 2px;}
.lkradio::before{content:"📻 "; font-style:normal;}
.lkbtn{font-size:1.08rem; padding:12px 30px; font-weight:800;}
.bigtitle{font-size:2.6rem; font-weight:900; letter-spacing:.12em; color:var(--cyan);
  text-shadow:0 0 24px #39d0ff55; text-align:center;}
.routebox{display:flex; gap:16px; margin-top:14px;}
.routebox .rt{flex:1; background:var(--bg2); border:1px solid var(--line); border-radius:12px;
  padding:14px; cursor:pointer; transition:border-color .15s;}
.routebox .rt:hover{border-color:var(--cyan);}
.routebox .rt.danger:hover{border-color:var(--red);}
.routebox h4{margin-bottom:6px;}
.flash{animation:flash 1.2s infinite;}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.45}}
.relicbox{border:1px solid var(--gold); border-radius:10px; padding:12px; background:#1a1608; margin:10px 0;}
.relicbox b{color:var(--gold);}
table.sum{width:100%; border-collapse:collapse; font-size:.85rem; margin:8px 0;}
table.sum td{border-bottom:1px solid var(--line); padding:5px 6px;}
.hintlist{font-size:.92rem; line-height:2.0;}
.hintlist b{color:var(--cyan);}

/* loadout */
#loadgrid{display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;}
#loadgrid .card{cursor:pointer; position:relative;}
#loadgrid .card .half{cursor:help;}
#loadgrid .card{padding-bottom:18px;}
#loadgrid .card.selcard::after{content:"✓ 持っていく"; position:absolute; margin-top:2px;
  left:50%; transform:translateX(-50%);
  color:var(--cyan); font-size:.68rem; font-weight:800; background:#0c1526dd; padding:1px 7px; border-radius:4px;}

@media (max-width:980px){
  #battle{grid-template-columns:1fr;}
  #side{flex-direction:row; flex-wrap:wrap;}
  #side .panel{flex:1; min-width:240px;}
  #log{height:140px;}
}
@media (max-width:620px){
  .stsep{display:none;} /* モバイルは攻撃/射程が2行折返し(Sol処方) — 行末の区切り棒は不要 */
  /* 盤面はビューポートに必ず収める(5セル+ギャップ。公開時のスマホ対応) */
  :root{--cell:min(72px, calc((100vw - 84px) / 5));}
  .unit{width:calc(var(--cell) - 12px); height:calc(var(--cell) - 12px); font-size:1.1rem;}
  .usvg{width:60%;height:60%;}
  #side{flex-direction:column;}
  .card{width:104px;}
  .card .half{font-size:.62rem; min-height:2.4em; padding:7px 4px;} /* 左右-4px: 効果欄の文字領域を確保(Sol最終研磨) */
}
.card.mini{width:118px;}
.card.mini .ttl{font-size:.7rem; min-height:2em;}
.card.mini .half{min-height:2.6em; font-size:.68rem; padding:5px 6px;}
.card.mini.pickable{cursor:pointer;}
.card.mini.pickable:hover{outline:2px solid var(--red); transform:translateY(-3px);}
.half.lostact{background:linear-gradient(180deg,#3a1040,#240a2e)!important;}
.pickgrid{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; justify-content:center;}

/* ===== Phase 2: ホロ盤面(body.holoの間だけ発動。holo.jsが読めない環境ではこのブロックは一切効かない=劣化フォールバック) =====
   方針: DOM盤面は透明ヒット面として温存(クリック/ツールチップ/日本語ラベルは全てDOMのまま)。
   3D描画は #holo-canvas(z:0)が担い、DOM側は z:1 以上で常に上(R3)。 */
body.holo #boardwrap{position:relative;}
body.holo #boardwrap>*{position:relative; z-index:1;}
body.holo #holo-canvas{position:absolute; z-index:0; pointer-events:none;}
/* 盤・セルの視覚を3Dへ委譲(R6: 温存対象は後段で再宣言して勝たせる) */
body.holo #board{background:transparent; border-color:transparent; box-shadow:none!important;}
body.holo #board.tilt::after{display:none;}
body.holo #board .cell, body.holo #board .cell:hover,
body.holo #board.tilt .cell{background:transparent!important; box-shadow:none!important; border-color:#39d0ff17;}
body.holo #board .cell.cue{animation:none;}
body.holo #board .cell.firing{animation:none;}
body.holo #board .cell.hl{box-shadow:inset 0 0 0 3px var(--amber)!important;} /* 温存: 意図リストhover強調 */
/* コマの視覚を3Dへ委譲(名前/HP/ドリフト矢印/行動順バッジはDOM温存) */
body.holo .unit{background:transparent; border-color:transparent;}
body.holo .unit::before{display:none;}
body.holo .unit .usvg{display:none;}
body.holo .unit .uemoji{display:none;}
body.holo .uinner{justify-content:flex-end; padding-bottom:3px;} /* R11: ラベル下辺寄せで奥コマとの食い込みを抑える */
/* スキャンライン: 盤と同じCSS変換配下に貼る=ホロ平面だけ走査(R9、filter不使用でL-030非抵触) */
body.holo #board::before{content:""; position:absolute; inset:0; z-index:2; pointer-events:none; border-radius:14px;
  background:repeating-linear-gradient(180deg, transparent 0 3px, #6fe7ff09 3px 4px);}
/* shakeミラー(R5): canvasにも同じ揺れクラス(transform-originはholo.jsが盤中心に設定) */
body.holo #holo-canvas.shake{animation:bshake .35s;}
body.holo #holo-canvas.shake2{animation:bshake2 .32s;}
body.holo #holo-canvas.shake3{animation:bshake3 .42s;}
/* ===== Phase 3a: 背景シーン(2枚分割の全画面canvas — 盤ホロとは独立、部屋が生きる層) ===== */
#holo-bg{position:fixed; left:0; top:0; width:100vw; height:100vh; height:100lvh; z-index:-1;
  pointer-events:none; opacity:0; transition:opacity 1.2s;}
body.holo3 #holo-bg{opacity:1;}
body.holo3 #deskbg, body.holo3 #zonebg{visibility:hidden;} /* .onクラスは残す(~連動CSSのため)。描画だけ3D側に委譲 */
#holo-curtain{display:none; position:fixed; left:0; right:0; top:55%; bottom:0; z-index:-1; pointer-events:none;
  background:linear-gradient(to bottom, transparent 0%, rgba(2,7,15,.28) 24%, rgba(2,7,15,.68) 100%);} /* #deskbg.on::afterの代替(手札域の暗幕) */
body.holo3 #holo-curtain{display:block;}
/* ===== Phase 3.5: 視線アンカー(Sol処方: 全画面ズームでなく「盤列と背景の相対運動」。盤canvasは#boardwrap内=DOM/3D整合が自動維持) ===== */
body.holo3 #boardwrap{transition:transform .55s cubic-bezier(.22,.75,.18,1);}
body.holo3.gaze-lean #boardwrap{transform:scale(1.016) translateY(4px);} /* 敵の手番: 盤へ身を乗り出す(背景は3D側で後退・減光) */
body.holo3.gaze-breath #boardwrap{animation:gazebreath .78s cubic-bezier(.22,.75,.18,1) 1 forwards;} /* 慣性解決: 短い呼吸1回 */
@keyframes gazebreath{0%{transform:none}45%{transform:scale(1.012)}100%{transform:scale(1.006)}}
@media (prefers-reduced-motion: reduce){
  body.holo3 #boardwrap{transition:none;}
  body.holo3.gaze-lean #boardwrap, body.holo3.gaze-breath #boardwrap{transform:none; animation:none;}
}

/* ===== Phase 3.5: 道具UI化(Sol処方 — body.holo3時のみ。2Dフォールバックは従来のWeb UIのまま) ===== */
/* A. 右パネル群=「3枚のパネル」→「1台の投影端末」: 外周フレーム1つ+内部は細い区切り+部分透過 */
body.holo3 #battle{perspective:1300px;}
body.holo3 #side{gap:2px; position:relative; padding:10px 12px 16px;
  border:1px solid rgba(73,213,255,.32); border-radius:10px;
  background:linear-gradient(180deg, rgba(5,17,35,.78), rgba(5,17,35,.58));
  backdrop-filter:blur(3px) saturate(.85); -webkit-backdrop-filter:blur(3px) saturate(.85);
  transform:rotateY(-3deg) rotateX(.5deg); transform-origin:0% 40%;}
body.holo3 #side .panel{background:transparent; border:none; border-radius:0; padding:9px 2px;}
body.holo3 #side .panel+.panel{border-top:1px solid rgba(73,213,255,.14);}
body.holo3 #side h3{letter-spacing:.12em;}
body.holo3 #side::before{content:""; position:absolute; inset:0; pointer-events:none; border-radius:10px; opacity:.6;
  background: /* コーナーブラケット(4隅×2辺、色は--bracket-cでモード切替 — P4)+微走査線 */
    linear-gradient(var(--bracket-c,#49d5ff),var(--bracket-c,#49d5ff)) left 0 top 0/16px 2px no-repeat,
    linear-gradient(var(--bracket-c,#49d5ff),var(--bracket-c,#49d5ff)) left 0 top 0/2px 16px no-repeat,
    linear-gradient(var(--bracket-c,#49d5ff),var(--bracket-c,#49d5ff)) right 0 top 0/16px 2px no-repeat,
    linear-gradient(var(--bracket-c,#49d5ff),var(--bracket-c,#49d5ff)) right 0 top 0/2px 16px no-repeat,
    linear-gradient(var(--bracket-c,#49d5ff),var(--bracket-c,#49d5ff)) left 0 bottom 0/16px 2px no-repeat,
    linear-gradient(var(--bracket-c,#49d5ff),var(--bracket-c,#49d5ff)) left 0 bottom 0/2px 16px no-repeat,
    linear-gradient(var(--bracket-c,#49d5ff),var(--bracket-c,#49d5ff)) right 0 bottom 0/16px 2px no-repeat,
    linear-gradient(var(--bracket-c,#49d5ff),var(--bracket-c,#49d5ff)) right 0 bottom 0/2px 16px no-repeat,
    repeating-linear-gradient(180deg, transparent 0 4px, rgba(111,231,255,.03) 4px 5px);}
body.holo3 #side::after{content:""; position:absolute; left:17%; right:17%; bottom:-3px; height:2px; border-radius:2px;
  background:rgba(40,210,255,.85);
  box-shadow:0 0 6px rgba(40,210,255,.8), 0 0 18px rgba(40,210,255,.28), 0 12px 18px rgba(30,190,220,.12);} /* 投影エミッタ線+卓への光 */
body.holo3 .intent{border:none; border-left:2px solid rgba(73,213,255,.18); border-radius:0; background:rgba(73,213,255,.04);}
body.holo3 #log{height:auto; min-height:40px; max-height:150px; -webkit-mask-image:linear-gradient(180deg,#000 76%,transparent); mask-image:linear-gradient(180deg,#000 76%,transparent);} /* 内容量に追従(空白率20%以下 — Sol R2)。「大きな空のtextarea」を残さない */

/* B. 手札=「カードリスト」→「1つの物理トレイ」: 重なり+Y弧+共有接触影(--fan/--fyはrenderBattleが枚数から算出) */
body.holo3 #hand{flex-wrap:nowrap; position:relative; padding:16px 0 10px;}
body.holo3 #hand::after{content:""; position:absolute; left:5%; right:5%; bottom:0; height:18px; pointer-events:none; z-index:0;
  background:radial-gradient(ellipse 60% 100% at 50% 50%, rgba(0,0,0,.34), transparent 72%);} /* トレイの共有接触影 */
body.holo3 #hand .card{position:relative; z-index:1; margin:0 -9px;
  transform:rotate(var(--fan,0deg)) translateY(var(--fy,0px)); transform-origin:50% 115%;
  transition:transform .17s cubic-bezier(.2,.8,.2,1), box-shadow .17s, opacity .17s;
  box-shadow:0 8px 10px rgba(0,0,0,.38), 0 18px 26px rgba(0,0,0,.22);}
body.holo3 #hand .card:hover{transform:rotate(calc(var(--fan,0deg)*.5)) translateY(calc(var(--fy,0px) - 12px)) scale(1.025); z-index:5;}
body.holo3 #hand .card.locked{opacity:.55; filter:saturate(.65);} /* Sol: 「無効状態」に見えない程度に(暗すぎ改善) */
body.holo3 .card .half.faded{opacity:.5;}
@media (max-width:980px){
  body.holo3 #side{transform:none;} /* 横積みレイアウトでは傾けない */
}
@media (max-width:620px){
  body.holo3 #hand{overflow-x:auto; justify-content:flex-start; scroll-snap-type:x proximity; padding-bottom:14px;}
  body.holo3 #hand .card{transform:none; margin:0 -4px; scroll-snap-align:center;}
  body.holo3 #hand .card:hover{transform:translateY(-6px);}
}

/* ===== Phase 4: 斜め3D UI言語(AK/EF/鳴潮研究 → docs/design-ui-slant.md)+コックピット感 ===== */
:root{
  --lk-skew:-8deg;   /* 2D浅斜め(チップ・ゲージセグメント) — AK±10°文法の可読安全側 */
  --lk-cut:10px;     /* コーナーカット寸法(全要素共通・1要素1隅) */
  --lk-tick:6px;     /* 計器プレート四隅ティック */
  --lk-teal:#2E8E91; --lk-cyan:#73D8D5; --lk-amber:#E7A85B;
}
@media (max-width:620px){ :root{ --lk-cut:7px; } }
/* P1: 上部HUD=計器プレート化(レイアウト不変ポリッシュ) */
body.holo3 #hud{position:relative; padding:8px 14px; border:1px solid rgba(115,216,213,.26);
  clip-path:polygon(0 0, calc(100% - var(--lk-cut)) 0, 100% var(--lk-cut), 100% 100%, 0 100%);
  background:linear-gradient(180deg, rgba(5,17,35,.66), rgba(5,17,35,.44));}
body.holo3 #hud::before{content:""; position:absolute; inset:0; pointer-events:none; opacity:.5;
  background:
    linear-gradient(var(--bracket-c,#49d5ff),var(--bracket-c,#49d5ff)) left 0 top 0/var(--lk-tick) 2px no-repeat,
    linear-gradient(var(--bracket-c,#49d5ff),var(--bracket-c,#49d5ff)) left 0 top 0/2px var(--lk-tick) no-repeat,
    linear-gradient(var(--bracket-c,#49d5ff),var(--bracket-c,#49d5ff)) left 0 bottom 0/var(--lk-tick) 2px no-repeat,
    linear-gradient(var(--bracket-c,#49d5ff),var(--bracket-c,#49d5ff)) left 0 bottom 0/2px var(--lk-tick) no-repeat,
    linear-gradient(var(--bracket-c,#49d5ff),var(--bracket-c,#49d5ff)) right 0 bottom 0/var(--lk-tick) 2px no-repeat,
    linear-gradient(var(--bracket-c,#49d5ff),var(--bracket-c,#49d5ff)) right 0 bottom 0/2px var(--lk-tick) no-repeat;}
body.holo3 #hud span{font-variant-numeric:tabular-nums;}
body.holo3 .lifebar .seg{transform:skewX(var(--lk-skew)); border-radius:1px;} /* 寿命ゲージ=平行四辺形セグメント(斜め言語の起点) */
/* P2: 行動チップ=平行四辺形(視覚箱だけ::beforeで傾け、テキストとヒット領域は水平のまま) */
body.holo3 #chips button{position:relative; background:transparent; border:none; border-radius:0; z-index:0; margin:0 3px;}
body.holo3 #chips button::before{content:""; position:absolute; inset:0; z-index:-1; transform:skewX(var(--lk-skew));
  background:var(--panel2); border:1px solid rgba(115,216,213,.35);}
body.holo3 #chips button.primary::before{background:#16335a; border-color:var(--lk-cyan);}
body.holo3 #chips button.danger::before{border-color:var(--red);}
body.holo3 #chips button:hover::before{filter:none; background:#1b3f6e;}
/* 特権形状(45°系は1画面1個): ⚔敵ターンへ=六角プレート+パルス */
body.holo3 #chips button.primary.cue{padding:8px 24px;}
body.holo3 #chips button.primary.cue::before{transform:none;
  clip-path:polygon(12px 0,calc(100% - 12px) 0,100% 50%,calc(100% - 12px) 100%,12px 100%,0 50%);
  background:#3a2c12; border:none; box-shadow:inset 0 0 0 1px var(--lk-amber);}
body.holo3 #chips button.primary.cue::after{content:""; position:absolute; inset:-4px; pointer-events:none;
  clip-path:polygon(12px 0,calc(100% - 12px) 0,100% 50%,calc(100% - 12px) 100%,12px 100%,0 50%);
  border:1px solid var(--lk-amber); animation:chippulse .9s ease-out infinite;}
@keyframes chippulse{from{transform:scale(1); opacity:.9} to{transform:scale(1.22); opacity:0}}
body.holo3 #chips button.primary.cue{animation:none;} /* 旧cuepulse(filter明滅)と二重発火させない */
/* P3: #promptピル=ダッシュ導線付き計器ピル(EF署名CTA文法) */
body.holo3 #deskbg.on ~ #app #prompt, body.holo3 #prompt{border:1px solid rgba(115,216,213,.30);}
body.holo3 #prompt{position:relative; padding-left:44px!important;}
body.holo3 #prompt::before{content:""; position:absolute; left:14px; top:50%; width:22px; height:1px; opacity:.6;
  background:repeating-linear-gradient(90deg, var(--lk-cyan) 0 5px, transparent 5px 9px);}
/* P4: 端末のモード文法 — 敵の手番はブラケット/枠が琥珀へ(Elite Dangerous文法) */
body.holo3 #side{--bracket-c:#49d5ff;}
body.holo3.enemy-turn #side{--bracket-c:var(--lk-amber); border-color:rgba(231,168,91,.4);}
body.holo3.enemy-turn #hud{--bracket-c:var(--lk-amber);}
body.holo3 #side h3::before{content:"// "; color:rgba(115,216,213,.45);}
body.holo3 .intent{transition:box-shadow .15s ease-out;}
body.holo3 .intent:hover{box-shadow:inset 3px 0 0 var(--lk-amber);}
/* P5: モーダルのコーナーカット統一 */
body.holo3 .modal{clip-path:polygon(0 0, calc(100% - var(--lk-cut)) 0, 100% var(--lk-cut), 100% 100%, 0 100%); border-radius:4px;}
/* P6: グリーブル装飾層(機材のフチ。英字のみ=情報と装飾の分離) */
#greeble{display:none; position:fixed; inset:0; z-index:-1; pointer-events:none; font-family:Consolas,monospace; color:rgba(115,216,213,.32);}
body.holo3 #greeble{display:block;}
#greeble .gb-build{position:absolute; left:10px; bottom:8px; font-size:10px; letter-spacing:.18em; opacity:.75;}
#greeble .gb-vert{position:absolute; right:6px; top:14%; writing-mode:vertical-rl; font-size:10px; letter-spacing:.34em; opacity:.5;}
#greeble .gb-ruler{position:absolute; top:0; left:30%; right:30%; height:4px; opacity:.55;
  background:repeating-linear-gradient(90deg, rgba(115,216,213,.35) 0 1px, transparent 1px 7px);}
/* P7-lite: 船体危機=フレーム自体が状態表示(四隅の赤ビネット) */
body.holo3.hull-crit #greeble::before{content:""; position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 0 0, rgba(255,85,102,.14), transparent 42%),
    radial-gradient(ellipse at 100% 0, rgba(255,85,102,.14), transparent 42%),
    radial-gradient(ellipse at 0 100%, rgba(255,85,102,.12), transparent 42%),
    radial-gradient(ellipse at 100% 100%, rgba(255,85,102,.12), transparent 42%);
  animation:hullwarn 2.4s ease-in-out infinite;}
@keyframes hullwarn{0%,100%{opacity:.55}50%{opacity:1}}
@media (max-width:620px){
  body.holo3 #hud::before{display:none;}
  #greeble .gb-vert, #greeble .gb-ruler{display:none;}
}
</style>

// ---- rng ----
function mulberry32(seed){ let a = seed>>>0; return function(){ a|=0; a=(a+0x6D2B79F5)|0;
  let t=Math.imul(a^(a>>>15),1|a); t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }

// ---- helpers ----
const mod=(v,m)=>((v%m)+m)%m;
const wrap=v=>mod(v,CONFIG.GRID);
function tdelta(a,b){ const G=CONFIG.GRID; let d=mod(b-a,G); if(d>G/2) d-=G; return d; }
function tdist(a,b){ return Math.abs(tdelta(a.x,b.x))+Math.abs(tdelta(a.y,b.y)); }
function sameLine(a,b){ return a.x===b.x || a.y===b.y; }
function lineDist(a,b){ if(a.x===b.x) return Math.abs(tdelta(a.y,b.y)); if(a.y===b.y) return Math.abs(tdelta(a.x,b.x)); return Infinity; }

function aliveUnits(enc){ return enc.units.filter(u=>u.alive); }
function unitAt(enc,x,y){ return enc.units.find(u=>u.alive && u.x===x && u.y===y) || null; }
function players(enc){ return enc.units.filter(u=>u.alive && u.side==="player"); }
function enemies(enc){ return enc.units.filter(u=>u.alive && u.side==="enemy"); }
function targetables(enc){ return enc.units.filter(u=>u.alive && u.side!=="player"); } // 敵+ハザード(岩・機雷も撃てる/押せる)
function unitById(enc,id){ return enc.units.find(u=>u.id===id); }
function nearestPlayer(enc,u){ let best=null,bd=99; for(const p of players(enc)){ const d=tdist(u,p); if(d<bd){bd=d;best=p;} } return best; }
function effDamage(t,dmg){ return Math.max(0,dmg-(t.shield||0)); }

function cardsIn(state,loc){ return state.run.cards.filter(c=>c.loc===loc); }
function aliveCards(state){ return state.run.cards.filter(c=>c.loc!=="lost"); }
function cardByUid(state,uid){ return state.run.cards.find(c=>c.uid===uid); }
function defOf(c){ return CARD_DEFS[c.defId]; }
function bossChapterForZone(zone){ return Math.max(1, Math.ceil(zone/3)); }
function isBossZone(zone){ return zone>0 && zone%3===0; }
function rewardMultiplier(run){ return Math.pow(2, Math.max(0, run.leapStakes||0)); }
function nextRewardMultiplier(run){ return Math.pow(2, Math.max(0, (run.leapStakes||0)+1)); }

// ---- run setup ----
function newRun(seed, deckDefIds, opts){
  opts=opts||{};
  const s = (seed===undefined||seed===null) ? Math.floor(Math.random()*1e9) : seed;
  const ship = shipDef(opts.shipId);
  const deck = (deckDefIds&&deckDefIds.length)? deckDefIds : ship.deck;
  const state = {
    seed:s, rand:mulberry32(s),
    screen:"title",
    run:{
      zone:1, encIdx:0, route:null,
      tutorial: !!opts.tutorial,
      shipId: ship.id,
      asc: Math.max(0, Math.min(3, opts.asc!==undefined?opts.asc:(opts.hard?1:0))),
      contracts: (opts.contracts||[]).filter(id=>CONTRACT_DEFS.some(c=>c.id===id)),
      daily: !!opts.daily,
      freeChooseRest:0, extraMiner:false,
      cards: deck.map((defId,i)=>({uid:"u"+i, defId, loc:"pool", up:false})),
      nextUid: deck.length,
      cargo:[], relicsSeen:[], deployed:[], bonusValue:0,
      credits:0, creditsEarned:0, creditsSpent:0, creditCarry:0, // ラン内クレジット(金の出口=整備ドック。残額は精算で1:1メタへ持越)
      dockSeq:0, dockMainDone:false, dockPatch:false, dockRecover:false, // 二段ドック: 無料主作業→有料追加整備
      bossTypes:{}, bossKills:0, leapStakes:0,
      events:[], // 航海記録(クロニクル)用の構造化イベント — LLMなしでドラマを再構成する材料
      fuelBurnt:0, restCount:0, burnCount:0, totalRounds:0,
      over:false, win:false, reason:null,
      log:[],
    },
    enc:null,
  };
  if(hasContract(state.run,"fragile")) state.run.shipHp=Math.max(1,ship.hp-2); // 契約『老朽船体』
  return state;
}

function log(state,msg,cls){ state.run.log.unshift({msg,cls:cls||"",t:state.run.totalRounds}); if(state.run.log.length>120) state.run.log.pop(); }

// 航海記録イベント(機械的なドラマ検出の材料)。z/戦域/ラウンドつきで時系列に積む
function chron(state,t,d){
  const r=state.run;
  if(!r.events) r.events=[];
  if(r.events.length>=300) return;
  r.events.push({z:r.zone, e:r.encIdx, r:(state.enc?state.enc.round:0), t, ...(d||{})});
}
// 同一ビート内の連発イベント(連続撃破・誘爆連鎖)は1件に統合してnを伸ばす(記録のスパム防止)
function chronMerge(state,t,n){
  const run=state.run, rr=(state.enc?state.enc.round:0);
  const last=[...(run.events||[])].reverse().find(e=>e.t===t&&e.z===run.zone&&e.e===run.encIdx&&e.r===rr);
  if(last){ last.n=Math.max(last.n||1,n); }
  else chron(state,t,{n});
}

// ---- encounter setup ----
// ボスの正体は章ごとに抽選(周回動機: 「次の墓標の主はどいつだ」)。"apex"はテーブル上のプレースホルダ
function bossOf(state, chapter){
  const ch=chapter||bossChapterForZone(state.run.zone);
  state.run.bossTypes=state.run.bossTypes||{};
  if(!state.run.bossTypes[ch]){
    const pool=["apex","juggernaut","broodmother"];
    state.run.bossTypes[ch]=pool[Math.floor(state.rand()*pool.length)];
  }
  state.run.bossType=state.run.bossTypes[ch];
  return state.run.bossType;
}
function encounterEnemyList(state){
  const zt = ZONE_TABLE[state.run.zone-1];
  const list = state.run.encIdx===0 ? zt.e1 : (state.run.route==="danger" ? zt.danger : zt.safe);
  return list.map(t=> t==="apex" ? bossOf(state, bossChapterForZone(state.run.zone)) : t);
}

function startEncounter(state, loadoutUids){
  const run=state.run;
  const pool=cardsIn(state,"pool");
  const want=Math.min(CONFIG.HAND,pool.length);
  let chosen = loadoutUids ? pool.filter(c=>loadoutUids.includes(c.uid)) : pool.slice(0,want);
  if(chosen.length>want) chosen=chosen.slice(0,want);
  if(chosen.length<want){ for(const c of pool){ if(chosen.length>=want) break; if(!chosen.includes(c)) chosen.push(c); } }
  for(const c of pool) c.loc = chosen.includes(c) ? "hand" : "reserve";

  let list = run.tutorial ? ["miner","miner"] : [...encounterEnemyList(state)];
  if(run.extraMiner){ list.push("miner"); run.extraMiner=false; log(state,"墓標を荒らした報い — 採掘ドローンが嗅ぎつけてきた","bad"); }
  if(hasContract(run,"swarm") && !run.tutorial){
    list.push(list.find(t=>!ENEMY_DEFS[t].boss)||"miner"); // 契約『増援協定』: 同型1体追加(ボスは増えない)
  }
  const units=[];
  // 船体はランを通して持ち越す(回復は応急パッチ/補給/残骸修理のみ — 「どうせ死なない」の根絶)
  const sd=shipDef(run.shipId);
  const shipHp=Math.max(1, Math.min(sd.hp, (run.shipHp??sd.hp) - (run.shipEventDmg||0))); run.shipEventDmg=0;
  units.push({id:"ship", side:"player", type:"ship", name:"旗艦"+sd.name, icon:"🚀",
    x:0,y:1, hp:shipHp, maxHp:sd.hp, drift:null, shield:0, alive:true});
  const droneHp = (run.droneHp===0) ? Math.ceil(sd.droneHp/2) : Math.min(sd.droneHp, run.droneHp??sd.droneHp);
  units.push({id:"drone", side:"player", type:"drone", name:"随伴機R-6", icon:"🛰️",
    x:1,y:3, hp:droneHp, maxHp:sd.droneHp, drift:null, shield:0, alive:true}); // 斜め配置で互いの直線を塞がない
  const hardBonus = run.asc>=1?1:0;
  const depthBonus = Math.floor((run.zone-1)/3);
  const bossChapter = bossChapterForZone(run.zone);
  const hasBoss = list.some(t=>ENEMY_DEFS[t].boss);
  list.forEach((t,i)=>{
    let [x,y]=ENEMY_SPAWNS[i];
    if(ENEMY_DEFS[t].boss){ x=3; y=2; } // ボスは中央奥に鎮座
    const d=ENEMY_DEFS[t];
    const bossHpMod = ENEMY_DEFS[t].boss ? (bossChapter===1?-4:(bossChapter===3?2:0)) : 0;
    const hp=Math.max(1,d.hp + depthBonus + bossHpMod + hardBonus + (hasContract(run,"heavy")?1:0));
    const dmg=d.dmg + ((state.run.zone>=4&&(t==="pirate"||t==="hunter"))?1:0)
      + ((state.run.zone>=7&&t!=="mender")?1:0)
      + ((run.asc>=3&&state.run.zone>=3)?1:0);
    units.push({id:"e"+i, side:"enemy", type:t, name:d.name, icon:d.icon,
      x,y, hp, maxHp:hp, dmg,
      drift:null, shield:0, alive:true, charge:null, patIdx:Math.floor(state.rand()*4)});
  });
  // ハザード配置(岩・機雷): 中央帯の空きマスへ。制動と物理キルが輝く地形(L-016)
  const zt=ZONE_TABLE[run.zone-1];
  let hz=run.tutorial?[0,1]:[...(zt.hz||[0,0])];
  if(hasContract(run,"minefield") && !run.tutorial) hz=[hz[0],hz[1]+2]; // 契約『機雷宙域』
  const hzList=[...Array(hz[0]).fill("debris"),...Array(hz[1]).fill("mine")];
  let hi=0;
  const minesPlaced=[];
  for(const t of hzList){
    let tries=0;
    while(tries++<30){
      let x,y;
      if(t==="mine" && minesPlaced.length && state.rand()<(run.zone===1?0.85:0.6)){ // Z1はほぼ必ずクラスタ=初ランの花火保証
        // 機雷は6割で既存機雷の隣に寄せる: クラスタ=誘爆連鎖の火種(1発で花火大会が起きる地形)
        const a=minesPlaced[Math.floor(state.rand()*minesPlaced.length)];
        const nb=neighborCells(a.x,a.y);
        const c=nb[Math.floor(state.rand()*nb.length)];
        x=c.x; y=c.y;
      } else {
        x=1+Math.floor(state.rand()*3); y=Math.floor(state.rand()*CONFIG.GRID);
      }
      if(units.some(u=>u.x===x&&u.y===y)) continue;
      const d=ENEMY_DEFS[t];
      units.push({id:"h"+(hi++), side:"hazard", type:t, name:d.name, icon:d.icon,
        x,y, hp:d.hp, maxHp:d.hp, dmg:d.dmg, drift:null, shield:0, alive:true});
      if(t==="mine") minesPlaced.push({x,y});
      break;
    }
  }
  // 回収コンテナ(サブ目標): 第2戦域に40%で出現。ユニットが乗れば価値+2
  let container=null;
  if(run.encIdx===1 && state.rand()<0.4){
    let tries=0;
    while(tries++<30){
      const x=2+Math.floor(state.rand()*3), y=Math.floor(state.rand()*CONFIG.GRID);
      if(units.some(u=>u.x===x&&u.y===y)) continue;
      container={x,y,taken:false};
      break;
    }
  }
  // 重力渦(セル地形): 隣のユニットをラウンド頭に引き込む。渦上では慣性が消える
  let well=null;
  if(!run.tutorial && zt.well && state.rand()<zt.well){
    let tries=0;
    while(tries++<30){
      const x=1+Math.floor(state.rand()*3), y=Math.floor(state.rand()*CONFIG.GRID);
      if(units.some(u=>u.x===x&&u.y===y)) continue;
      if(container&&container.x===x&&container.y===y) continue;
      well={x,y};
      break;
    }
  }
  state.enc={ units, round:1, step:"intents", phase:null, intents:[], dmgQueue:[],
    pending:null, awaitEnd:false, enemyIdx:null, driftMoves:0, fxQueue:[], crashSalvage:0,
    container, well, flareRow:null, killStreak:0, bossIntro:hasBoss,
    cleared:false };
  if(well) log(state,"🌀 重力渦を検出 — 渦の隣で止まると引き込まれる。敵を放り込んで予定を狂わせろ。","warn");
  if(hasBoss) log(state, "⚠ 警告: 桁外れのエネルギー反応 — 墓所の主が目を覚ます。", "bad");
  log(state, `《${ZONE_NAMES[run.zone-1]}》 第${run.encIdx+1}戦域 — 警報!! 敵影${list.length}。仕事の時間だ。`, "warn");
  pump(state);
  return state;
}

// ---- fx queue (UIが描画時に消費。ロジックはDOMを知らない) ----
function fx(state, ev){ const q=state.enc&&state.enc.fxQueue; if(!q) return; if(state.enc._fxDelay&&ev.d==null) ev.d=state.enc._fxDelay; q.push(ev); if(q.length>60) q.shift(); }
// トーラスの縁越え(ラップ)通知: UIは盤面横断スライドではなく「端から退場→反対側から入場」を描く
function wrapNote(state,u,dirKey){
  const enc=state.enc; if(!enc||!dirKey) return;
  (enc.wrapFx=enc.wrapFx||[]).push({unitId:u.id, dir:dirKey});
  if(enc.wrapFx.length>20) enc.wrapFx.shift();
}

// ---- drift ----
function applyDrift(state){
  const enc=state.enc;
  enc.driftMoves=0;
  for(const u of players(enc)) u.shield=0;
  // 渦上のユニットは滑る前に慣性が消える(渦=タダで止まれる地形)
  if(enc.well) for(const u of aliveUnits(enc)){
    if(u.x===enc.well.x && u.y===enc.well.y && u.drift){
      u.drift=null;
      fx(state,{type:"float",x:u.x,y:u.y,text:"渦に固定",cls:"dim"});
    }
  }
  const order=[...players(enc),...enemies(enc)];
  for(const u of order){
    if(!u.alive || !u.drift) continue;
    const d=DIRS[u.drift];
    const nx=wrap(u.x+d.x), ny=wrap(u.y+d.y);
    const occ=unitAt(enc,nx,ny);
    if(occ){
      if(u.side==="player" && occ.side==="player"){
        // 味方同士はバンプ: 停止のみ(テストプレイ調整: 自軍ドローン圧死が頻発したため)
        log(state, `${u.name} が ${occ.name} に接触 — 慣性が殺された`);
        fx(state,{type:"float",x:occ.x,y:occ.y,text:"接触",cls:"dim"});
        u.drift=null;
      } else {
        // 敵が絡む衝突: 双方1ダメージ、双方ドリフト消滅
        log(state, `衝突! ${u.name} が ${occ.name} に激突`, "bad");
        u.drift=null; occ.drift=null;
        fx(state,{type:"boom",x:nx,y:ny});
        fx(state,{type:"float",x:nx,y:ny,text:"衝突!",cls:"bad"});
        dealDamage(state, u, CONFIG.COLLISION_DMG, "衝突");
        dealDamage(state, occ, CONFIG.COLLISION_DMG, "衝突");
      }
    } else {
      if(u.x+d.x!==nx || u.y+d.y!==ny) wrapNote(state,u,u.drift); // 縁越えドリフト
      u.x=nx; u.y=ny; enc.driftMoves++;
    }
  }
  applyWellPull(state);
  checkContainer(state);
}

// 重力渦: ラウンド頭(滑り解決後)、渦の隣にいるユニットを渦へ引き込む(慣性は消える)
function applyWellPull(state){
  const enc=state.enc, w=enc.well;
  if(!w) return;
  for(const u of [...players(enc),...enemies(enc)]){
    if(!u.alive) continue;
    if(u.x===w.x && u.y===w.y) continue;
    if(tdist(u,w)===1 && !unitAt(enc,w.x,w.y)){
      if(Math.abs(u.x-w.x)>1 || Math.abs(u.y-w.y)>1) wrapNote(state,u,dirBetween(u,w)); // 縁越え吸引
      u.x=w.x; u.y=w.y; u.drift=null; enc.driftMoves++;
      fx(state,{type:"float",x:u.x,y:u.y,text:"🌀吸引",cls:"warn"});
      if(u.side==="enemy") chron(state,"wellpull",{name:u.name});
      log(state,`${u.name} が重力渦に引き込まれた`,u.side==="player"?"bad":"good");
    }
  }
}

// ラウンド頭の慣性解決ビート(L-004): pumpはここで止まり、UI/シムが driftPhase を呼ぶ
function driftPhase(state){
  const enc=state.enc;
  if(!enc||enc.step!=="drift") return {ok:false};
  applyDrift(state);
  enc.step="intents";
  pump(state);
  return {ok:true};
}

// ---- damage ----
const PHYS_SRCS=["衝突","激突","機雷の爆発","自爆"]; // 「物理」= 装甲種カラパスを素通しする系
function dealDamage(state, u, dmg, src, chain=0){ // chain=このダメージが通ってきた爆発リンク数(誘爆の深さ)
  if(!u.alive || dmg<=0) return;
  // ベリーロール(装甲衝角艦)のパッシブ: 物理は通さない、物理で殴る
  if((src==="衝突"||src==="激突") && state.run.shipId==="bellyroll"){
    if(u.side==="player"){ fx(state,{type:"float",x:u.x,y:u.y,text:"装甲!",cls:"good"}); return; }
    dmg+=1;
  }
  // 装甲種カラパス: 武器ダメージ-1、物理は素通し(対抗手段の強制 — 撃つな、ぶつけろ)
  if(u.side!=="player" && (ENEMY_DEFS[u.type]||{}).armor && !PHYS_SRCS.includes(src)){
    dmg-=1;
    fx(state,{type:"float",x:u.x,y:u.y,text:"装甲!",cls:"dim"});
    if(dmg<=0){ log(state,`${u.name}の甲殻が${src}を弾いた — 物理でぶつけろ`,"warn"); return; }
  }
  if(u.side==="player"){
    state.enc.dmgQueue.push({unitId:u.id, dmg, src});
    fx(state,{type:"hitflash",unitId:u.id});
  } else {
    const eff=effDamage(u,dmg); u.shield=Math.max(0,u.shield-dmg);
    u.hp-=eff;
    if(eff>0) fx(state,{type:"float",x:u.x,y:u.y,text:"-"+eff,cls:"bad"});
    if(u.hp<=0){
      u.alive=false;
      fx(state,{type:"boom",x:u.x,y:u.y,big:true});
      fx(state,{type:"shake"});
      log(state, `${u.name} 撃破! 宇宙塵に還った。`, "good");
      if((ENEMY_DEFS[u.type]||{}).boss){
        state.run.bossKilled=true;
        state.run.bossKills=(state.run.bossKills||0)+1;
        state.run.lastBossType=u.type;
        state.run.bossType=u.type;
        chron(state,"bosskill",{name:u.name,title:ENEMY_DEFS[u.type].title,type:u.type});
        fx(state,{type:"boom",x:u.x,y:u.y,big:true});
        fx(state,{type:"confetti"});
        fx(state,{type:"stamp",x:u.x,y:u.y,big:true,text:`${ENEMY_DEFS[u.type].title}、沈黙。`});
        log(state,"……静寂。文明を終わらせた怒りが、いま眠りについた。","good");
      }
      if(u.side==="enemy") state.run.kills=(state.run.kills||0)+1;
      if(u.side==="enemy" && src==="太陽フレア") chron(state,"flarekill",{name:u.name});
      if(u.side==="enemy"){ // 撃破ストリークは敵限定(機雷の誘爆で薄めない — 祝福の価値を守る)
        state.enc.killStreak=(state.enc.killStreak||0)+1;
        if(state.enc.killStreak===2) fx(state,{type:"stamp",x:u.x,y:u.y,big:true,text:"DOUBLE KILL!"});
        if(state.enc.killStreak>=3){ fx(state,{type:"stamp",x:u.x,y:u.y,big:true,text:"RAMPAGE!!"}); chronMerge(state,"rampage",state.enc.killStreak); }
      }
      // 機雷は死ぬとき周囲1マスの全ユニットを巻き込む(連鎖あり)
      if(u.type==="mine"){
        const link=chain+1; // この爆発が連鎖の何発目か
        chainBlast(state,u,link,"機雷の爆発", link>=2?`機雷が誘爆! 連鎖${link}発目!`:"機雷が誘爆! 周囲を薙ぎ払う");
      }
      // 自爆種ボムスポア: どんな死に方でも爆ぜる(歩く機雷 — 押し返して敵群で割れ)
      if((ENEMY_DEFS[u.type]||{}).boom){
        const link=chain+1;
        chainBlast(state,u,link,"自爆", `${u.name}が爆散! 周囲を巻き込む`);
      }
      // 分裂体ミトス: 死ぬと幼体2体が隣の空きマスへ(手数を喰う — 割る場所を選べ)
      if((ENEMY_DEFS[u.type]||{}).split){
        const free=neighborCells(u.x,u.y).filter(c=>!unitAt(state.enc,c.x,c.y));
        const n=Math.min(2,free.length);
        for(let i=0;i<n;i++){
          state.enc.summonSeq=(state.enc.summonSeq||0)+1;
          const ld=ENEMY_DEFS.larva;
          state.enc.units.push({id:"lv"+state.enc.summonSeq, side:"enemy", type:"larva", name:ld.name, icon:ld.icon,
            x:free[i].x, y:free[i].y, hp:ld.hp, maxHp:ld.hp, dmg:ld.dmg, drift:null, shield:0, alive:true, charge:null, patIdx:0});
          fx(state,{type:"float",x:free[i].x,y:free[i].y,text:"分裂!",cls:"bad"});
        }
        if(n) log(state, `${u.name}が裂けて幼体${n}体が這い出した…(次のラウンドから動く)`, "bad");
      }
      // クラッシュ・サルベージ: 物理(衝突/激突)で「敵」を破壊すると残骸からカード回収(多脚: 位置取り→寿命)
      if(PHYS_SRCS.includes(src)&&u.side==="enemy"){
        state.enc.crashSalvage=(state.enc.crashSalvage||0)+1;
        state.run.physKills=(state.run.physKills||0)+1;
        chron(state,"physkill",{name:u.name,src});
        fx(state,{type:"stamp",x:u.x,y:u.y,big:true,text:state.run.physKills>=3?`物理キル ×${state.run.physKills}!!`:"物理キル!"});
        log(state, `物理キル! ${u.name}の残骸から部品をサルベージできる`, "good");
      }
    }
    else if(eff>0){ fx(state,{type:"hitflash",unitId:u.id}); log(state, `${u.name} に${eff}ダメージ (残HP${u.hp})`); }
  }
}

// 爆発の連鎖処理: link=この爆発が連鎖の何発目か。演出は110ms/段ずらして波及を見せる(視覚のみ、ロジックは即時解決)
const CHAIN_STEP_MS=110;
function chainBlast(state, u, link, src, msg){
  if(link>=2){ // 誘爆(爆発が爆発を呼んだ)から演出がエスカレート
    state.run.chainLinks=(state.run.chainLinks||0)+1;
    state.run.chainBest=Math.max(state.run.chainBest||0,link);
    chronMerge(state,"chain",link); // n=連鎖の最大深度
    fx(state,{type:"chainx",n:link}); // 盤面上部の単一コンボカウンタ(段が上がるたび同じ場所でデカくなる)
    fx(state,{type:"shake",n:Math.min(3,link)});
    if(link===4) fx(state,{type:"confetti"});
  }
  log(state, msg, "bad");
  fx(state,{type:"boom",x:u.x,y:u.y,big:true,core:true,stop:90+40*Math.min(4,link)});
  const pd=state.enc._fxDelay||0;
  state.enc._fxDelay=pd+CHAIN_STEP_MS; // 巻き込み先の被弾と次の誘爆は1段遅れて見せる
  for(const c of neighborCells(u.x,u.y)){
    const v=unitAt(state.enc,c.x,c.y);
    if(v&&v.alive){
      if(Math.abs(v.x-u.x)<=1&&Math.abs(v.y-u.y)<=1) fx(state,{type:"beam",x1:u.x,y1:u.y,x2:v.x,y2:v.y,d:pd}); // ラップ越えは線を引かない
      dealDamage(state,v,2,src,link);
    }
  }
  state.enc._fxDelay=pd;
}

function pendingDamage(state){ return state.enc && state.enc.dmgQueue.length ? state.enc.dmgQueue[0] : null; }

function resolveDamage(state, mode, burnUid){
  const enc=state.enc;
  const q=enc.dmgQueue.shift();
  if(!q) return {ok:false,msg:"no damage"};
  const u=unitById(enc,q.unitId);
  if(!u || !u.alive){ pump(state); return {ok:true}; }
  const eff=Math.max(0,q.dmg-u.shield); u.shield=Math.max(0,u.shield-q.dmg);
  if(eff<=0){ log(state,`${u.name} のシールドが${q.src}を弾いた`, "good"); pump(state); return {ok:true}; }
  if(mode==="burn"){
    const c=cardByUid(state,burnUid);
    if(!c || (c.loc!=="hand"&&c.loc!=="discard")) return {ok:false,msg:"そのカードは燃やせない"};
    c.loc="lost"; state.run.burnCount++;
    chron(state,"burnsave",{card:defOf(c).name,dmg:eff});
    log(state, `『${defOf(c).name}』を燃やして${q.src}(${eff}ダメージ)を無効化! カードは永遠に失われた…`, "warn");
  } else {
    u.hp-=eff;
    if(u.id==="ship" && u.hp===1) chron(state,"neardeath",{src:q.src});
    log(state, `${u.name} が${q.src}で${eff}ダメージ (残HP${Math.max(0,u.hp)})`, "bad");
    if(u.hp<=0){
      u.alive=false;
      if(u.id==="ship"){ runOver(state,false,"ship"); return {ok:true}; }
      state.run.droneWasLost=true;
      log(state, `${u.name} 大破! 次の戦域で応急復帰する`, "bad");
    }
  }
  pump(state);
  return {ok:true};
}

function runOver(state,win,reason){
  const run=state.run;
  chron(state,"end",{win,reason,hull:state.enc?(unitById(state.enc,"ship")||{}).hp:run.shipHp});
  run.over=true; run.win=win; run.reason=reason;
  run.creditCarry=run.credits; // 残額を固定(勝敗を問わず精算で1:1メタへ持越。没収なし)
  state.screen="summary";
  if(win) log(state,"帰還ジャンプ完了。母港の灯りが見える。","good");
  else log(state, reason==="ship" ? "船体崩壊。最後の通信はノイズに溶けた。" : "全カード喪失。船はもう、漂うだけの棺だ。", "bad");
}

// ---- intents (enemy AI) ----
function stepDirToward(enc,u,p,avoid){
  const dx=tdelta(u.x,p.x), dy=tdelta(u.y,p.y);
  const opts=[];
  if(Math.abs(dx)>=Math.abs(dy)){ if(dx!==0) opts.push(dx>0?"right":"left"); if(dy!==0) opts.push(dy>0?"down":"up"); }
  else { if(dy!==0) opts.push(dy>0?"down":"up"); if(dx!==0) opts.push(dx>0?"right":"left"); }
  for(const k of opts){
    const d=DIRS[k], nx=wrap(u.x+d.x), ny=wrap(u.y+d.y);
    if(!unitAt(enc,nx,ny) && !avoid.has(nx+","+ny)) return {dir:k,x:nx,y:ny};
  }
  return null;
}
function stepDirAway(enc,u,p,avoid){
  let best=null,bd=tdist(u,p);
  for(const k of DIR_KEYS){
    const d=DIRS[k], nx=wrap(u.x+d.x), ny=wrap(u.y+d.y);
    if(unitAt(enc,nx,ny)||avoid.has(nx+","+ny)) continue;
    const nd=tdist({x:nx,y:ny},p);
    if(nd>bd){ bd=nd; best={dir:k,x:nx,y:ny}; }
  }
  return best;
}
function neighborCells(x,y){ return DIR_KEYS.map(k=>({x:wrap(x+DIRS[k].x), y:wrap(y+DIRS[k].y)})); }
function rowCells(y){ const a=[]; for(let x=0;x<CONFIG.GRID;x++) a.push({x,y}); return a; }
function colCells(x){ const a=[]; for(let y=0;y<CONFIG.GRID;y++) a.push({x,y}); return a; }

// 近接の基本形(1歩詰めて隣接なら殴る): miner / warden / larva が共有
function meleePlan(state,u,avoid){
  const enc=state.enc, p=nearestPlayer(enc,u);
  if(!p) return baseIntent(u);
  const mv=stepDirToward(enc,u,p,avoid);
  const pos=mv?{x:mv.x,y:mv.y}:u;
  const it=baseIntent(u);
  if(mv){ it.moveTo={x:mv.x,y:mv.y}; it.moveDir=mv.dir; avoid.add(mv.x+","+mv.y); }
  if(tdist(pos,p)<=1){ it.attackCells=[{x:p.x,y:p.y}]; it.dmg=u.dmg; }
  return it;
}
const ENEMY_AI = {
  miner:    { plan: meleePlan },
  warden:   { plan: meleePlan },
  splitter: { plan: meleePlan },
  larva:    { plan: meleePlan },
  mender: { plan(state,u,avoid){
    // 支援機: 逃げ回りつつ最も傷ついた敵を修復(優先目標の強制)
    const enc=state.enc; const it=baseIntent(u);
    const p=nearestPlayer(enc,u);
    if(p){ const mv=stepDirAway(enc,u,p,avoid); if(mv){ it.moveTo={x:mv.x,y:mv.y}; it.moveDir=mv.dir; avoid.add(mv.x+","+mv.y); } }
    const cands=enemies(enc).filter(e=>e.id!==u.id && e.hp<e.maxHp);
    if(cands.length){
      cands.sort((a,b)=>(a.hp/a.maxHp)-(b.hp/b.maxHp));
      it.healTarget=cands[0].id;
    }
    return it;
  }},
  blinker: { plan(state,u,avoid){
    // 転移種: 間合い2以内なら撃つ。遠ければ最寄りユニットの間合い2リングへ位相転移(慣性・衝突無視)
    const enc=state.enc; const it=baseIntent(u);
    const p=nearestPlayer(enc,u);
    if(!p) return it;
    if(tdist(u,p)<=2){ it.attackCells=[{x:p.x,y:p.y}]; it.dmg=u.dmg; return it; }
    const ring=[];
    for(let x=0;x<CONFIG.GRID;x++)for(let y=0;y<CONFIG.GRID;y++){
      if(tdist({x,y},p)!==2) continue;
      if(unitAt(enc,x,y)||avoid.has(x+","+y)) continue;
      ring.push({x,y});
    }
    if(ring.length){
      const c=ring[Math.floor(state.rand()*ring.length)];
      it.moveTo=c; it.teleport=true; avoid.add(c.x+","+c.y);
    }
    return it;
  }},
  bomber: { plan(state,u,avoid){
    // 自爆種: 1歩詰めて、隣接したら自爆(周囲1マス2ダメージ)
    const enc=state.enc, p=nearestPlayer(enc,u);
    const it=baseIntent(u);
    if(!p) return it;
    const mv=stepDirToward(enc,u,p,avoid);
    const pos=mv?{x:mv.x,y:mv.y}:u;
    if(mv){ it.moveTo={x:mv.x,y:mv.y}; it.moveDir=mv.dir; avoid.add(mv.x+","+mv.y); }
    if(tdist(pos,p)<=1){ it.detonate=true; it.detonateAt={x:pos.x,y:pos.y}; it.attackCells=neighborCells(pos.x,pos.y); it.dmg=u.dmg; }
    return it;
  }},
  hunter: { plan(state,u,avoid){
    const enc=state.enc, p=nearestPlayer(enc,u);
    if(!p) return baseIntent(u);
    const it=baseIntent(u);
    let cx=u.x, cy=u.y, dir=null;
    for(let s=0;s<2;s++){
      const mv=stepDirToward(enc,{x:cx,y:cy},p,avoid);
      if(!mv) break;
      cx=mv.x; cy=mv.y; dir=mv.dir;
    }
    if(dir){ it.moveTo={x:cx,y:cy}; it.moveDir=dir; avoid.add(cx+","+cy); }
    const pos=it.moveTo||u;
    if(tdist(pos,p)<=1){ it.attackCells=[{x:p.x,y:p.y}]; it.dmg=u.dmg; }
    return it;
  }},
  pirate: { plan(state,u,avoid){
    const enc=state.enc, p=nearestPlayer(enc,u);
    if(!p) return baseIntent(u);
    const d=tdist(u,p); const it=baseIntent(u);
    let mv=null;
    if(d<2) mv=stepDirAway(enc,u,p,avoid);
    else if(d>2) mv=stepDirToward(enc,u,p,avoid);
    else it.brake=true;
    if(mv){ it.moveTo={x:mv.x,y:mv.y}; it.moveDir=mv.dir; avoid.add(mv.x+","+mv.y); }
    const pos=mv?{x:mv.x,y:mv.y}:u;
    if(tdist(pos,p)<=2){ it.attackCells=[{x:p.x,y:p.y}]; it.dmg=u.dmg; }
    return it;
  }},
  jelly: { plan(state,u,avoid){
    const enc=state.enc; const it=baseIntent(u);
    const k=DIR_KEYS[(u.patIdx + enc.round) % 4];
    const d=DIRS[k], nx=wrap(u.x+d.x), ny=wrap(u.y+d.y);
    let pos={x:u.x,y:u.y};
    if(!unitAt(enc,nx,ny) && !avoid.has(nx+","+ny)){ it.moveTo={x:nx,y:ny}; it.moveDir=k; avoid.add(nx+","+ny); pos={x:nx,y:ny}; }
    it.attackCells=neighborCells(pos.x,pos.y); it.dmg=u.dmg; it.aura=true;
    return it;
  }},
  sentinel: { plan(state,u){
    const enc=state.enc; const it=baseIntent(u);
    if(u.charge){ it.attackCells=u.charge.map(c=>({...c})); it.dmg=u.dmg; it.fire=true; }
    else {
      const p=nearestPlayer(enc,u);
      if(p){
        const cells=(Math.abs(tdelta(u.y,p.y))<=Math.abs(tdelta(u.x,p.x))) ? rowCells(p.y) : colCells(p.x);
        it.chargeCells=cells.filter(c=>!(c.x===u.x&&c.y===u.y));
      }
    }
    return it;
  }},
  apex: { plan(state,u){
    // ボス: 十字充填→焼却の2拍子+合間に機雷を産む。不動。交点=直撃2/片翼=掠り1(グレイズ — 半分逃げれば半分助かる)
    const enc=state.enc; const it=baseIntent(u);
    if(u.charge){ it.attackCells=u.charge.map(c=>({...c})); it.dmg=u.dmg; it.fire=true; it.cross=u.chargeCross||null; return it; }
    const p=nearestPlayer(enc,u);
    if(p){
      const cells=[...rowCells(p.y),...colCells(p.x)].filter(c=>!(c.x===u.x&&c.y===u.y));
      const seen=new Set();
      it.chargeCells=cells.filter(c=>{const k=c.x+","+c.y; if(seen.has(k))return false; seen.add(k); return true;});
      it.chargeCross={row:p.y,col:p.x};
    }
    // 機雷産卵(盤上の機雷3個まで)
    const mines=enc.units.filter(x=>x.alive&&x.type==="mine").length;
    if(mines<3){
      const free=neighborCells(u.x,u.y).filter(c=>!unitAt(enc,c.x,c.y));
      if(free.length) it.summon={...free[Math.floor(state.rand()*free.length)], type:"mine"};
    }
    return it;
  }},
  juggernaut: { plan(state,u){
    // 轢断ボス: 照準(レーン橙予告)→翌ラウンドにレーンを突進。最初の障害物で止まり双方軋む — 機雷へ誘え
    const enc=state.enc; const it=baseIntent(u);
    const lane=dk=>{ const d=DIRS[dk]; const cells=[]; let x=u.x,y=u.y;
      for(let i=1;i<CONFIG.GRID;i++){ x=wrap(x+d.x); y=wrap(y+d.y); cells.push({x,y}); } return cells; };
    if(u.rushDir){ it.rush=u.rushDir; it.dmg=u.dmg; it.attackCells=lane(u.rushDir); return it; }
    const p=nearestPlayer(enc,u);
    if(p){ const dk=dirBetween(u,p); it.aimDir=dk; it.chargeCells=lane(dk); }
    return it;
  }},
  broodmother: { plan(state,u,avoid){
    // 増殖の女王: 殴らない。卵を産み(幼体≤3/自爆種≤1)、近づかれたら位相転移で距離3へ逃げる
    const enc=state.enc; const it=baseIntent(u);
    const larv=enc.units.filter(x=>x.alive&&x.type==="larva").length;
    const bomb=enc.units.filter(x=>x.alive&&x.type==="bomber").length;
    const free=neighborCells(u.x,u.y).filter(c=>!unitAt(enc,c.x,c.y)&&!avoid.has(c.x+","+c.y));
    if(free.length){
      const t=(enc.round%2===0 && bomb<1) ? "bomber" : (larv<3 ? "larva" : null);
      if(t) it.summon={...free[Math.floor(state.rand()*free.length)], type:t};
    }
    const p=nearestPlayer(enc,u);
    if(p && tdist(u,p)<=2){
      const ring=[];
      for(let x=0;x<CONFIG.GRID;x++)for(let y=0;y<CONFIG.GRID;y++){
        if(unitAt(enc,x,y)||avoid.has(x+","+y)) continue;
        if(players(enc).every(q=>tdist({x,y},q)>=3)) ring.push({x,y});
      }
      if(ring.length){ const c=ring[Math.floor(state.rand()*ring.length)]; it.moveTo=c; it.teleport=true; avoid.add(c.x+","+c.y); }
    }
    return it;
  }},
};
function baseIntent(u){ return {unitId:u.id, moveTo:null, moveDir:null, brake:false, attackCells:[], chargeCells:null, dmg:0, fire:false, aura:false}; }

function planIntents(state){
  const enc=state.enc; enc.intents=[];
  const avoid=new Set();
  for(const u of enemies(enc)){
    // 苛立ち: 狙い撃ちが2連続空振り(ラップ振動等の空振りループ)→次は攻撃せず距離を詰める。退屈の根を断つ
    if((u.whiffs||0)>=2 && !(ENEMY_DEFS[u.type]||{}).boss){
      u.whiffs=0;
      enc.intents.push(irkedIntent(state,u,avoid));
      continue;
    }
    enc.intents.push(ENEMY_AI[u.type].plan(state,u,avoid));
  }
}
// 痺れを切らした敵: 最大2歩、最寄りのプレイヤーへ直進(攻撃なし)。次ラウンドから通常AIに戻る
function irkedIntent(state,u,avoid){
  const enc=state.enc; const it=baseIntent(u); it.irked=true;
  let pos={x:u.x,y:u.y};
  for(let s=0;s<2;s++){
    const p=nearestPlayer(enc,pos);
    if(!p) break;
    const k=dirBetween(pos,p);
    if(!k) break;
    const d=DIRS[k], nx=wrap(pos.x+d.x), ny=wrap(pos.y+d.y);
    if(unitAt(enc,nx,ny)||avoid.has(nx+","+ny)) break;
    pos={x:nx,y:ny}; it.moveDir=k;
  }
  if(pos.x!==u.x||pos.y!==u.y){ it.moveTo=pos; avoid.add(pos.x+","+pos.y); }
  return it;
}

function execIntent(state, it){
  const enc=state.enc;
  const u=unitById(enc,it.unitId);
  if(!u||!u.alive) return;
  if(it.moveTo){
    if(!unitAt(enc,it.moveTo.x,it.moveTo.y)){
      if(it.teleport){
        fx(state,{type:"float",x:u.x,y:u.y,text:"転移",cls:"dim"});
        u.x=it.moveTo.x; u.y=it.moveTo.y; u.drift=null; // 位相転移は慣性を持たない
        fx(state,{type:"float",x:u.x,y:u.y,text:"✦",cls:"warn"});
      } else {
        // 敵の歩行は最大2歩 — 生デルタが2を超えるのは縁越えのみ(G=5)
        if(Math.abs(u.x-it.moveTo.x)>2 || Math.abs(u.y-it.moveTo.y)>2) wrapNote(state,u,it.moveDir);
        u.x=it.moveTo.x; u.y=it.moveTo.y; u.drift=it.moveDir;
      }
    }
    else { u.drift=null; }
  }
  if(it.brake) u.drift=null;
  if(it.healTarget){
    const t=unitById(enc,it.healTarget);
    if(t&&t.alive&&t.hp<t.maxHp){
      t.hp+=1;
      fx(state,{type:"float",x:t.x,y:t.y,text:"+1修復",cls:"bad"});
      log(state,`${u.name} が ${t.name} を修復した(HP${t.hp}) — 先に修復網を潰せ`,"bad");
    }
  }
  if(it.summon){
    const t=it.summon.type||"mine";
    if(unitAt(enc,it.summon.x,it.summon.y)){
      log(state,`${u.name} の産卵は妨害された — マスが塞がっている`,"good");
    } else {
      enc.summonSeq=(enc.summonSeq||0)+1;
      const sd=ENEMY_DEFS[t];
      const side=(t==="mine"||t==="debris")?"hazard":"enemy";
      enc.units.push({id:"sm"+enc.summonSeq, side, type:t, name:sd.name, icon:sd.icon,
        x:it.summon.x, y:it.summon.y, hp:sd.hp, maxHp:sd.hp, dmg:sd.dmg, drift:null, shield:0, alive:true, charge:null, patIdx:0});
      fx(state,{type:"boom",x:it.summon.x,y:it.summon.y});
      log(state,`${u.name} が${sd.name}を産み落とした…`,"bad");
    }
  }
  if(it.aimDir) u.rushDir=it.aimDir;
  if(it.chargeCells){
    u.charge=it.chargeCells;
    u.chargeCross=it.chargeCross||null; // 十字の交点(直撃判定用)。充填時にロック
    log(state, it.aimDir ? `${u.name} が照準 — 橙のレーンから退け、轢かれるぞ` : `${u.name} がエネルギー充填中… 直線上から退避せよ`, "warn");
    return;
  }
  if(it.rush){
    // 轢断突進: レーンを直進し、最初にぶつかった者に与ダメ — 自分も1軋む(障害物への誘導=攻略法)
    const d=DIRS[it.rush]; u.rushDir=null; u.charge=null;
    log(state,`${u.name} が轢断突進!!`,"bad");
    fx(state,{type:"flash",cells:it.attackCells.map(c=>({...c})),beam:true});
    fx(state,{type:"shake"});
    for(let i=0;i<CONFIG.GRID-1;i++){
      const nx=wrap(u.x+d.x), ny=wrap(u.y+d.y);
      const occ=unitAt(enc,nx,ny);
      if(occ){
        log(state,`${u.name} が ${occ.name} を轢いた!`,"bad");
        fx(state,{type:"boom",x:nx,y:ny,big:true});
        dealDamage(state,occ,it.dmg,"激突");
        dealDamage(state,u,1,"激突");
        break;
      }
      if(u.x+d.x!==nx || u.y+d.y!==ny) wrapNote(state,u,it.rush);
      u.x=nx; u.y=ny;
    }
    u.drift=null;
    return;
  }
  if(it.detonate){
    // 自爆: 予告位置に居る場合のみ(テレグラフ正直性 L-003 — 押しのけられたら空振り)
    if(it.detonateAt && (u.x!==it.detonateAt.x || u.y!==it.detonateAt.y)){
      log(state,`${u.name} の自爆装置が空転 — 予告地点からずらされた!`,"good");
      return;
    }
    log(state,`${u.name} の自爆装置が作動!`,"bad");
    fx(state,{type:"flash",cells:it.attackCells.map(c=>({...c}))});
    dealDamage(state,u,9,"自壊"); // 自壊死が死亡時爆発(ENEMY_DEFS.boom)を起こし周囲を薙ぐ
    return;
  }
  if(it.attackCells.length){
    fx(state,{type:"flash",cells:it.attackCells.map(c=>({...c})),beam:!!it.fire});
    let struck=false; // 苛立ち検知: この攻撃が誰か(敵味方問わず)に届いたか
    for(const c of it.attackCells){
      const v=unitAt(enc,c.x,c.y);
      if(!v){
        // 狙い撃ち(単体予告)の空振り=プレイヤーが回避した瞬間(L-003)
        if(!it.aura && !it.fire) fx(state,{type:"float",x:c.x,y:c.y,text:"回避!",cls:"good"});
        continue;
      }
      // 同士討ち解禁: 予告マスにいる者は敵味方問わず喰らう(誘導が戦術になる)
      if(it.fire){ if(v.id!==u.id){
        struck=true;
        let dm=it.dmg;
        // グレイズ: 十字の交点だけが直撃。片翼は掠り(半減) — 「半分逃げれば半分助かる」のニアミス報酬
        if(it.cross && !(v.y===it.cross.row && v.x===it.cross.col)){
          dm=Math.max(1,dm-1);
          fx(state,{type:"float",x:v.x,y:v.y,text:"掠り!",cls:"good"});
          log(state,`${v.name}は十字の翼を掠めただけだ(半減)`,"good");
        }
        dealDamage(state,v,dm,u.name+"の主砲");
      } }
      else if(v.id!==u.id){
        struck=true;
        if(v.side!=="player"){ log(state,`${u.name}の攻撃が${v.name}に当たった! 同士討ちだ`,"good"); chron(state,"friendly",{by:u.name,hit:v.name}); }
        dealDamage(state,v,it.dmg,u.name+"の攻撃");
      }
    }
    if(it.fire){ u.charge=null; u.chargeCross=null; log(state,`${u.name} が直線を焼き払った!`,"bad"); }
    // 苛立ちカウンタ: 狙い撃ち(単体予告)が連続空振り=同じ空振りループに入っている兆候
    if(!it.fire && !it.aura){ u.whiffs = struck ? 0 : (u.whiffs||0)+1; }
  }
}

// 敵フェイズを1体ずつ進める(UIアニメ用)。完了時 endcheck へ。
function enemyStep(state){
  const enc=state.enc;
  if(!enc || enc.step!=="enemy") return {done:true};
  if(enc.enemyIdx===null||enc.enemyIdx===undefined) enc.enemyIdx=0;
  while(enc.enemyIdx < enc.intents.length){
    const it=enc.intents[enc.enemyIdx++];
    const u=unitById(enc,it.unitId);
    if(!u||!u.alive) continue;
    execIntent(state,it);
    return {done:false, unitId:it.unitId};
  }
  enc.enemyIdx=null;
  enc.step="endcheck";
  pump(state);
  return {done:true};
}
function enemyPhaseAll(state){ let g=0; while(g++<50){ if(enemyStep(state).done) break; } }
function nextActingEnemy(state){
  const enc=state.enc;
  if(!enc||enc.step!=="enemy") return null;
  const start=enc.enemyIdx||0;
  for(let i=start;i<enc.intents.length;i++){
    const u=unitById(enc,enc.intents[i].unitId);
    if(u&&u.alive) return u.id;
  }
  return null;
}

// ---- 太陽フレア(Z4環境ギミック): 3の倍数ラウンドに行を予告→翌ラウンド頭に焼く(敵味方無差別) ----
function scheduleFlare(state){
  const enc=state.enc, zt=ZONE_TABLE[state.run.zone-1];
  if(!zt.flare || state.run.tutorial || enc.flareRow!==null) return;
  if(enc.round%3===0){
    enc.flareRow=Math.floor(state.rand()*CONFIG.GRID);
    log(state,`☀ 太陽フレア接近 — 次のラウンド頭、第${enc.flareRow+1}行を焼く(敵味方無差別)。退避するか、敵を置き去りにしろ`,"warn");
  }
}
function fireFlare(state){
  const enc=state.enc;
  if(enc.flareRow===null||enc.flareRow===undefined) return;
  const y=enc.flareRow; enc.flareRow=null;
  log(state,`☀ 太陽フレア直撃! 第${y+1}行が焼かれた`,"bad");
  fx(state,{type:"flash",cells:rowCells(y),beam:true});
  for(const u of [...aliveUnits(enc)]){
    if(u.y===y) dealDamage(state,u,1,"太陽フレア");
  }
}

// ---- round pump ----
function checkCleared(state){
  const enc=state.enc;
  if(!enc.cleared && enemies(enc).length===0){ enc.cleared=true; return true; }
  return enc.cleared;
}

function takeSnapshot(state){
  const enc=state.enc;
  state._snap={
    units: JSON.parse(JSON.stringify(enc.units)),
    intents: JSON.parse(JSON.stringify(enc.intents)),
    round: enc.round, cleared: enc.cleared, driftMoves: enc.driftMoves,
    locs: state.run.cards.map(c=>c.loc),
    logLen: state.run.log.length,
  };
}
function canUndo(state){
  return !!(state.enc && state._snap && state.enc.step==="player");
}
function undoTurn(state){
  const enc=state.enc, s=state._snap;
  if(!canUndo(state)) return {ok:false,msg:"今はやり直せない"};
  state.run.undoCount=(state.run.undoCount||0)+1; // 船長診断: 熟慮の指標
  enc.units=JSON.parse(JSON.stringify(s.units));
  enc.intents=JSON.parse(JSON.stringify(s.intents));
  enc.round=s.round; enc.cleared=s.cleared; enc.driftMoves=s.driftMoves;
  enc.pending=null; enc.awaitEnd=false; enc.dmgQueue=[]; enc.fxQueue=[]; enc.wrapFx=[]; enc.crashSalvage=0;
  state.run.cards.forEach((c,i)=>{ c.loc=s.locs[i]; });
  if(state.run.log.length>s.logLen) state.run.log.splice(0, state.run.log.length-s.logLen);
  log(state,"⟲ 航法コンピュータ巻き戻し — このターンをやり直す");
  return {ok:true};
}

function pump(state){
  const enc=state.enc;
  for(;;){
    if(state.run.over||!enc) return;
    if(enc.dmgQueue.length){ enc.phase="damage"; return; }
    if(enc.crashSalvage>0){ enc.phase="crashsalvage"; return; } // カード回収 or 船体修理(常に価値がある)
    if(checkCleared(state)){ enc.phase="cleared"; return; }
    switch(enc.step){
      case "drift": enc.phase="drift"; return; // driftPhase() が進める(慣性解決ビート)
      case "intents":
        fireFlare(state); if(state.run.over) return;
        planIntents(state);
        scheduleFlare(state);
        enc.step="upkeep"; break;
      case "upkeep": {
        const hand=cardsIn(state,"hand");
        if(hand.length<2){
          const discard=cardsIn(state,"discard");
          if(hand.length+discard.length<2){ runOver(state,false,"exhausted"); return; }
          enc.phase="rest"; enc.step="rest"; return;
        }
        enc.phase="player"; enc.step="player"; enc.pending=null; enc.awaitEnd=false;
        takeSnapshot(state);
        return;
      }
      case "rest": enc.phase="rest"; return;   // doRest が進める
      case "player": enc.phase="player"; return; // UI が進める(crashsalvage等の割込み後に確実に復帰)
      case "enemy": enc.phase="enemy"; return; // enemyStep / enemyPhaseAll が進める
      case "endcheck": enc.round++; state.run.totalRounds++; enc.step="drift"; break;
      default: return;
    }
  }
}

// ---- crash salvage ----
function crashSalvagePick(state, uid){
  const enc=state.enc;
  if(!enc||enc.phase!=="crashsalvage") return {ok:false,msg:"not salvage phase"};
  const c=cardByUid(state,uid);
  if(!c||c.loc!=="discard") return {ok:false,msg:"消耗パイルから選んでください"};
  // 掃討完了後の回収→手札は戦域終了で蒸発する(FB: 「カード復活してない気がする」の正体)。
  // その場合は改修(恒久強化+)して持ち帰る — 耐久価値に振り替える
  if(enemies(enc).every(e=>!e.alive)){
    if(c.up) return {ok:false,msg:"改修余地なし(強化済み) — 別のカードか装甲板を"};
    c.loc="pool"; c.up=true; enc.crashSalvage--;
    log(state,`残骸改修 — 『${defOf(c).name}』を強化(+)して持ち帰った`,"good");
    pump(state);
    return {ok:true};
  }
  c.loc="hand"; enc.crashSalvage--;
  log(state,`残骸サルベージ — 『${defOf(c).name}』を手札に回収した`,"good");
  // 残骸の熱: 回収カードはこの戦域中、強化(+)相当で動く(装甲板+1との天秤を本物の二択にする)
  if(!c.up){ c.hot=true; log(state,`残骸の熱が移った — 『${defOf(c).name}』はこの戦域中+扱いだ`,"good"); }
  pump(state);
  return {ok:true};
}

// ---- rest (GH準拠: 成り行き=ランダム無償 / 自選=船HP-1) ----
function doRest(state, mode, loseUid){
  const enc=state.enc;
  if(enc.step!=="rest") return {ok:false,msg:"not rest phase"};
