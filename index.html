// ---------- battle: intent overlays ----------
function intentOverlays(){
  const cells={}; // key -> {threat:[{i,name,dmg}], charge:[...], move:[{i,icon,dirCh}]}
  if(!S.enc) return cells;
  const get=k=>cells[k]||(cells[k]={threat:[],charge:[],move:[]});
  S.enc.intents.forEach((it,i)=>{
    const u=unitById(S.enc,it.unitId); if(!u||!u.alive) return;
    for(const c of it.attackCells) get(c.x+","+c.y).threat.push({i:i+1,name:u.name,dmg:it.dmg,fire:it.fire});
    const chg=it.chargeCells || (u.charge&&!it.fire?u.charge:null);
    if(chg) for(const c of chg) get(c.x+","+c.y).charge.push({i:i+1,name:u.name});
    if(it.moveTo) get(it.moveTo.x+","+it.moveTo.y).move.push({i:i+1,icon:u.icon,dirCh:it.teleport?"✦":(it.moveDir?DIRS[it.moveDir].ch:"")});
    if(it.summon) get(it.summon.x+","+it.summon.y).move.push({i:i+1,icon:ENEMY_DEFS[it.summon.type||"mine"].icon,dirCh:"⊕"});
  });
  return cells;
}

function driftGhosts(){
  // uid -> 滑り先表示 {key, icon, ch, boom, tt}
  const out=[];
  if(!S.enc) return out;
  for(const u of aliveUnits(S.enc)){
    if(!u.drift) continue;
    const d=DIRS[u.drift];
    const nx=wrap(u.x+d.x), ny=wrap(u.y+d.y);
    const occ=unitAt(S.enc,nx,ny);
    if(occ){
      const ally=u.side==="player"&&occ.side==="player";
      out.push({key:nx+","+ny, icon:"💥", ch:d.ch, boom:true,
        tt:attrEsc(`<b>衝突予報</b>: ${esc(u.name)}が滑ってきて${esc(occ.name)}に${ally?"接触(味方同士: 停止のみ・無傷)":"激突 — <b>双方1ダメージ</b>"}`)});
    } else {
      const w=S.enc.well;
      const wellNote=(w && tdist({x:nx,y:ny},w)<=1 && !(nx===w.x&&ny===w.y))?"<br>⚠ 滑り先は重力渦の隣 — ラウンド頭、さらに渦へ引き込まれる":"";
      out.push({key:nx+","+ny, icon:u.icon, ch:d.ch, boom:false,
        tt:attrEsc(`🌀 <b>慣性</b>: ${esc(u.name)}は次のラウンド開始時、ここまで滑る(${d.ch})。<br>${u.side==="player"?"滑りたくなければ『制動』。":"これを読んで位置取りしろ。"}${wellNote}`)});
    }
  }
  return out;
}

function selectableCells(){
  // units値: "must"=一次(今選ぶべき) / "switch"=二次(任意の交代/予約) / "target"=攻撃対象(一次)
  const res={cells:{}, units:{}, dirs:false, blocked:{}};
  const enc=S.enc;
  if(!enc||enc.step!=="player") return res;
  // ユニット先行選択(タクティクスの文法): ペア未選択時も自軍ユニットはクリック可
  if(!enc.pending){
    for(const p of players(enc)) res.units[p.id]="switch";
    return res;
  }
  if(UI.actIdx===null) return res;
  if(enc.pending[UI.actIdx] && enc.pending[UI.actIdx].done) return res;
  const spec=actionSpec(S,UI.actIdx);
  if(UI.mode==="unit"){ for(const p of players(enc)) res.units[p.id]="must"; return res; }
  if(UI.mode!=="target") return res;
  const unit=unitById(enc,UI.unitId);
  if(!unit) return res;
  // 対象選択中でも操縦ユニットはワンクリックで切替可能(L-006)
  for(const p of players(enc)) if(p.id!==UI.unitId) res.units[p.id]="switch";
  switch(spec.kind){
    case "move": case "brake_move":
      for(const o of moveOptions(S,unit,spec)){
        const k=o.x+","+o.y;
        (res.cells[k]=res.cells[k]||{x:o.x,y:o.y,opts:[]}).opts.push(o);
      }
      for(const b of moveBlocked(S,unit,spec)){
        const k=b.x+","+b.y;
        if(!res.cells[k]) res.blocked[k]=b;
      }
      if(spec.kind==="brake_move") res.cells[unit.x+","+unit.y]={x:unit.x,y:unit.y,opts:[{x:unit.x,y:unit.y,dir:null,stay:true}]};
      break;
    case "warp":
      for(let x=0;x<CONFIG.GRID;x++)for(let y=0;y<CONFIG.GRID;y++) if(!unitAt(enc,x,y)) res.cells[x+","+y]={x,y,opts:[{x,y,dir:null}]};
      break;
    case "ram":
      for(const o of ramOptions(S,unit,spec)){
        const k=o.x+","+o.y;
        (res.cells[k]=res.cells[k]||{x:o.x,y:o.y,opts:[]}).opts.push(o);
      }
      break;
    case "setdrift":
      res.dirs=UI.multi.length===1;
      for(const t of attackTargets(S,unit,spec)) res.units[t.id]="target";
      break;
    case "attack": case "attack_line": case "push": case "pull": case "attack_multi":
      for(const t of attackTargets(S,unit,spec)) res.units[t.id]="target";
      break;
    default: break;
  }
  return res;
}

function forecastTT(unit,spec,t){
  // 攻撃/押し/引きの結果予測ツールチップ
  if(spec.kind==="attack"||spec.kind==="attack_line"||spec.kind==="attack_multi"||spec.kind==="attack_all"){
    const armor=(t.side!=="player"&&(ENEMY_DEFS[t.type]||{}).armor)?1:0;
    const eff=Math.max(0,effDamage(t,spec.dmg)-armor);
    const after=t.hp-eff;
    return attrEsc(`<b>予測</b>: 攻撃${spec.dmg}${t.shield?` − 🛡${t.shield}`:""}${armor?" − 🦀装甲1":""} → <b>${eff}ダメージ</b><br>HP ${t.hp} → ${Math.max(0,after)}${after<=0?' <span class="kill">撃破!</span>':""}${armor?"<br><span style='color:#9aa7c4'>物理(衝突/激突/爆発)なら装甲は素通し</span>":""}`);
  }
  if(spec.kind==="push"||spec.kind==="pull"){
    const dk = spec.kind==="push" ? dirBetweenUI(unit,t) : dirBetweenUI(t,unit);
    const n = spec.kind==="push" ? spec.n : Math.min(spec.n,Math.max(0,LK.tdist(unit,t)-1));
    const sim=predictForce(t,dk,n);
    let s=`<b>予測</b>: ${DIRS[dk].ch}へ${spec.kind==="push"?"押し出す":"引き寄せる"}`;
    if(spec.dmg) s+=` + ${spec.dmg}ダメージ`;
    if(sim.hit) s+=`<br>💥 途中で${esc(sim.hit)}に激突 — 双方1ダメージ`;
    else s+=`<br>移動後、${DIRS[dk].ch}向きのドリフト付与(次ラウンドさらに滑る)`;
    return attrEsc(s);
  }
  if(spec.kind==="setdrift") return attrEsc("対象を選んでから方向ボタンでドリフトを書き換える");
  return unitTT(t);
}
function dirBetweenUI(a,b){
  const dx=tdelta(a.x,b.x), dy=tdelta(a.y,b.y);
  if(Math.abs(dx)>=Math.abs(dy)) return dx>0?"right":(dx<0?"left":(dy>0?"down":"up"));
  return dy>0?"down":"up";
}
function predictForce(t,dirKey,n){
  const d=DIRS[dirKey]; let x=t.x,y=t.y;
  for(let i=0;i<n;i++){
    const nx=wrap(x+d.x), ny=wrap(y+d.y);
    const occ=unitAt(S.enc,nx,ny);
    if(occ) return {hit:occ.name,x,y};
    x=nx;y=ny;
  }
  return {hit:null,x,y};
}

function promptText(){
  const enc=S.enc;
  if(!enc) return "";
  if(enc.phase==="damage"||enc.phase==="rest"||enc.phase==="restshift"||enc.phase==="cleared") return "";
  if(enc.phase==="drift") return `<span style="color:var(--cyan)">🌀 慣性解決中…</span>`;
  if(enc.phase==="enemy"||enc.step==="enemy") return `<span style="color:var(--red)">敵の行動中…</span>`;
  if(enc.step!=="player") return "";
  if(enc.awaitEnd) return `行動完了 — <span class="sub">⟲でやり直すか、「敵ターンへ」で確定</span>`;
  if(!enc.pending){
    if(UI.selA) return `1枚目: 『${esc(defOf(cardByUid(S,UI.selA.uid)).name)}』の${UI.selA.half==="top"?"▲航行":"▼戦闘"} — <b style="color:var(--cyan)">${UI.selA.half==="top"?"2枚目は▼戦闘面":"2枚目は▲航行面"}</b> <span class="sub">(2枚は必ず反対の半面を使う — 光っている側)</span>`;
    return `手札から2枚選べ — <span class="sub">1枚目はクリックした側(▲航行/▼戦闘)。先にユニットをクリックして操縦予約もできる</span>`;
  }
  if(UI.actIdx===null) return `実行する行動をチップから選べ <span class="sub">(既定は▲航行が先 — 戦闘を先にしたければそのチップをクリック)</span>`;
  const spec=actionSpec(S,UI.actIdx);
  if(UI.mode==="unit") return `『${esc(spec.label)}』— <span class="sub">どっちにやらせる? 🚀旗艦 か 🛰️随伴機 をクリック</span>`;
  if(UI.mode==="target"){
    if(spec.kind==="move") return `光るマスをクリックで移動(ちょうど${spec.n}マス) <span class="sub">操縦: ${esc((unitById(S.enc,UI.unitId)||{}).name||"")} — もう片方のユニットをクリックで交代 / ホバーで滑り先プレビュー</span>`;
    if(spec.kind==="brake_move") return `移動先をクリック(自分のマス=その場で制動) <span class="sub">制動済み: 移動後も滑らない</span>`;
    if(spec.kind==="warp") return `ワープ先の空きマスをクリック`;
    if(spec.kind==="ram") return `光る到達マスをクリック(突進) <span class="sub">(同じマスに2方向から届くときはマス上の矢印で向きを選ぶ)</span>`;
    if(spec.kind==="setdrift") return UI.multi.length?`方向ボタンでドリフトを書き換えろ`:`対象の敵をクリック`;
    if(spec.kind==="attack_multi") return `対象を最大${spec.count}体クリック → 確定`;
    if(spec.kind==="salvage") return `回収するカードを選べ`;
    return `赤く光る対象をクリック <span class="sub">(カーソルを乗せるとダメージ予測)</span>`;
  }
  return "";
}

      } else {
        const hint = selKind==="must" ? "👆 このユニットをクリックして実行先に選ぶ"
          : selKind==="switch" ? (enc.pending?"👆 クリックで操縦交代":"👆 クリックで操縦予約(次のペアの既定操縦になる)") : null;
        utt=unitTT(u,hint);
      }
      const hp=Array.from({length:u.maxHp},(_,i)=>`<i class="${i<u.hp?"":"off"}"></i>`).join("")
        + Array.from({length:u.shield},()=>`<i class="sh"></i>`).join("");
      const drift=u.drift?`<span class="drift">${DIRS[u.drift].ch}</span>`:"";
      const badge=u.side==="enemy"&&badgeOf[u.id]?`<span class="badgeN">${badgeOf[u.id]}</span>`:"";
      inner+=`<div class="unit ${pcls}${ucls}" data-uid="${u.id}" ${uclick} ${ehover} data-tt="${utt}">
        <div class="uinner">${badge}${drift}${unitSvg(u)}<span class="nm">${esc(trText(u.name).slice(0,LANG==="en"?14:6))}</span><div class="hp">${hp}</div></div></div>`;
    }
    const ttAttr=cellTT.length?`data-tt="${attrEsc(cellTT.join("<br>"))}"`:"";
    grid+=`<div class="${cls}" data-xy="${key}" ${ttAttr} ${click} ${hover}>${inner}</div>`;
  }
  grid+="</div>";

  // hand
  const hand=cardsIn(S,"hand");
  const pend=enc.pending;
  let handHtml=`<div id="hand">`;
  let hi=0;
  for(const c of hand){
    // 手元トレイの弧(Sol処方: 左右±3°・両端8px沈み。holo3時のみCSSが参照)
    const mid=(hand.length-1)/2, ft=mid>0?(hi-mid)/mid:0;
    const fanStyle=`style="--fan:${(ft*3).toFixed(2)}deg;--fy:${(Math.pow(Math.abs(ft),1.6)*8).toFixed(1)}px"`;
    hi++;
    const d=defOf(c);
    const inPend=pend&&pend.find(p=>p.uid===c.uid);
    const aSel=UI.selA&&UI.selA.uid===c.uid;
    const lock=(pend&&!inPend);
    let topCls="half top", botCls="half bot";
    if(aSel&&UI.selA.half==="top") topCls+=" chosen";
    if(aSel&&UI.selA.half==="bottom") botCls+=" chosen";
    if(inPend){ if(inPend.half==="top"){topCls+=" chosen"; botCls+=" faded";} else {botCls+=" chosen"; topCls+=" faded";} }
    if(UI.selA&&!aSel&&!pend){ if(UI.selA.half==="top") topCls+=" faded"; else botCls+=" faded"; }
    if(d.top.lost) topCls+=" lostact";
    if(d.bottom.lost) botCls+=" lostact";
    const clickable = enc.step==="player" && !pend && !enc.awaitEnd;
    // 強調の文法: 次に選ぶべき半面を呼吸させる(1枚目=両面 / 2枚目=もう片方の側)
    if(clickable){
      if(!UI.selA){ topCls+=" cue-soft"; botCls+=" cue-soft"; }
      else if(!aSel){ if(UI.selA.half==="top") botCls+=" cue-soft"; else topCls+=" cue-soft"; }
    }
    // 再クリックで選択解除(L-014): ペア確定後も、まだ何も実行していなければカードクリックで解除
    const unpairable = inPend && !pend.some(q=>q.done);
    const clickAttr = h => clickable?`onclick="H.halfClick('${c.uid}','${h}')"`:(unpairable?`onclick="H.unpair()"`:"");
    const st=upSpec(d.top,c.up||c.hot,d,"top"), sb=upSpec(d.bottom,c.up||c.hot,d,"bottom");
    handHtml+=`<div class="card ${lock?"locked":""} ${d.relic?"relic-card":""}" ${fanStyle}>
      <div class="ttl">${esc(d.name)}${c.up?'<span style="color:var(--gold)">+</span>':(c.hot?'<span style="color:var(--amber)" data-tt="残骸の熱: この戦域中は強化(+)相当">+🔥</span>':"")}${d.relic?'<span class="relicmark"> ◆</span>':""}</div>
      <div class="${topCls}" data-tt="${specTT(d.name,st)}" ${clickAttr("top")}><span class="tag">▲航行${st.lost?"🔥":""}</span><br>${labelHtml(st)}</div>
      <div class="${botCls}" data-tt="${specTT(d.name,sb)}" ${clickAttr("bottom")}><span class="tag">▼戦闘${sb.lost?"🔥":""}</span><br>${labelHtml(sb)}</div>
    </div>`;
  }
  handHtml+="</div>";

  // action chips + controls
  let chips="";
  if(enc.step==="player"){
    chips=`<div id="chips" style="display:flex;gap:10px;justify-content:center;margin-top:6px;flex-wrap:wrap;">`;
    if(pend){
      pend.forEach((p,i)=>{
        const c=cardByUid(S,p.uid);
        const d=defOf(c);
        const spec=upSpec(d[p.half],c.up,d,p.half);
        const active=UI.actIdx===i;
        const cue=(UI.actIdx===null&&!p.done)?" cue":"";
        chips+=`<button ${p.done?"disabled":""} class="${active?"primary":""}${cue}" data-tt="${specTT(d.name,spec)}" onclick="H.chipClick(${i})">
          ${p.done?"✓ ":""}${esc(d.name)} ${p.half==="top"?"▲":"▼"} ${labelHtml(spec)}</button>`;
      });
      if(UI.actIdx!==null && pend[UI.actIdx] && !pend[UI.actIdx].done){
        const spec=actionSpec(S,UI.actIdx);
        if(spec.kind==="attack_multi"&&UI.multi.length) chips+=`<button class="primary" onclick="H.multiConfirm()">確定(${UI.multi.length}体)</button>`;
        const noTarget = UI.mode==="target" && ["attack","attack_line","push","pull","attack_multi","setdrift"].includes(spec.kind) && !attackTargets(S,unitById(enc,UI.unitId),spec).length;
        chips+=`<button class="danger" data-tt="${attrEsc("対象がいない/狙いを捨てる場合、この半分を不発として消費する")}" onclick="H.fizzle()">${noTarget?"対象なし — ":""}不発にする</button>`;
        chips+=`<button onclick="H.backChip()">戻る</button>`;
      }
      if(enc.awaitEnd) chips+=`<button class="primary cue" style="font-weight:800;" onclick="H.endTurn()">⚔ 敵ターンへ (Enter)</button>`;
    } else if(UI.selA){
      chips+=`<button onclick="H.cancelSel()">選び直す</button>`;
    }
    if(canUndo(S)&&(pend||UI.selA)) chips+=`<button data-tt="${attrEsc("このターンの行動(移動・攻撃・選択)を全部巻き戻す。敵ターン開始前ならいつでも可")}" onclick="H.undo()">⟲ ターンやり直し</button>`;
    chips+=`</div>`;
  }

  // direction picker
  let dirHtml="";
  if(sel.dirs){
    dirHtml=`<div style="text-align:center;margin-top:6px;">方向:
      ${DIR_KEYS.map(k=>`<button onclick="H.dirClick('${k}')">${DIRS[k].ch}</button>`).join(" ")}</div>`;
  }

  // side: intent list
  const intentList=enc.intents.map((it,i)=>{
    const u=unitById(enc,it.unitId);
    const dead=!u||!u.alive;
    const d=u?ENEMY_DEFS[u.type]:null;
    let what=[];
    if(!dead){
      if(it.teleport&&it.moveTo) what.push(`✦位相転移(慣性・衝突無視)`);
      else if(it.moveTo) what.push(`${DIRS[it.moveDir].ch}へ移動`);
      else if(it.brake) what.push("制動(その場)");
      else what.push("動かない");
      if(it.healTarget){
        const ht=unitById(enc,it.healTarget);
        if(ht&&ht.alive) what.push(`<span class="chg">📡 ${esc(ht.name)}を修復+1</span>`);
      }
      if(it.summon) what.push(`<span class="chg">${ENEMY_DEFS[it.summon.type||"mine"].icon}を産み付ける(マーカー地点)</span>`);
      if(it.detonate) what.push(`<span class="atk">💥 自爆! 周囲1マスに${it.dmg}</span>`);
      else if(it.rush) what.push(`<span class="atk">🦏 轢断突進! レーン上の最初の1体に${it.dmg}</span>`);
      else if(it.fire) what.push(`<span class="atk">直線を発射! (${it.dmg}ダメージ)</span>`);
      else if(it.chargeCells) what.push(`<span class="chg">${it.aimDir?"照準中 — 次R轢断突進":"充填中 — 次R直線発射"}</span>`);
      else if(it.attackCells.length){
        const tgt=it.attackCells.map(c=>{const v=unitAt(enc,c.x,c.y);return v&&v.side==="player"?v.name:null;}).filter(Boolean);
        what.push(`<span class="atk">${it.aura?"触手"+it.dmg:(tgt.length?esc(tgt.join("・"))+"へ攻撃"+it.dmg:"攻撃"+it.dmg+"(予告地点)")}</span>`);
      } else if(it.irked) what.push(`<span class="atk">痺れを切らした — 距離を詰めてくる</span>`);
      else if(!it.healTarget) what.push("様子見");
    }
    return `<div class="intent ${dead?"dead":""}" onmouseenter="H.hl(${i},true)" onmouseleave="H.hl(${i},false)">
      <b>${i+1} ${u?u.icon:""}${u?esc(u.name):"(撃破済み)"}</b>${dead?"":` <span class="muted">HP${u.hp}${u.drift?" 🌀"+DIRS[u.drift].ch:""}</span><br><span class="what">${what.join(" / ")}</span>`}
    </div>`;
  }).join("");
  const logHtml=S.run.log.map(l=>`<div class="${l.cls}">▸ ${esc(l.msg)}</div>`).join("");
  const driftNote=enc.phase==="drift" ? `<span class="flash">🌀 慣性解決中 — 動いた者は滑る…</span>`
    : (enc.driftMoves>0?`🌀 慣性解決: ${enc.driftMoves}体が滑った`: "");
  // 訓練航行のコーチ(状態駆動で次の一手を指示)
  let coach="";
  if(S.run.tutorial && enc.step==="player"){
    let msg;
    if(!enc.pending && !UI.selA) msg="❶ 手札からカードの<b>▲上半分(航行)</b>をクリック — 1枚目はクリックした側を使う";
    else if(!enc.pending && UI.selA) msg="❷ 2枚目のカードをクリック — 自動で<b>▼下半分(戦闘)</b>になる";
    else if(enc.pending && UI.actIdx!==null && UI.mode==="target" && !actionSpec(S,UI.actIdx).kind.startsWith("move") && !enc.awaitEnd && enc.pending.some(p=>p.done)) msg="❹ 赤く光る敵をクリックで攻撃(届かなければ「不発にする」でもOK)";
    else if(enc.pending && !enc.awaitEnd) msg="❸ 光るマスをクリックで移動。<b>端はループする</b>。黄色い機雷の近くに敵を誘うと…?";
    else if(enc.awaitEnd) msg="❺ <b>Enter</b>か「敵ターンへ」で確定。⟲でターン丸ごとやり直せる";
    if(enc.round>=2 && !msg) msg="❻ 薄い影=<b>慣性の滑り先</b>。敵を機雷に押し込む/ぶつけると<b>物理キル</b>=残骸から回収!";
    coach=msg?`<div style="background:#0c2a1a; border:1px solid var(--green); border-radius:8px; padding:6px 12px; margin:4px 0; font-size:.85rem;">📚 ${msg}</div>`:"";
  }

  const boss=enc.units.find(u=>u.alive&&(ENEMY_DEFS[u.type]||{}).boss);
  const bossBar=boss?`<div class="bossbar"><div class="fill" style="width:${Math.round(boss.hp/boss.maxHp*100)}%"></div><div class="nm">${boss.icon} ${esc(boss.name)} ${boss.hp}/${boss.maxHp}</div></div>`:"";
  app.innerHTML= hudHtml() + `
  <div id="battle">
    <div id="boardwrap">
      ${bossBar}${coach}
      <div class="muted">ラウンド ${enc.round} — <span class="sw" style="background:#3a1020;border:1px solid var(--red)"></span>赤=今R被弾予定(数字=ダメージ) <span class="sw" style="background:#3a2a10;border:1px solid var(--amber)"></span>橙=次Rに主砲 / 薄い影=<b style="color:var(--amber)">慣性の滑り先</b> / 点線=敵の移動予定</div>
      <div class="banner">${driftNote}</div>
      ${grid}
      <div id="prompt">${promptText()}${UI.msg?`<div class="sub" style="color:var(--red)">${esc(UI.msg)}</div>`:""}</div>
      ${chips}${dirHtml}
      ${handHtml}
    </div>
    <div id="side">
      <div class="panel"><h3>敵の行動予定 (この順に動く)</h3>${intentList||"<span class='muted'>掃討完了</span>"}
        <div class="legend" style="margin-top:6px;">リストにカーソルで対象マスを盤面に表示</div></div>
      <div class="panel"><h3>覚えておけ</h3><div class="legend">
        ・動いたら次R勝手に1マス滑る(<b>慣性</b>)。影が滑り先<br>
        ・止まる/曲がるにはカードが要る。<b>直進はタダ、精密は有料</b><br>
        ・盤の端は反対側につながっている(壁はない)<br>
        ・敵は${enc.intents.length?"1→"+enc.intents.length:"番号"}の順に行動。赤マスから逃げろ<br>
        ・手札が尽きると休息=<b>1枚永久ロスト</b>。カード=寿命<br>
        ・☄️機雷は<b>誘爆</b>する — 敵を押し込めば花火大会だ
      </div></div>
      <div class="panel"><h3>航行記録</h3><div id="log">${logHtml}</div></div>
    </div>
  </div>
  ${battleModal()}${hintsOverlay()}`;
}

function hintsOverlay(){
  const enc=S.enc;
  if(UI.hintsSeen||!enc||S.run.zone!==1||S.run.encIdx!==0||enc.round!==1||enc.phase!=="player") return "";
  return `<div id="overlay"><div class="modal">
    <h2>サルベージ屋の心得 (30秒で読める)</h2>
    <div class="hintlist">
      ❶ 毎ターン<b>カードを2枚</b>選ぶ。1枚目はクリックした側、2枚目は自動で<b>もう片方の側</b>(▲航行/▼戦闘)<br>
      ❷ 行動は<b>船とドローンの好きな方</b>にやらせていい。順番も自由。両方同じユニットでもいい<br>
      ❸ <b>🌀慣性</b>: 移動した者は次のラウンド開始時、同方向へ勝手に1マス滑る。<b>半透明の影が滑り先</b>。止まりたければ『制動』<br>
      ❹ <b>赤いマス</b>=このラウンド終わりに敵が撃つ場所(数字=ダメージ)。<b>敵も喰らう</b> — 触手や機雷に押し込め<br>
      ❺ カード=寿命。休息で<b>1枚永久ロスト</b>。被弾はカードで無効化できるが、それも永久に失う<br>
      ❻ <b>船体はゾーンを越えて持ち越し</b>。回復は応急パッチ/整備ドック/物理キルの残骸修理だけ<br>
      ⟲ 敵ターン前なら<b>何度でもやり直せる</b>。怖がらず試せ
    </div>
    <div class="opts"><button class="primary" onclick="H.dismissHints()">了解、行くぞ</button></div>
  </div></div>`;
}

function battleModal(){
  const enc=S.enc;
  if(!enc) return "";
  if(enc.bossIntro){
    const bu=enc.units.find(u=>u.alive&&(ENEMY_DEFS[u.type]||{}).boss);
    const bd=bu?ENEMY_DEFS[bu.type]:ENEMY_DEFS.apex;
    return `<div id="overlay"><div class="warnband">
      <h1>⚠ WARNING ⚠</h1>
      <p style="color:var(--amber); font-size:1.1rem; margin:8px 0;">桁外れのエネルギー反応</p>
      <p style="font-size:1.4rem; font-weight:900; letter-spacing:.15em;">《${esc(bd.title)}》${esc(bd.name)}</p>
      <p class="muted" style="margin:10px 0;">${esc(bd.hint)}</p>
      <div class="opts" style="justify-content:center;"><button class="danger lkbtn cue" onclick="H.bossEngage()">交戦開始</button></div>
    </div></div>`;
  }
  if(enc.phase==="damage"){
    const q=pendingDamage(S);
    const u=unitById(enc,q.unitId);
    if(!u||!u.alive){ setTimeout(()=>{ resolveDamage(S,"hp"); render(); },50); return ""; }
    const eff=Math.max(0,q.dmg-u.shield);
    const burnable=[...cardsIn(S,"hand"),...cardsIn(S,"discard")];
    if(eff<=0){ setTimeout(()=>{ resolveDamage(S,"hp"); render(); },350);
      return `<div id="overlay"><div class="modal"><h2>🛡 シールドが${esc(q.src)}を弾いた!</h2></div></div>`; }
    return `<div id="overlay"><div class="modal">
      <h2>被弾! ${esc(u.name)} に ${esc(q.src)} — ${eff}ダメージ</h2>
      <p class="muted">装甲で受けるか、カードを燃やして無効化するか。燃やしたカードは永遠に失われる(寿命と引き換えの命)。</p>
      <div class="opts">
        <button class="danger" onclick="H.dmgHp()">装甲で受ける (HP ${u.hp}→${Math.max(0,u.hp-eff)}${u.hp-eff<=0?" ⚠"+(u.id==="ship"?"ラン終了":"大破"):""})</button>
      </div>
      ${burnable.length?`<p style="margin-top:12px;">または、カードを燃やして<b>完全無効化</b>(永久ロスト):</p>
      ${cardPickFaces(burnable,"H.dmgBurn")}`:""}
    </div></div>`;
  }
  if(enc.phase==="rest"){
    const all=[...cardsIn(S,"hand"),...cardsIn(S,"discard")];
    const ship=unitById(enc,"ship");
    if(!UI.restChoosing){
      return `<div id="overlay"><div class="modal">
        <h2>強制休息 — 手札が尽きた</h2>
        <p class="muted">消耗カードはすべて手札に戻る。だが1枚だけ、宇宙に手放さなければならない。<br>このターン、敵は待ってくれない。</p>
        <p class="muted" style="color:var(--amber);">⏳ 補給には、このターンを丸ごと使う — 直後に許されるのは<b>1マスの姿勢制御だけ</b>だ。</p>
        <div class="pickgrid">${all.map(c=>cardFaceHtml(c,{mini:true})).join("")}</div>
        <div class="opts">
          <button class="primary" onclick="H.restRandom()" data-tt="${attrEsc("どれを失うかは宇宙が決める。タダで済むが、◆遺物カードが流れるかもしれない")}">成り行きに任せる (ランダム・無償)</button>
          <button class="danger" ${ship.hp>1?"":"disabled"} onclick="H.restChoose()" data-tt="${attrEsc("船体を軋ませて選別する。失うカードを自分で選べるが、旗艦のHPを1払う"+(ship.hp<=1?"<br><b>HP1のため選べない</b>":""))}">自ら選ぶ (旗艦HP ${ship.hp}→${ship.hp-1})</button>
        </div>
      </div></div>`;
    }
    return `<div id="overlay"><div class="modal">
      <h2>選別 — どれをエアロックから出す?</h2>
      <p class="muted">船体がHP1分軋む。選んだカードは永遠に失われる。</p>
      ${cardPickFaces(all,"H.restLose")}
      <div class="opts"><button onclick="H.restBack()">やはり成り行きに任せる</button></div>
    </div></div>`;
  }
  if(enc.phase==="restshift"){
    const opts=restShiftOptions(S);
    // ov-side: 暗幕なしで下部ドッキング=盤面(赤マス予告)を見ながら選べる(FB)。盤の光るマスをクリックでも選択可
    return `<div id="overlay" class="ov-side"><div class="modal">
      <h2>🛞 姿勢制御 — 1マスだけ身をよじれる</h2>
      <p class="muted">補給にこのターンを使った。できるのは<b>1体を1マス</b>ずらすことだけ(慣性はそのまま)。<br>
      <b style="color:var(--cyan)">盤の光るマスをクリック</b>して敵の赤マス予告から逃げろ — ボタンでも選べる。</p>
      <div class="opts" style="flex-wrap:wrap;">${opts.map(o=>`<button onclick="H.rshift('${o.unitId}','${o.dir}')" data-tt="${attrEsc((o.unitId==="ship"?"旗艦":"随伴機")+"を("+o.x+","+o.y+")へ。ドリフトは変わらない")}">${o.unitId==="ship"?"🚀":"🛰️"} ${DIRS[o.dir].ch}</button>`).join("")}</div>
      <div class="opts"><button class="primary" onclick="H.rskip()">そのまま耐える</button></div>
    </div></div>`;
  }
  if(enc.phase==="crashsalvage"){
    // 爆発とスタンプを見せてからモーダルを出す(祝福を遮らない)
    if(!UI.salvageReady){
      if(!UI.salvageTimer) UI.salvageTimer=setTimeout(()=>{UI.salvageReady=true; UI.salvageTimer=null; render();},META.fxLite?150:800);
      return "";
    }
    const cleared=enemies(enc).every(e=>!e.alive); // 掃討済み=手札回収は戦域終了で蒸発する→改修(恒久+)に切替(FB)
    const opts=cardsIn(S,"discard").filter(c=>!cleared||!c.up);
    const ship=unitById(enc,"ship");
    return `<div id="overlay"><div class="modal">
      <h2>💥 物理キル! — 残骸サルベージ${enc.crashSalvage>1?` (残り${enc.crashSalvage}回)`:""}</h2>
      <p class="muted">漂う残骸から何を剥ぎ取る? <span style="color:var(--green)">敵をぶつけて壊す — それがこの宇宙の正しい錬金術。</span></p>
      <div class="opts"><button class="primary" ${ship.hp<ship.maxHp?"":"disabled"} onclick="H.crashRepair()" data-tt="${attrEsc("装甲板を引き剥がして船体に当てがう。船体は次のゾーンへ持ち越されるぞ")}">🔧 装甲板 — 旗艦HP+1 (${ship.hp}/${ship.maxHp})</button></div>
      ${opts.length?`<p style="margin-top:8px;">${cleared

// 敵ターンを1体ずつアニメーション実行
function maybeRunEnemyPhase(){
  if(!S.enc||S.enc.phase!=="enemy"||UI.stepping||S.run.over) return;
  UI.stepping=true;
  (async()=>{
    try{
      if(holoOn() && !META.fxLite) document.body.classList.add("gaze-lean"); // 視線: 敵の手番に身を乗り出す
      document.body.classList.add("enemy-turn"); // 端末/HUDのブラケットが琥珀へ(モード文法 — P4)
      let guard=0;
      const dl=META.fxLite?110:430, dl2=META.fxLite?90:400;
      while(S.enc && S.enc.step==="enemy" && !S.run.over && guard++<20){
        UI.acting=nextActingEnemy(S);
        if(UI.acting){ renderBattle(document.getElementById("app")); flip(); drainFx(); await sleep(dl); }
        const r=enemyStep(S);
        renderBattle(document.getElementById("app")); flip(); drainFx();
        if(r.done) break;
        await sleep(dl2);
      }
    } finally {
      document.body.classList.remove("gaze-lean");
      document.body.classList.remove("enemy-turn");
      UI.acting=null; UI.stepping=false;
      render();
    }
  })();
}

// ---------- summary ----------
function renderSummary(app){
  const run=S.run;
  const cv=cargoValue(S);
  const ct = run.captain || (run.captain = LK.captainType(S)); // 船長診断(ラン内で1回だけ計算)
  // メタ進行の確定(一度だけ): クレジット加算はボーナス分+遺物は売却/インストールの選択制
  if(!run.metaApplied && !run.tutorial){
    run.metaApplied=true;
    run.rewardMult=rewardMultiplier(run);
    if(run.creditCarry>0) META.credits+=run.creditCarry; // ラン内クレジット残額を1:1で持越(勝敗共通・metaApplied内で1回だけ)
    // ローカル戦績(トップ5)
    META.history=META.history||[];
    META.history.push({score:run.score??runScore(S), zone:run.zone, ship:run.shipId, asc:run.asc, win:run.win,
      risk:(run.contracts||[]).length, legend:!!run.bossKilled, type:ct.name, date:new Date().toISOString().slice(5,10)});
    META.types=META.types||{}; META.types[ct.id]=(META.types[ct.id]||0)+1; // 型図鑑(8種コンプ=リプレイ動機)
    // 瞬間図鑑: このランで起きたドラマを解禁(初回はNEW表示)
    META.moments=META.moments||{};
    run.newMoments=[];
    for(const mid of LK.computeMoments(run)){
      if(!META.moments[mid]) run.newMoments.push(mid);
      META.moments[mid]=(META.moments[mid]||0)+1;
    }
    META.history.sort((a,b)=>b.score-a.score);
    run.rank=META.history.findIndex(h=>h.score===(run.score??runScore(S)))+1;
    META.history=META.history.slice(0,5);
    META.runs++;
    META.bestZone=Math.max(META.bestZone,run.zone);
    run.score=runScore(S);
    if(run.score>META.bestScore){ META.bestScore=run.score; run.newBest=true; }
    if(run.win){
      META.wins++;
      run.bonusPay=LK.settlementValue(S,[]); // pre0: bonusValue×深度×安全帰還(空カーゴ精算=床)。遺物分は下の売却で望遠鏡和として積む
      META.credits+=run.bonusPay;
      // 危険手当: 契約1件につき₢2(実利は線形 — 名誉は称号で青天井、が荒れない鉄則)
      if((run.contracts||[]).length){ run.contractPay=run.contracts.length*2; META.credits+=run.contractPay; }
      META.bestValue=Math.max(META.bestValue,cv);
      // アセンション解放: 現在の挑戦レベルで勝つと次が開く
      if(run.asc>=META.maxAsc && META.maxAsc<3){ META.maxAsc=run.asc+1; run.ascUnlocked=ASC_DEFS[META.maxAsc].name; }
      sfx("good");
    } else {
      // 負けても拾うものはある(アンロックドリップ)
      run.lossCredits=lossCredits(S);
      META.credits+=run.lossCredits;
      sfx("bad");
    }
    saveMeta();
  }

    return `<tr><td>◆${esc(r.name)}</td><td>${r.rare?"★レア":"コモン"}</td><td>${act}</td></tr>`;

      <div style="color:var(--red);font-weight:800;">☠ 敗因: ${esc(dc.cause)}</div>
      <div style="color:var(--cyan);margin-top:4px;">▸ 次の一手: ${esc(dc.tip)}</div>
    </div>`:"";})()}
    <div class="panel" style="margin-top:18px;">
      <h3>ラン記録</h3>
      <div style="text-align:center; margin:6px 0 12px;">
        <div class="muted">SCORE — 挑戦: ${esc(ASC_DEFS[run.asc].name)} / ${esc(shipDef(run.shipId).name)}${(run.contracts||[]).length?` / <span style="color:var(--amber)">☠契約${run.contracts.length} ×${LK.contractMult(run).toFixed(1)}</span>`:""}${(run.chainBest||0)>=2?` / <span style="color:var(--gold)">🎆最大連鎖×${run.chainBest}</span>`:""}</div>
        <div id="scoreNum" style="font-size:3.2rem; font-weight:900; color:var(--gold); text-shadow:0 0 24px #ffd70055; letter-spacing:.04em;">0</div>
        ${run.newBest?'<div class="bestburst">★ 自己ベスト更新! ★</div>':(run.rank&&run.rank<=5?`<div style="color:var(--cyan);font-weight:800;">🏆 歴代${run.rank}位</div>`:"")}
        ${run.win&&(run.contracts||[]).length>=3?`<div style="color:var(--gold);font-weight:800;">☠ 称号『${run.contracts.length>=5?"狂気の契約者":"鉄の契約者"}』 — 契約${run.contracts.length}件を生き延びた</div>`:""}
        ${(run.newMoments&&run.newMoments.length)?`<div style="margin-top:8px;">${run.newMoments.map(mid=>{const m=LK.momentDefs().find(x=>x.id===mid);return m?`<span class="cargochip" style="border-color:var(--gold);color:var(--gold);" data-tt="${attrEsc("瞬間図鑑に刻まれた: "+esc(m.hint))}">✦NEW ${m.icon}${esc(m.name)}</span>`:"";}).join(" ")}</div>`:""}

  },
  eventGraveDig(){
    if(S.rand()<0.6){
      const pool=RELIC_DEFS.filter(r=>!r.rare&&!S.run.relicsSeen.includes(r.id));

      if(r){ S.run.relicsSeen.push(r.id); S.run.cargo.push(r.id); LK.log(S,`墓標の中から『${r.name}』を見つけた(封印済みとしてカーゴへ)`,"good"); }

  halfClick(uid,half){

    if(S.enc.awaitEnd) return;
    if(!UI.selA){ UI.selA={uid,half}; }
    else if(UI.selA.uid===uid){ UI.selA= UI.selA.half===half?null:{uid,half}; }
    else {
      const r=selectPair(S,UI.selA.uid,UI.selA.half,uid);

  cancelSel(){ UI.selA=null; UI.msg=""; render(); },

    const enc=S.enc;
    if(enc.pending && !enc.pending.some(p=>p.done)){ enc.pending=null; resetUI(); sfx("click"); }
    render();
  },
  chipClick(i){
    if(!S.enc.pending||S.enc.pending[i].done) return;
    enterAction(i);
    const spec=actionSpec(S,i);
    if(spec.kind==="salvage"&&!cardsIn(S,"discard").length) UI.msg="消耗パイルが空だ — 不発にするしかない";
    render();
  },
  backChip(){ UI.actIdx=null; UI.mode="idle"; UI.multi=[]; UI.msg=""; render(); },
  unitClick(id){
    UI.msg="";
    const enc=S.enc;
    // ユニット先行選択: ペア未選択時に自軍をクリック → 次の操縦の既定にする
    if(!enc.pending && enc.step==="player"){
      const u=unitById(enc,id);
      if(u&&u.side==="player"&&u.alive){
        UI.lastUnit=id;
        fx(S,{type:"float",x:u.x,y:u.y,text:"操縦予約",cls:"good"});
        sfx("pick"); render();
      }
      return;
    }
    if(UI.mode==="unit"){
      const u=unitById(enc,id);
      if(u.side!=="player") return;
      UI.unitId=id;
      const spec=actionSpec(S,UI.actIdx);
      if(["heal","shield","attack_all","pull_all","spawnhaz"].includes(spec.kind)){
        const r=execAction(S,UI.actIdx,{unitId:id});
        if(!r.ok){ UI.msg=r.msg+"(不発も選べる)"; UI.mode="target"; }
        else afterAct();
        render(); return;
      }
      if(spec.kind==="salvage"){ UI.mode="salvage"; render(); return; }
      UI.mode="target"; render(); return;
    }
    if(UI.mode==="target"){
      const cu=unitById(enc,id);
      if(cu&&cu.side==="player"){ UI.unitId=id; UI.multi=[]; render(); return; } // 操縦ユニット切替
      const spec=actionSpec(S,UI.actIdx);
      if(spec.kind==="attack_multi"){
        if(!UI.multi.includes(id)) UI.multi.push(id);
        if(UI.multi.length>=spec.count) H.multiConfirm(); else render();
        return;
      }
      if(spec.kind==="setdrift"){ UI.multi=[id]; render(); return; }
      const r=execAction(S,UI.actIdx,{unitId:UI.unitId,targetId:id});
      if(!r.ok){ UI.msg=r.msg; } else afterAct();
      render();
    }
  },
  cellClick(x,y,dir){
    UI.msg="";
    const r=execAction(S,UI.actIdx,{unitId:UI.unitId,cell:{x,y},dir:dir||undefined});
    if(!r.ok){ UI.msg=r.msg; } else afterAct();
    render();
  },
  dirClick(k){
    UI.msg="";

    if(!r.ok){ UI.msg=r.msg; } else afterAct();

  // ---- 共有(なばて公開ループ: 診断→X→流入→診断) ----
  shareUrl(){ // 診断+挑戦状(シード)入り共有URL — 読んだ人がそのまま同じ宇宙に挑める
    const run=S.run, ct=run.captain;
    return `${SHARE_URL}?r=${encResult({n:ct.name,t:ct.title,s:run.score??LK.runScore(S),z:run.zone,w:run.win?1:0,b:run.bossKilled?1:0,sd:run.seed,ch:run.chainBest||0})}`;
  },
  shareX(){
    const run=S.run, ct=run.captain;
    if(!ct) return;
    const sc=run.score??LK.runScore(S);
    const text=LANG==="en"
      ? `[Captain Type] I'm "${trText(ct.name)}" — ${trText(ct.title)}. SCORE ${sc} / ZONE ${run.zone}${run.bossKilled?" / Tomb conquered👑":""}${(run.chainBest||0)>=3?` / Best chain ×${run.chainBest}🎆`:""} Dare my universe↓`
      : `【船長診断】私は『${ct.name}』 — ${ct.title}。SCORE ${sc} / ZONE ${run.zone}${run.bossKilled?" / 墓所制圧👑":""}${(run.chainBest||0)>=3?` / 最大連鎖×${run.chainBest}🎆`:""}${ct.subs.length?` ${ct.subs[0]}`:""} 同じ宇宙に挑めるURL↓`;
    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(H.shareUrl())}&hashtags=LeapOrKeep`,"_blank");
  },
  copyChallenge(btn){
    const ct=S.run.captain;
    if(!ct) return;
    navigator.clipboard.writeText(H.shareUrl()).then(()=>{
      if(btn) btn.textContent="⚔ コピーした — 相手に送りつけろ";
      sfx("good");
    });
  },
  challenge(sd){ location.href=location.pathname+"?seed="+sd; }, // 挑戦状を受ける: 同じシード=同じ宇宙
  toggleLang(){ LANG=LANG==="en"?"ja":"en"; META.lang=LANG; saveMeta(); document.documentElement.lang=LANG; render(); },

  saveCard(){
    const run=S.run, ct=run.captain;
    if(!ct) return;
    drawShareCard(ct,run).toBlob(b=>{
      const a=document.createElement("a");
      a.href=URL.createObjectURL(b);
      a.download=`leap-or-keep_${ct.id}.png`;
      a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),5000);
    },"image/png");
    sfx("good");
  },
  sellRelic(id){
    if(UI.sold[id]) return;
    // pre0: 限界寄与で精算(集中×深度×安全帰還を実際に払う)。未売却・未インストール集合に対する差分=売却順・分割インストールに依らず総額一致
    const pending=S.run.cargo.filter(x=>UI.sold[x]!=="sold" && UI.sold[x]!=="installed");
    const sale=LK.settlementValue(S,pending)-LK.settlementValue(S,pending.filter(x=>x!==id));
    UI.sold[id]="sold"; (UI.soldAmt=UI.soldAmt||{})[id]=sale; META.credits+=sale; saveMeta();
    UI.sellN=(UI.sellN||0)+1; sfx("salvage", 1+UI.sellN*0.18); // 連続売却でピッチ上昇(コンボ感)
    render();
  },
  installRelic(id){
    if(UI.sold[id]==="installed"||META.installed.includes(id)) return;
    UI.sold[id]="installed"; META.installed.push(id); saveMeta(); sfx("good"); render();
  },
  dismissHints(){ UI.hintsSeen=true; render(); },
  hl(i,on){
    const it=S.enc&&S.enc.intents[i];
    if(!it) return;
    const u=unitById(S.enc,it.unitId);
    const keys=[...it.attackCells.map(c=>c.x+","+c.y), ...(it.chargeCells||[]).map(c=>c.x+","+c.y)];
    if(it.moveTo) keys.push(it.moveTo.x+","+it.moveTo.y);
    for(const k of keys){
      const el=document.querySelector(`[data-xy="${k}"]`);
      if(el) el.classList.toggle("hl",on);
    }
    if(u&&u.alive){
      const el=document.querySelector(`.unit[data-uid="${u.id}"]`);
      if(el) el.classList.toggle("hl",on);
      if(HOLO){ try{ HOLO.hlUnit(u.id,on); }catch(e){ holoKill(e); } } // 3D機体も増光(DOM情報と空間内主体の同一性 — Sol D)
    }
  },
  pv(x,y,dir){
    H.pvOff();
    holoHover(x,y); // 3D: ホバーセルを1段明るく(R10)
    const enc=S.enc;
    if(!enc||!enc.pending||UI.actIdx===null) return;
    const spec=actionSpec(S,UI.actIdx);
    const u=unitById(enc,UI.unitId);
    if(!u) return;
    const cell=document.querySelector(`[data-xy="${x},${y}"]`);
    if(!cell) return;
    const g=document.createElement("span"); g.className="pvghost";
    g.innerHTML=unitSvg(u); g.firstElementChild&&g.firstElementChild.setAttribute("style","width:44px;height:44px");
    cell.appendChild(g); pvEls.push(g);
    if(spec.kind==="move"){
      const opts=moveOptions(S,u,spec);
      const o= dir ? opts.find(o=>o.x===x&&o.y===y&&o.dir===dir) : opts.find(o=>o.x===x&&o.y===y);
      if(o){
        const d=DIRS[o.dir];
        const dx=wrap(x+d.x), dy=wrap(y+d.y);
        const c2=document.querySelector(`[data-xy="${dx},${dy}"]`);
        if(c2){
          const occ=unitAt(enc,dx,dy);
          const g2=document.createElement("span"); g2.className="pvghost2";
          g2.innerHTML=(occ?"💥":"⬡")+`<i>${d.ch}</i>`;
          c2.appendChild(g2); pvEls.push(g2);
        }
      }
    } else if(spec.kind==="brake_move"||spec.kind==="warp"){
      const b=document.createElement("span"); b.className="pvbrake"; b.textContent="滑らない";
      cell.appendChild(b); pvEls.push(b);
    }
  },
  pvOff(){ holoHoverOff(); for(const el of pvEls){ try{el.remove();}catch(e){} } pvEls=[]; },
  hlU(uid,on){
    const i=S.enc?S.enc.intents.findIndex(it=>it.unitId===uid):-1;
    if(i>=0) H.hl(i,on);
  },
};

function afterAct(){
  if(UI.unitId) UI.lastUnit=UI.unitId;
  UI.multi=[];
  autoAdvance();
}

// 次の未実行アクションへ自動進行+直前ユニットを既定操縦対象に(L-006 クリック削減)
function autoAdvance(){
  const enc=S.enc;
  if(!enc||!enc.pending){ UI.actIdx=null; UI.unitId=null; UI.mode="idle"; return; }
  // FB: 既定は▲航行→▼戦闘の順(まだるっこしさ解消)。チップクリックで戦闘先行も選べる=戦略性は温存
  let idx=enc.pending.findIndex(p=>!p.done && p.half==="top");
  if(idx<0) idx=enc.pending.findIndex(p=>!p.done);
  if(idx<0){ UI.actIdx=null; UI.mode="idle"; return; }
  enterAction(idx);
}
function enterAction(idx){
  const enc=S.enc;
  UI.actIdx=idx; UI.multi=[]; UI.msg="";
  const spec=actionSpec(S,idx);
  if(["heal","shield","attack_all","pull_all","salvage","spawnhaz"].includes(spec.kind)){
    // 効果先(誰に効くか)の明示クリックが必要なアクション
    UI.unitId=null; UI.mode="unit"; return;
  }
  let u=unitById(enc,UI.lastUnit||"ship");
  if(!u||!u.alive||u.side!=="player") u=players(enc)[0];
  UI.unitId=u?u.id:null;
  UI.mode=UI.unitId?"target":"unit";
}

// キーボード: Enter/Space=敵ターンへ確定, Esc=戻る, Ctrl+Z=ターンやり直し(L-014 標準操作の約束事)
document.addEventListener("keydown",e=>{
  if(!S||S.screen!=="battle"||!S.enc) return;
  if((e.key==="Enter"||e.key===" ") && S.enc.awaitEnd){ e.preventDefault(); H.endTurn(); }
  else if(e.key==="Escape"){ cancelOneLevel(); }
  else if((e.key==="z"||e.key==="Z")&&(e.ctrlKey||e.metaKey)){ if(LK.canUndo(S)){ e.preventDefault(); H.undo(); } }
});
// 右クリック=1段階キャンセル(L-014)
document.addEventListener("contextmenu",e=>{
  if(!S||S.screen!=="battle"||!S.enc) return;
  e.preventDefault();
  cancelOneLevel();
});
function cancelOneLevel(){
  if(UI.restChoosing){ H.restBack(); return; }
  if(UI.actIdx!==null){ H.backChip(); return; }
  if(S.enc.pending && !S.enc.pending.some(p=>p.done)){ H.unpair(); return; }
  if(UI.selA){ H.cancelSel(); return; }
}

// ---------- tooltip engine ----------
(function(){
  const tt=document.getElementById("tt");
  let visible=false;
  function position(e){
    const pad=14;
    let x=e.clientX+pad, y=e.clientY+pad;
    const r=tt.getBoundingClientRect();
    if(x+r.width>innerWidth-8) x=Math.max(4,e.clientX-r.width-pad);
    if(y+r.height>innerHeight-8) y=Math.max(4,e.clientY-r.height-pad);
    tt.style.left=x+"px"; tt.style.top=y+"px";
  }
  document.addEventListener("mouseover",e=>{
    const el=e.target.closest&&e.target.closest("[data-tt]");
    if(el){ tt.innerHTML=el.dataset.tt; tt.style.display="block"; visible=true; position(e); }
    else if(visible){ tt.style.display="none"; visible=false; }
  });
  document.addEventListener("mousemove",e=>{ if(visible) position(e); });
})();

// boot
for(const sid of ["vig","titlehero","zonebg","deskbg","stars2","stars1"]){ const d=document.createElement("div"); d.id=sid; document.body.prepend(d); }
// 大判アートの存在確認(無ければ層は透明のまま)
const ART={};
function artBg(el, name){
  if(ART[name]===false){ el.classList.remove("on"); return; }
  if(ART[name]===true){ el.style.backgroundImage=`url(art/${name}.webp)`; el.classList.add("on"); return; }
  const img=new Image();
  img.onload=()=>{ ART[name]=true; el.style.backgroundImage=`url(art/${name}.webp)`; el.classList.add("on"); };
  img.onerror=()=>{ ART[name]=false; };
  img.src=`art/${name}.webp`;
}
function updateArtLayers(){
  const hero=document.getElementById("titlehero"), zone=document.getElementById("zonebg"),
        desk=document.getElementById("deskbg");
  hero.classList.remove("on"); zone.classList.remove("on"); desk.classList.remove("on");
  if(!S) return;
  if(S.screen==="title"||S.screen==="shipselect"||S.screen==="hangar"||S.screen==="summary") artBg(hero,"title-hero");
  else if(S.screen==="battle"||S.screen==="loadout"){ artBg(zone,"zone"+S.run.zone); artBg(desk,"deskbg"); }
}
// ---- 共有カード(1200×675 = X推奨OGPサイズ。スクショ前提デザイン) ----
const SHARE_URL="https://salmonellasarduri.github.io/Leap-or-Keep/";
function encResult(o){ return btoa(unescape(encodeURIComponent(JSON.stringify(o)))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function decResult(s){ try{ return JSON.parse(decodeURIComponent(escape(atob(s.replace(/-/g,"+").replace(/_/g,"/"))))); }catch(e){ return null; } }
function drawShareCard(ct,run){
  const W=1200,H2=675, cv=document.createElement("canvas");
  cv.width=W; cv.height=H2;
  const g=cv.getContext("2d");
  const bg=g.createLinearGradient(0,0,0,H2);
  bg.addColorStop(0,"#0a0f1c"); bg.addColorStop(.6,"#10142a"); bg.addColorStop(1,"#141022");
  g.fillStyle=bg; g.fillRect(0,0,W,H2);
  for(let i=0;i<140;i++){ // 星空
    g.fillStyle=`rgba(${180+Math.random()*75|0},${200+Math.random()*55|0},255,${.15+Math.random()*.6})`;
    g.beginPath(); g.arc(Math.random()*W,Math.random()*H2,Math.random()*1.6+.3,0,7); g.fill();
  }
  g.strokeStyle="#39d0ff44"; g.lineWidth=2; g.strokeRect(14,14,W-28,H2-28);
  g.textAlign="center";
  g.fillStyle="#39d0ff"; g.font="700 30px sans-serif";
  g.fillText(trText("LEAP OR KEEP — 船長診断"),W/2,76);
  g.fillStyle="#ffd24a"; g.font="900 120px sans-serif";
  g.shadowColor="#ffd24a55"; g.shadowBlur=30;
  g.fillText(trText(`『${ct.name}』`),W/2,250);
  g.shadowBlur=0;
  g.fillStyle="#7fd4ff"; g.font="800 40px sans-serif";
  g.fillText(trText(`— ${ct.title} —`),W/2,320);
  g.fillStyle="#ffb347"; g.font="600 30px sans-serif";
  g.fillText(trText(ct.jab),W/2,388);
  g.fillStyle="#e8edf7"; g.font="700 32px sans-serif";
  const sd=shipDef(run.shipId);
  g.fillText(`SCORE ${run.score??0}　/　ZONE ${run.zone}　/　${trText(sd.name)}${run.bossKilled?`　/　${trText("墓所制圧")}👑`:""}${(run.chainBest||0)>=2?`　/　${trText("最大連鎖")}×${run.chainBest}🎆`:""}`,W/2,470);
  if(ct.subs.length){ g.fillStyle="#ffd24a"; g.font="600 28px sans-serif"; g.fillText(ct.subs.map(s=>trText(s)).join("　"),W/2,524); }
  g.fillStyle="#9aa7c4"; g.font="600 26px sans-serif";
  g.fillText(`${trText("推定艦隊比")} ${ct.rarity}%　#LeapOrKeep`,W/2,586);
  g.fillStyle="#56e39f"; g.font="700 26px sans-serif";
  g.fillText(`${SHARE_URL.replace("https://","")}　—　${trText("SEEDで同じ宇宙に挑める").replace("SEED","SEED "+run.seed)}`,W/2,632);
  return cv;
}
