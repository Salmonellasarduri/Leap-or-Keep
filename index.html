  for(const c of cardsIn(state,"discard")) c.loc="hand";
  const hand=cardsIn(state,"hand");
  let c;
  if(mode==="choose"){
    const ship=unitById(enc,"ship");
    const free = state.run.freeChooseRest>0;
    if(!free && ship.hp<=1) return {ok:false,msg:"船体が持たない — 成り行きに任せるしかない"};
    c=cardByUid(state,loseUid);
    if(!c||c.loc!=="hand") return {ok:false,msg:"手札から選んでください"};
    state.run.chooseRest=(state.run.chooseRest||0)+1; // 船長診断: 制御志向の指標
    if(free){ state.run.freeChooseRest--; log(state, `静かな祈りが効いた — 無償で『${defOf(c).name}』を選んで手放した。`, "warn"); }
    else { ship.hp--; log(state, `船体を軋ませて選別(HP-1) — 『${defOf(c).name}』を手放した。`, "warn"); }
  } else {
    c=hand[Math.floor(state.rand()*hand.length)];
    log(state, `成り行きの休息 — 『${defOf(c).name}』が宇宙に流れていった。`, "warn");
    // 成り行きの見返り: 身を任せた分、整備が進む(自選HP-1との天秤を本物の二択にする)
    const dr=unitById(enc,"drone");
    if(dr&&dr.alive&&dr.hp<dr.maxHp){ dr.hp++; fx(state,{type:"float",x:dr.x,y:dr.y,text:"+1",cls:"good"}); log(state,"手を離した分、随伴機の整備が進んだ(HP+1)","good"); }
  }
  c.loc="lost"; state.run.restCount++;
  chron(state,"rest",{card:defOf(c).name,mode});
  if(cardsIn(state,"hand").length<2){ runOver(state,false,"exhausted"); return {ok:true}; }
  enc.phase="restshift"; enc.step="restshift"; // 姿勢制御へ(休息はターンを消費する — だが1マスだけ身をよじれる)
  return {ok:true};
}

// 休息中の姿勢制御: エンジンは死んでいても、1体だけ1マス動かせる(慣性はそのまま=RCS噴射)。スキップ可。
// 休息ラウンドの「無抵抗の時間」に最小限の主体性を返す — 失うカードの重さ(寿命クロック)は削らない
function restShiftOptions(state){
  const enc=state.enc; if(!enc||enc.step!=="restshift") return [];
  const opts=[];
  for(const u of players(enc)){
    if(!u.alive) continue;
    for(const k of DIR_KEYS){
      const d=DIRS[k], nx=wrap(u.x+d.x), ny=wrap(u.y+d.y);
      if(!unitAt(enc,nx,ny)) opts.push({unitId:u.id, dir:k, x:nx, y:ny});
    }
  }
  return opts;
}
function restShift(state, unitId, dirKey){
  const enc=state.enc; if(!enc||enc.step!=="restshift") return {ok:false,msg:"not restshift"};
  const u=unitById(enc,unitId), d=DIRS[dirKey];
  if(!u||!u.alive||!d) return {ok:false,msg:"bad shift"};
  const nx=wrap(u.x+d.x), ny=wrap(u.y+d.y);
  if(unitAt(enc,nx,ny)) return {ok:false,msg:"blocked"};
  if(Math.abs(nx-u.x)>1||Math.abs(ny-u.y)>1) wrapNote(state,u,dirKey);
  u.x=nx; u.y=ny; // ドリフトは変えない(姿勢制御はエンジンではない)
  log(state,`${u.name} が姿勢制御で1マス退避 — エンジンは死んでいても、身はよじれる`);
  return restShiftDone(state);
}
function restShiftSkip(state){ const enc=state.enc; if(!enc||enc.step!=="restshift") return {ok:false,msg:"not restshift"}; return restShiftDone(state); }
function restShiftDone(state){ const enc=state.enc; enc.phase="enemy"; enc.step="enemy"; pump(state); return {ok:true}; }

// ---- player actions ----
function selectPair(state, aUid, aHalf, bUid){
  const enc=state.enc;
  if(enc.step!=="player") return {ok:false,msg:"not player phase"};
  if(enc.pending) return {ok:false,msg:"already selected"};
  if(aUid===bUid) return {ok:false,msg:"同じカードは選べない"};
  const a=cardByUid(state,aUid), b=cardByUid(state,bUid);
  if(!a||!b||a.loc!=="hand"||b.loc!=="hand") return {ok:false,msg:"手札のカードを選んでください"};
  const bHalf = aHalf==="top" ? "bottom" : "top";
  enc.pending=[{uid:aUid,half:aHalf,done:false},{uid:bUid,half:bHalf,done:false}];
  return {ok:true};
}

function actionSpec(state, idx){
  const p=state.enc.pending[idx];
  return cardSpec(state, cardByUid(state,p.uid), p.half);
}

function moveOptions(state, unit, spec){
  // 移動は「ちょうど n マス」直線(L-002)。途中閉塞は不可(phaseは通過可、終点占有は不可)。
  const enc=state.enc; const out=[];
  if(spec.n<=0) return out;
  for(const k of DIR_KEYS){
    const d=DIRS[k];
    let x=unit.x, y=unit.y, blocked=false;
    for(let i=1;i<=spec.n;i++){
      x=wrap(x+d.x); y=wrap(y+d.y);
      const occ=unitAt(enc,x,y);
      if(occ && (!spec.phase || i===spec.n)){ blocked=true; break; }
    }
    if(!blocked) out.push({x,y,dir:k,steps:spec.n});
  }
  return out;
}
// 塞がれた方向の情報(「なぜ行けないか」を見せる — 見えない否定はバグに見える L-003/L-019)
function moveBlocked(state, unit, spec){
  const enc=state.enc; const out=[];
  if(spec.n<=0) return out;
  for(const k of DIR_KEYS){
    const d=DIRS[k];
    let x=unit.x, y=unit.y;
    for(let i=1;i<=spec.n;i++){
      x=wrap(x+d.x); y=wrap(y+d.y);
      const occ=unitAt(enc,x,y);
      if(occ && (!spec.phase || i===spec.n)){
        out.push({x:wrap(unit.x+d.x), y:wrap(unit.y+d.y), dir:k, by:occ.name, at:i});
        break;
      }
    }
  }
  return out;
}
function attackTargets(state, unit, spec){
  const enc=state.enc;
  // アストラ(砲撃艦)のパッシブ: 射程+1
  const R=(spec.range||0) + ((unit.side==="player"&&state.run.shipId==="astra"&&spec.range)?1:0);
  if(spec.kind==="attack"||spec.kind==="attack_multi"||spec.kind==="execute") return targetables(enc).filter(e=>tdist(unit,e)<=R);
  if(spec.kind==="attack_line"||spec.kind==="pierce") return targetables(enc).filter(e=>sameLine(unit,e)&&lineDist(unit,e)<=R&&tdist(unit,e)>0);
  if(spec.kind==="attack_all") return targetables(enc).filter(e=>tdist(unit,e)<=R);
  if(spec.kind==="push"||spec.kind==="attack_push") return targetables(enc).filter(e=>tdist(unit,e)===1);
  if(spec.kind==="pull"||spec.kind==="pull_all"||spec.kind==="setdrift"||spec.kind==="attack_pull")
    return targetables(enc).filter(e=>sameLine(unit,e)&&lineDist(unit,e)<=R&&tdist(unit,e)>0);
  return [];
}

// カード強化(+): 既定は主要数値+1。upDefs があれば「使い方が変わる」カスタム強化(StS式)
function upSpec(spec, up, def, half){
  if(!up) return spec;
  if(def && def.upDefs && def.upDefs[half]) return {...def.upDefs[half], lost:def.upDefs[half].lost??spec.lost, upgraded:true};
  const s={...spec, upgraded:true};
  // ラベルの数値も実数値に追従させる(エージェント実プレイ#001指摘: 表示「移動1」で実態2は実害バグ)
  if(s.kind==="ram"){ s.n+=1; s.label=s.label.split(String(spec.n)).join(String(s.n)); } // 単値=全出現箇所
  else if(s.dmg){ s.dmg+=1; s.label=s.label.replace(String(spec.dmg), String(s.dmg)); }
  else if(["heal","shield","move","brake_move","push","pull","pull_all"].includes(s.kind)){ s.n+=1; s.label=s.label.replace(String(spec.n), String(s.n)); }
  else if(s.range){ s.range+=1; s.label=s.label.replace("射程"+spec.range, "射程"+s.range); }
  return s;
}
// 条件付きスパイク(charter §2 ③-2「非線形カード」): 局面参照で威力が折れ曲がる — 直線性能では下位でも局面次第で最強
// 解決時に実効ダメージへ追従し、ラベルの数値も実効値へ書き換える(L-032: 表示=実態)
const COND_DEFS = {
  lowlife:  { on:st=>aliveCards(st).length<=5,      dmg:(d,st)=>d*2 },              // 残り寿命5枚以下で威力2倍
  sealsync: { on:st=>state_cargoLen(st)>0,          dmg:(d,st)=>d+state_cargoLen(st) }, // 封印遺物1つにつき威力+1
  lonewolf: { on:st=>cardsIn(st,"hand").length<=2,  dmg:(d,st)=>d+2 },              // 手札2枚以下で威力+2
};
function state_cargoLen(st){ return (st.run&&st.run.cargo)?st.run.cargo.length:0; }
function applyCond(state, spec){
  if(!spec || !spec.cond || spec.dmg==null) return spec;
  const cd=COND_DEFS[spec.cond]; if(!cd) return spec;
  const s={...spec};
  if(cd.on(state)){
    const nd=cd.dmg(s.dmg, state);
    if(nd!==s.dmg){ s.label=s.label.replace("攻撃"+s.dmg, "攻撃"+nd); s.dmg=nd; s.condOn=true; }
  }
  return s;
}
function cardSpec(state, c, half){ const d=defOf(c); return applyCond(state, upSpec(d[half], c.up||c.hot, d, half)); } // hot=残骸の熱(戦域限定+)
// ラン内クレジット(金の出口): 全ての増減はこの2関数を通し、credits===creditsEarned-creditsSpent を保つ(保存則)
function earnRunCredits(state, n){ if(!(n>0)) return; state.run.credits+=n; state.run.creditsEarned+=n; }
function spendRunCredits(state, n){ if(!(n>0)||state.run.credits<n) return false; state.run.credits-=n; state.run.creditsSpent+=n; return true; }
// 整備ドックは二段階(Sol設計v2): ①無料主作業(強化/補給/物資回収)で dockMainDone=true → ②有料追加整備 or 出航
function applyUpgrade(state, uid){
  if(uid){
    const c=cardByUid(state,uid);
    if(!c||c.up||c.loc==="lost") return {ok:false,msg:"そのカードは強化できない"};
    c.up=true;
    log(state,`『${defOf(c).name}』を強化(+) — 母船の整備班が唸りを上げた`,"good");
  } else log(state,"強化を見送った。温存も戦略だ。");
  state.run.dockMainDone=true;
  return {ok:true};
}
// 整備ドックの択2: 補給(船体修理+随伴機全快)。強化との天秤(StSの焚き火)
function applyResupply(state){
  if(hasContract(state.run,"norepair")) return {ok:false,msg:"契約『補給封鎖』— 補給は使えない"};
  const sd=shipDef(state.run.shipId);
  state.run.shipHp=Math.min(sd.hp,(state.run.shipHp??sd.hp)+3);
  state.run.droneHp=sd.droneHp;
  log(state,`補給を受けた — 旗艦${state.run.shipHp}/${sd.hp}、随伴機は完全復帰。`,"good");
  state.run.dockMainDone=true;
  return {ok:true};
}
// 整備ドックの択3: 物資回収(売却価値+1)
function applyScrapLoot(state){
  state.run.bonusValue+=1;
  log(state,"残骸から物資を回収 — 売却価値+1。","good");
  state.run.dockMainDone=true;
  return {ok:true};
}
// 有料追加整備①: 応急溶接 ₢3 = 旗艦HP+1(1ドック1回・満タン不可・norepairで封鎖)。閾値HP1→2を跨ぐ生存投資
const DOCK_PATCH_COST=3, DOCK_RECOVER_COST=7;
function applyDockPatch(state){
  const run=state.run;
  if(!run.dockMainDone) return {ok:false,msg:"先に主作業を選べ"};
  if(hasContract(run,"norepair")) return {ok:false,msg:"契約『補給封鎖』— 応急溶接は使えない"};
  if(run.dockPatch) return {ok:false,msg:"このドックでは既に応急溶接済み"};
  const sd=shipDef(run.shipId), hp=run.shipHp??sd.hp;
  if(hp>=sd.hp) return {ok:false,msg:"旗艦はすでに満タンだ"};
  if(!spendRunCredits(state,DOCK_PATCH_COST)) return {ok:false,msg:"クレジットが足りない"};
  run.dockPatch=true; run.shipHp=Math.min(sd.hp,hp+1);
  log(state,`応急溶接 — 旗艦HP+1(${run.shipHp}/${sd.hp})。₢${DOCK_PATCH_COST}を支払った。`,"good");
  return {ok:true};
}
// 有料追加整備②: ブラックボックス回収 ₢7 = 通常ロストカード1枚をpoolへ(燃料/展開遺物は不可)。閾値寿命5→6を跨ぐ
function dockRecoverable(state){ return state.run.cards.filter(c=>c.loc==="lost" && !c.relicId && !c.fuelLost); }
function applyDockRecover(state, uid){
  const run=state.run;
  if(!run.dockMainDone) return {ok:false,msg:"先に主作業を選べ"};
  if(run.dockRecover) return {ok:false,msg:"このドックでは既に回収済み"};
  const cands=dockRecoverable(state);
  const c=uid?cands.find(c=>c.uid===uid):cands[0];
  if(!c) return {ok:false,msg:"回収できるロストカードがない"};
  if(!spendRunCredits(state,DOCK_RECOVER_COST)) return {ok:false,msg:"クレジットが足りない"};
  run.dockRecover=true; c.loc="pool";
  log(state,`ブラックボックス回収 — 『${defOf(c).name}』が戻った。₢${DOCK_RECOVER_COST}を支払った。`,"good");
  return {ok:true};
}
// 緊急解体(非常弁): 封印遺物を素価値でラン内通貨に流動化。集中/深度/安全帰還の上乗せは捨てる=常に損切り
function liquidateCargo(state, relicId){
  const run=state.run, i=run.cargo.indexOf(relicId);
  if(i<0) return {ok:false,msg:"そのカーゴは無い"};
  const r=RELIC_DEFS.find(x=>x.id===relicId);
  run.cargo.splice(i,1);
  earnRunCredits(state, r.value);
  log(state,`『${r.name}』を緊急解体 — ₢${r.value}を得た(集中・深度・安全帰還の上乗せは捨てた)。`,"warn");
  return {ok:true};
}
// 出航: ドックを閉じてルート選択へ
function leaveDock(state){
  if(!state.run.dockMainDone) return {ok:false,msg:"先に主作業を選べ"};
  state.screen="route";
  return {ok:true};
}
// 残骸修理: サルベージ権でカード回収の代わりに船体+1(デッキ未周回でも腐らない)
function crashSalvageRepair(state){
  const enc=state.enc;
  if(!enc||enc.phase!=="crashsalvage") return {ok:false,msg:"not salvage phase"};
  const ship=unitById(enc,"ship");
  ship.hp=Math.min(ship.maxHp,ship.hp+1);
  enc.crashSalvage--;
  log(state,`残骸の装甲板を船体に当てがった — 旗艦HP${ship.hp}`,"good");
  fx(state,{type:"float",x:ship.x,y:ship.y,text:"+1🔧",cls:"good"});
  pump(state);
  return {ok:true};
}

// スコア(リプレイの物差し)
function runScore(state){
  const r=state.run;
  const base = cargoPayoutValue(state)*10 + (r.zone-1)*25 + (r.win?100:0)
    + aliveCards(state).length*3 + deployedStatus(state).filter(d=>d.alive).length*8
    + (r.physKills||0)*12 + (r.chainLinks||0)*15 + (r.bossKills||0)*80;
  return Math.round(base*(1+0.25*r.asc)*contractMult(r));
}
// 瞬間図鑑(モーメント・コデックス): 機械検出済みのドラマを収集対象へ昇格。
// 周回の非線形評価を「図鑑の完成」という因果の下流に置く(勝敗と独立の周回動機)
function momentDefs(){
  const ev=(r,t)=>(r.events||[]).some(e=>e.t===t);
  const evN=(r,t,n)=>(r.events||[]).some(e=>e.t===t&&(e.n||1)>=n);
  const boss=(r,ty)=>(r.events||[]).some(e=>e.t==="bosskill"&&e.type===ty);
  return [
    {id:"chain2",   icon:"🎆", name:"初めての誘爆",     hint:"機雷の連鎖を起こす",           test:r=>evN(r,"chain",2)},
    {id:"chain3",   icon:"🌋", name:"花火大会",         hint:"3連鎖以上の誘爆",             test:r=>evN(r,"chain",3)},
    {id:"friendly", icon:"🎭", name:"同士討ちの演出家", hint:"敵の攻撃を敵に当てさせる",     test:r=>ev(r,"friendly")},
    {id:"rampage3", icon:"🔥", name:"静寂を破る者",     hint:"3連続撃破",                   test:r=>evN(r,"rampage",3)},
    {id:"burnsave", icon:"🃏", name:"命の両替商",       hint:"カードを燃やして致命打を消す", test:r=>ev(r,"burnsave")},
    {id:"neardeath",icon:"🫀", name:"残機1の舵",        hint:"船体1の淵から生きて帰る",      test:r=>r.win&&ev(r,"neardeath")},
    {id:"phys5",    icon:"💥", name:"物理の伝道師",     hint:"1ランで物理キル5回",           test:r=>(r.physKills||0)>=5},
    {id:"flarekill",icon:"☀️", name:"太陽に焼かせた",   hint:"太陽フレアで敵を始末",         test:r=>ev(r,"flarekill")},
    {id:"wellpull", icon:"🌀", name:"渦の給仕",         hint:"重力渦に敵を呑ませる",         test:r=>ev(r,"wellpull")},
    {id:"boss_apex",icon:"👁️", name:"目を閉じさせた者", hint:"中心墓所の主を討つ",           test:r=>boss(r,"apex")},
    {id:"boss_jugg",icon:"🦏", name:"轢断者を轢いた者", hint:"墓所の轢断者を討つ",           test:r=>boss(r,"juggernaut")},
    {id:"boss_brood",icon:"🕷️",name:"産室の消灯",       hint:"増殖の女王を討つ",             test:r=>boss(r,"broodmother")},
    {id:"legend",   icon:"👑", name:"伝説",             hint:"ボスを討って生きて帰る",       test:r=>r.win&&!!r.bossKilled},
    {id:"stakes",   icon:"🎲", name:"断固たる帰還",     hint:"深度倍率x2以上で生きて帰る",   test:r=>r.win&&(r.leapStakes||0)>=1},
  ];
}
function computeMoments(run){ return momentDefs().filter(m=>{try{return m.test(run);}catch(e){return false;}}).map(m=>m.id); }

// Leap or Keepを「賭けの数字」にする: 帰還した場合の確定SCOREと、跳んで次のボス帰還だった場合の概算(同じ荷での下限)
function scorePreview(state){
  const r=state.run, w=r.win, st=r.leapStakes||0;
  r.win=true;
  const keep=runScore(state);
  r.leapStakes=st+1;
  const leap=runScore(state); // 遺物・キルの上積みを含まない下限値
  r.leapStakes=st; r.win=w;
  return {keep, leap};
}
// 敗因の機械診断: 負けた瞬間に「敗因1行+次の一手」を渡す(負けても得るのは情報 — 工夫の余地を残す)
function deathCoach(r){
  if(r.win||!r.over) return null;
  if(r.reason==="exhausted"){
    if((r.restCount||0)>=3) return {cause:"休息の連鎖がデッキを食い尽くした",
      tip:"カードは握って死ぬより、使って生きる燃料だ。敵を早く減らせば、休息はそもそも要らない"};
    if((r.burnCount||0)>=3) return {cause:`被弾${r.burnCount}発をカードで打ち消した — 寿命の前借り`,
      tip:"浅い傷は装甲(HP)で受けろ。HPは補給で戻るが、燃えたカードは永遠に戻らない"};
    if((r.fuelBurnt||0)>=3) return {cause:"燃料に投じたカードが多すぎた",
      tip:"跳ぶ前に残カード数を見ろ。寿命10枚のうち燃料に回せるのは2枚が限度だ"};
    return {cause:"全カード喪失 — 寿命が敵に届く前に燃え尽きた",
      tip:"1ターンで必ず2枚減る。毎ターン、ダメージか位置の利のどちらかに変換し続けろ"};
  }
  if(r.reason==="ship"){
    if((r.burnCount||0)===0) return {cause:"全弾を船体で受けた末の轟沈",
      tip:"致命打はカード1枚で無効化できる(手札か消耗から)。船体は通貨、カードは保険 — 両替を覚えろ"};
    return {cause:"船体大破 — 深淵の圧が上回った",
      tip:"敵の予告(赤マス)から1歩ずれるだけで大半は空振りする。移動の上半分は回避の道具だ"};
  }
  return null;
}
// ---- 船長診断(3軸8型+サブ称号 — 調査準拠: 全型褒めベース/図星はプレイデータ由来/軽口は自虐とポジの同居) ----
// 軸: F=こぶし(物理/砲撃) R=リスク(山師/堅実) C=制御(計画/出たとこ勝負)。選択から導く(結果からではなく)
const CAPTAIN_TYPES={
  hunter:  {name:"狩人型",  title:"宇宙全体を罠に変える人",      f:1,r:1,c:1, rarity:7,
    praise:"軌道を読み、危険を選び、罠を編む。深淵で最も恐れられる種類の船長だ。", weak:"ただし保険には入らないタイプ。"},
  pirate:  {name:"海賊型",  title:"ぶつかってから考える人",      f:1,r:1,c:0, rarity:11,
    praise:"危険ルートに鼻歌で突っ込み、体当たりで道を開く。その勢いは数字を超える。", weak:"燃料計はたぶん飾りだと思っている。"},
  engineer:{name:"技師型",  title:"爆発を芸術と呼ぶ人",          f:1,r:0,c:1, rarity:9,
    praise:"安全マージンの上に、最小の手数で最大の衝突を設計する。整備班の信頼が厚い。", weak:"精算が地味なのは保険料のせい。"},
  brawler: {name:"蛮勇型",  title:"装甲を信じて直進する人",      f:1,r:0,c:0, rarity:13,
    praise:"考えるより先に船体が動く。だが宇宙では、それで通ることが結構ある。", weak:"修理班からの請求書は見ない主義。"},
  sniper:  {name:"狙撃型",  title:"最後の1マスまで読む人",       f:0,r:1,c:1, rarity:12,
    praise:"危険を選び、しかし引き金は焦らない。レーンの先の未来が見えている。", weak:"読みすぎて燃料が先に尽きる日もある。"},
  gambler: {name:"山師型",  title:"引き金と契約だけが早い人",    f:0,r:1,c:0, rarity:14,
    praise:"レア遺物の匂いに迷いがない。深淵はあんたみたいな船長のためにある。", weak:"帰り道のことは帰り道に考える。"},
  surveyor:{name:"測量型",  title:"石橋を叩いてから撃つ人",      f:0,r:0,c:1, rarity:13,
    praise:"全ての射撃に根拠がある。「生存率」という言葉が服を着て歩いている。", weak:"乾杯すら誰よりも慎重にやる。"},
  merchant:{name:"商人型",  title:"儲かったら帰る人",            f:0,r:0,c:0, rarity:21,
    praise:"欲をかかず、確実に持ち帰る。母港で一番愛されるのはこういう船長だ。", weak:"伝説にはならないが、長生きはする。"},
};
function captainType(state){
  const r=state.run;
  const kills=r.kills||0, phys=r.physKills||0;
  // F軸: 撃破の3割以上が物理(衝突/激突/爆発)ならこぶし派
  const F=(kills>0 && phys/kills>=0.3) || phys>=4 ? 1 : 0;
  // R軸: 危険ルート率×2 + 契約×0.6 + 遺物展開×0.7
  const riskScore=(r.routeTotal? (r.routeDanger||0)/r.routeTotal : 0)*2 + (r.contracts||[]).length*0.6 + (r.deployed||[]).length*0.7;
  const R=riskScore>=1.4 ? 1 : 0;
  // C軸: やり直し + 休息の自選(=制御にコストを払う)
  const ctrlScore=(r.undoCount||0) + (r.chooseRest||0)*2;
  const C=ctrlScore>=2 ? 1 : 0;
  const id=Object.keys(CAPTAIN_TYPES).find(k=>{const t=CAPTAIN_TYPES[k]; return t.f===F&&t.r===R&&t.c===C;});
  const t=CAPTAIN_TYPES[id];
  // サブ称号(レア実績 — Refind Self式の組合せ表示でバリエーションを増やす)
  const subs=[];
  if(r.bossKilled) subs.push("👑伝説");
  if(phys>=8) subs.push("💥轢断魔");
  if(r.win && (r.contracts||[]).length>=3) subs.push("☠鉄の契約者");
  if(r.win && (r.shipHp??99)<=1) subs.push("🫀九死一生");
  if(r.win && (r.burnCount||0)===0 && (r.restCount||0)<=1) subs.push("✨無傷の帰還者");
  // 図星(プレイデータ由来の言い当て — 演技できない=本物)
  let jab;
  if(phys>=5) jab=`物理キル${phys}回 — 弾代をだいぶ浮かせたでしょ。`;
  else if((r.undoCount||0)>=4) jab=`やり直し${r.undoCount}回 — 石橋、叩きすぎ。`;
  else if((r.contracts||[]).length>=2) jab=`契約${r.contracts.length}件持ちで出撃する船長、そう多くない。`;
  else if(r.routeTotal>=2 && r.routeDanger===r.routeTotal) jab="危険ルートしか選んでない。自覚ある?";
  else if(r.routeTotal>=2 && !(r.routeDanger||0)) jab="危険ルートを一度も踏んでない。それも才能。";
  else if((r.burnCount||0)>=3) jab=`カードを${r.burnCount}枚燃やしてでも生き残った。正しい。`;
  else jab=`ZONE${r.zone}まで${r.totalRounds}ラウンド — その足取りに性格が出てる。`;
  return {id, name:t.name, title:t.title, praise:t.praise, weak:t.weak, rarity:t.rarity, axes:{F,R,C}, subs, jab};
}

// ---- 航海記録(クロニクル): LLMなしでランのドラマを再構成する ----
// 設計(イナンナRun#002の知見): 機械検出(イベント重み)+船長マーク(wow)の併用。文はテンプレ+決定論的バリエーション
const CHRON_W={bosskill:12, rampage:8, neardeath:7, physkill:6, chain:6, friendly:5, flarekill:4, burnsave:4, wellpull:3, relic:2, leap:2, clear:1, rest:1, end:99};
function chronLine(ev){
  const pick=arr=>arr[(ev.z*7+ev.r+ev.i)%arr.length];
  switch(ev.t){
    case "physkill":{
      const how={"衝突":"滑ってきた軌道ごと","激突":"叩きつけられて","機雷の爆発":"機雷の花火に呑まれて","自爆":"爆風に攫われて"}[ev.src]||"物理に屈して";
      return pick([`${ev.name}、${how}砕けた — 引き金は引いていない`,`${ev.name}が${how}宇宙塵になった。これがこの宇宙の正しい錬金術`]);
    }
    case "chain": return ev.n>=3
      ? pick([`誘爆が${ev.n}連鎖 — 盤面がまるごと花火大会になった`,`爆発が爆発を呼び、${ev.n}発の連鎖が闇を昼に変えた`])
      : pick(["誘爆が連鎖して、盤面が一瞬だけ花火大会になった","爆発が爆発を呼んだ。誰も止めなかったし、止める気もなかった"]);
    case "double": return null;
    case "rampage": return ev.n>=5?`${ev.n}連続撃破 — もはや誰も数えていなかった`:`${ev.n}連続撃破 — 静寂が戻るまで、誰も口を開かなかった`;
    case "neardeath": return pick(["船体、残り1。警報の中で、それでも舵は離さなかった",`${ev.src||"一撃"}が装甲を裂いた。残りHP1 — ここからが船長の仕事`]);
    case "burnsave": return `『${ev.card}』を炎に焼べて${ev.dmg}ダメージを打ち消した — 寿命で命を買い戻す取引`;
    case "friendly": return `${ev.by}の一撃が${ev.hit}に吸い込まれた。同士討ちは、誘い込んだ者の戦果だ`;
    case "flarekill": return `太陽フレアが${ev.name}を焼き払った。退避しなかったのは敵のほうだ`;
    case "wellpull": return `${ev.name}が重力渦に呑まれて、描いていた未来ごと狂った`;
    case "bosskill": return `《${ev.title}》${ev.name}、沈黙。深淵が一拍だけ、静かになった`;
    case "relic": return ev.choice==="deploy"?`『${ev.name}』を展開 — 眠っていた力を、いま叩き起こした`:`『${ev.name}』をカーゴに封印 — 家まで持って帰る、という約束`;
    case "leap": return `『${ev.burned}』を燃料に、ZONE${ev.to}へ跳んだ(残カード${ev.cardsLeft}枚=寿命)`;
    case "rest": return ev.mode==="choose"?`船体を軋ませ、自らの手で『${ev.card}』を手放した`:`成り行きの休息 — 『${ev.card}』が静かに宇宙へ流れていった`;
    case "clear": return ev.hull<=2?`船体${ev.hull}で戦域を制圧 — 紙一重を、勝ちと呼ぶ`:null;
    case "end": return ev.win?(ev.reason==="returned"?"帰還。母港の灯りが、ちゃんと待っていた":"生還。"):
      (ev.reason==="ship"?"船体崩壊 — 最後の通信は、ノイズに溶けた":"全カード喪失 — 船はもう、漂うだけの棺だ");
    case "mark": return ev.text ? `${ev.text}` : "ここで船長は、言葉にならない何かを刻んだ — 後から思えば、それが航海の頂点だった";
  }
  return null;
}
// marks: [{z,e,r}] — プレイヤー/エージェントが「今の瞬間」を刻んだ位置(★がつき採用優先)
function voyageChronicle(state, marks){
  marks=marks||[];
  const base=(state.run.events||[]).map((ev,i)=>({...ev, _seq:i}));
  // --wowで刻んだ瞬間=「船長が宣言した頂点」。挿入順(時系列)を保ったまま、必ず航海記録に残す(イナンナRun#003指摘)
  const promoted=new Set(); // textなしwowは近傍イベント1件だけを★昇格(過剰昇格の防止)
  const synth=[];
  marks.forEach((m,k)=>{
    const beat=ev=>ev.z===m.z&&ev.e===m.e&&Math.abs((ev.r||0)-(m.r||0))<=1;
    if(m.text){ // テキスト付きwowは独立した★行に(実況がそのまま頂点の記録になる)
      let anchor=-1; for(const ev of base){ if(ev.z<m.z||(ev.z===m.z&&(ev.e<m.e||(ev.e===m.e&&(ev.r||0)<=(m.r||0))))) anchor=ev._seq; }
      synth.push({z:m.z,e:m.e,r:m.r||0,t:"mark",text:m.text,_seq:anchor+0.5,_mark:true});
      return;
    }
    let best=null,bd=9; // textなし: 同戦域・最寄り1件を★昇格、無ければ独立行
    for(const ev of base){ if(beat(ev)&&!promoted.has(ev._seq)){ const d=Math.abs((ev.r||0)-(m.r||0)); if(d<bd){bd=d;best=ev;} } }
    if(best) promoted.add(best._seq);
    else { let anchor=-1; for(const ev of base){ if(ev.z<m.z||(ev.z===m.z&&(ev.r||0)<=(m.r||0))) anchor=ev._seq; }
      synth.push({z:m.z,e:m.e,r:m.r||0,t:"mark",text:null,_seq:anchor+0.5,_mark:true}); }
  });
  const all=[...base,...synth].sort((a,b)=>a._seq-b._seq); // 挿入順=時系列を維持
  const evs=all.map((ev,i)=>{
    let w=CHRON_W[ev.t]??1;
    if(ev.t==="clear"&&ev.hull<=2) w=6;
    if(ev.t==="mark") w=99;
    const starred = ev._mark || promoted.has(ev._seq);
    return {...ev, i, w: starred?w+8:w, starred};
  });
  // 採用: 背骨(leap/end/bosskill/★wow)は常時。残りは「同種を取るほど割引」の貪欲選択で多様性を確保 → 時系列へ戻す
  const spine=evs.filter(e=>["leap","end","bosskill","mark"].includes(e.t)||e.starred);
  const pool=evs.filter(e=>!(["leap","end","bosskill","mark"].includes(e.t)||e.starred));
  const slots=Math.max(0,14-spine.length);
  const flesh=[], counts={};
  while(flesh.length<slots && pool.length){
    let best=-1, bw=-Infinity;
    pool.forEach((ev,j)=>{ const ew=ev.w-2.2*(counts[ev.t]||0); if(ew>bw){bw=ew;best=j;} });
    if(best<0||bw<=0) break;
    const ev=pool.splice(best,1)[0];
    counts[ev.t]=(counts[ev.t]||0)+1;
    flesh.push(ev);
  }
  const chosen=[...spine,...flesh].sort((a,b)=>a.i-b.i);
  const lines=[];
  let lastZ=0;
  for(const ev of chosen){
    const line=chronLine(ev);
    if(!line) continue;
    if(ev.z!==lastZ){ lines.push(`— ZONE ${ev.z}《${ZONE_NAMES[ev.z-1]}》—`); lastZ=ev.z; }
    lines.push(`${ev.starred?"★":"・"}${line}`);
  }
  return lines;
}

// ---- エージェント記憶インターフェース(汎用・任意のエージェントが利用可) ----
// 2チャンネル: A=想い出(voyageMemory: 何をどう感じたかの素材→記憶へ) / B=引き継ぎ(carryover: 次ランで確実に読む軽量サマリ)
// ゲームは状態を持たない: Bはエージェントが永続化し new 時に渡し返す(汎用性のため)

// A) 想い出: ランの全体像+機械が綴った航海+本人が試合中に呟いた声。エージェントはこれを自分の記憶に保存/蒸留する
function voyageMemory(state, says, wows){
  const r=state.run, ct=captainType(state), sd=shipDef(r.shipId);
  return {
    kind:"voyage-memory", game:"Leap or Keep",
    setup:{ ship:r.shipId, shipName:sd.name, asc:r.asc, contracts:r.contracts||[] },
    outcome:{ win:!!r.win, reason:r.reason||null, zone:r.zone, score:runScore(state),
      physKills:r.physKills||0, cargo:cargoValue(state), payout:cargoPayoutValue(state),
      rewardMult:rewardMultiplier(r), leapStakes:r.leapStakes||0, bossKilled:!!r.bossKilled, bossKills:r.bossKills||0,
      boss: r.bossKilled ? ((ENEMY_DEFS[r.lastBossType||r.bossType]||{}).name||null) : null },
    captain:{ id:ct.id, name:ct.name, title:ct.title, jab:ct.jab, praise:ct.praise, weak:ct.weak, subs:ct.subs },
    chronicle: voyageChronicle(state, wows||[]),   // ★=本人が刻んだ頂点
    voice: (says||[]).map(s=>s.text),              // 本人の生の感情(--say)
  };
}
// 想い出を「そのまま記憶にできる」散文に。蒸留しないエージェントはこれを保存するだけでよい
function voyageMemoryProse(mem){
  const o=mem.outcome, c=mem.captain, L=[];
  L.push(`# ${mem.game} 航海の記憶`);
  L.push(`${mem.setup.shipName}${mem.setup.contracts.length?`(契約: ${mem.setup.contracts.join("/")})`:""}で深淵へ出航した。`);
  L.push(o.win?`ZONE${o.zone}まで潜り、${o.boss?`《${o.boss}》を討って`:""}生きて帰った(SCORE ${o.score}/物理キル${o.physKills}/深度倍率x${o.rewardMult||1})。`
             :`ZONE${o.zone}で力尽きた(${o.reason})。`);
  L.push(`船としての私は『${c.name}』— ${c.title}。${c.jab}${c.subs.length?" "+c.subs.join(" "):""}`);
  if(mem.chronicle.length){ L.push("","## 航海の断片"); mem.chronicle.forEach(l=>L.push(l)); }
  // 呟きは散文では「出航時」と「帰投時」の括弧だけ(全文は構造化voice[]へ。記憶は要点で持つ)
  if(mem.voice.length){
    L.push("","## 出航のとき", `「${mem.voice[0]}」`);
    if(mem.voice.length>1) L.push("## 航海の終わりに", `「${mem.voice[mem.voice.length-1]}」`);
    if(mem.voice.length>2) L.push(`(その間に${mem.voice.length-2}の独白 — 全文は voice[] に残してある)`);
  }
  return L.join("\n");
}
// B) 引き継ぎ: 次ランで確実に読む軽量レコード。noteはエージェントが書く「心残り/抱負」(汎用の自由文)
function carryoverRecord(state, note){
  const r=state.run, ct=captainType(state);
  return { ship:r.shipId, result:r.win?"win":"loss", zone:r.zone, score:runScore(state),
    captain:ct.name, boss: r.bossKilled ? ((ENEMY_DEFS[r.lastBossType||r.bossType]||{}).name||null) : null,
    rewardMult:rewardMultiplier(r), leapStakes:r.leapStakes||0, bossKills:r.bossKills||0,
    note: note||null };
}
// 過去の引き継ぎ群を、ゲーム開始時に読める数行のダイジェストへ(エージェントの「記憶の想起」)
function carryoverDigest(records){
  records=(records||[]).filter(Boolean);
  if(!records.length) return [];
  const wins=records.filter(r=>r.result==="win").length;
  const bestZ=Math.max(1,...records.map(r=>r.zone||1));
  const bestS=Math.max(0,...records.map(r=>r.score||0));
  const types={}; records.forEach(r=>{ if(r.captain) types[r.captain]=(types[r.captain]||0)+1; });
  const L=[`【記憶】これまで${records.length}回潜航(生還${wins})/最高ZONE${bestZ}・最高SCORE${bestS}`];
  const t=Object.entries(types).map(([k,v])=>`${k}×${v}`).join(" ");
  if(t) L.push(`これまでの船長像: ${t}`);
  const lastNote=[...records].reverse().find(r=>r.note);
  if(lastNote) L.push(`前回の言葉: 「${lastNote.note}」`);
  return L;
}

// 敗北しても拾うものはある(アンロックドリップ — 失敗ランを無駄にしない)
function lossCredits(state){
  return Math.max(0,(state.run.zone-1)*2) + Math.floor(cargoValue(state)/3);
}

// ラム突進の到達マス(移動系と同じ「マスを選ぶ」UIに統一 — L-012)
function ramOptions(state, unit, spec){
  const enc=state.enc; const out=[];
  for(const k of DIR_KEYS){
    const d=DIRS[k];
    let x=unit.x, y=unit.y, steps=0, hit=null;
    for(let i=1;i<=spec.n;i++){
      const nx=wrap(x+d.x), ny=wrap(y+d.y);
      const occ=unitAt(enc,nx,ny);
      if(occ){ if(occ.side!=="player") hit={x:nx,y:ny}; break; }
      x=nx; y=ny; steps=i;
    }
    if(hit) out.push({x:hit.x,y:hit.y,dir:k,hit:true});
    else if(steps>0) out.push({x,y,dir:k,hit:false});
  }
  return out;
}

function dirBetween(a,b){
  const dx=tdelta(a.x,b.x), dy=tdelta(a.y,b.y);
  if(Math.abs(dx)>=Math.abs(dy)) return dx>0?"right":(dx<0?"left":(dy>0?"down":"up"));
  return dy>0?"down":"up";
}

function forcedMove(state, victim, dirKey, n){
  const enc=state.enc; const d=DIRS[dirKey];
  for(let i=0;i<n;i++){
    const nx=wrap(victim.x+d.x), ny=wrap(victim.y+d.y);
    const occ=unitAt(enc,nx,ny);
    if(occ){
      log(state,`${victim.name} が ${occ.name} に叩きつけられた!`,"good");
      fx(state,{type:"boom",x:nx,y:ny});
      dealDamage(state,victim,CONFIG.COLLISION_DMG,"激突");
      dealDamage(state,occ,CONFIG.COLLISION_DMG,"激突");
      victim.drift=null; if(occ.alive) occ.drift=null;
      return;
    }
    if(victim.x+d.x!==nx || victim.y+d.y!==ny) wrapNote(state,victim,dirKey); // 縁越え押し/引き
    victim.x=nx; victim.y=ny;
  }
  victim.drift=dirKey;
}

function execAction(state, idx, params){
  const enc=state.enc;
  if(enc.step!=="player"||!enc.pending) return {ok:false,msg:"not player phase"};
  const p=enc.pending[idx];
  if(!p||p.done) return {ok:false,msg:"invalid action"};
  const spec=actionSpec(state,idx);
  const unit=unitById(enc,params.unitId);
  if(!unit||!unit.alive||unit.side!=="player") return {ok:false,msg:"ユニットを選んでください"};
  const cardName=defOf(cardByUid(state,p.uid)).name;

  switch(spec.kind){
    case "move": case "brake_move": {
      if(params.cell){
        const opts=moveOptions(state,unit,spec);
        const cands=opts.filter(o=>o.x===params.cell.x&&o.y===params.cell.y);
        // トーラスでは複数方向が同じマスに着く(L-001)。方向指定があればそれを優先、曖昧なら拒否。
        const hit = params.dir ? cands.find(o=>o.dir===params.dir)
                  : (cands.length===1 ? cands[0] : null);
        if(!hit){
          if(spec.kind==="brake_move"&&params.cell.x===unit.x&&params.cell.y===unit.y){
            unit.drift=null; // その場で制動のみ
          }
          else if(cands.length>1) return {ok:false,msg:"方向が2通りある — 矢印で選んでください"};
          else return {ok:false,msg:"そこへは行けない"};
        } else {
          if(spec.kind==="brake_move") unit.drift=null;
          const hd=DIRS[hit.dir], hs=hit.steps||spec.n;
          if(hd && (unit.x+hd.x*hs!==hit.x || unit.y+hd.y*hs!==hit.y)) wrapNote(state,unit,hit.dir); // 縁越え移動
          unit.x=hit.x; unit.y=hit.y;
          unit.drift = spec.kind==="move" ? hit.dir : null;
        }
        if(spec.selfDmg) dealDamage(state,unit,spec.selfDmg,"オーバーバーンの熱");
      } else if(spec.kind==="move"){ return {ok:false,msg:"移動先を選んでください"}; }
      else { unit.drift=null; } // cell無しのbrake_move=制動のみ
      log(state,`${unit.name}: 『${cardName}』${spec.label}`);
      break;
    }
    case "ram": {
      // 単値仕様: 突進力n = 移動距離も与ダメージもn(特殊効果つき移動)
      const d=DIRS[params.dir]; if(!d) return {ok:false,msg:"突進先のマスを選んでください"};
      let hit=false;
      for(let i=0;i<spec.n;i++){
        const nx=wrap(unit.x+d.x), ny=wrap(unit.y+d.y);
        const occ=unitAt(enc,nx,ny);
        if(occ){
          if(occ.side!=="player"){ dealDamage(state,occ,spec.n,"激突"); unit.drift=null; hit=true; }
          break;
        }
        if(unit.x+d.x!==nx || unit.y+d.y!==ny) wrapNote(state,unit,params.dir); // 縁越え突進
        unit.x=nx; unit.y=ny;
      }
      if(!hit) unit.drift=params.dir;
      log(state,`${unit.name}: 突進${spec.n}! ${hit?"標的に艦体を叩き込んだ":"空振り — 慣性だけが残った"}`);
      break;
    }
    case "pierce": {
      // 貫通射撃: 直線上の全ユニット(敵味方無差別・自分以外)を撃ち抜き、反動で後方ドリフト
      const t=unitById(enc,params.targetId);
      if(!t||!attackTargets(state,unit,spec).includes(t)) return {ok:false,msg:"同一直線上(射程内)の標的を選んでください"};
      const dk=dirBetween(unit,t);
      const d=DIRS[dk];
      const cells=[];
      let x=unit.x, y=unit.y;
      for(let i=1;i<=spec.range;i++){
        x=wrap(x+d.x); y=wrap(y+d.y);
        cells.push({x,y});
        const v=unitAt(enc,x,y);
        if(v && v.id!==unit.id) dealDamage(state,v,spec.dmg,cardName);
      }
      fx(state,{type:"flash",cells,beam:true});
      if(!spec.noRecoil){
        unit.drift=OPP[dk];
        log(state,`${unit.name}: 『${cardName}』フルパワー斉射 — 反動で後方へ流される!`,"warn");
      } else log(state,`${unit.name}: 『${cardName}』安定化済み斉射`);
      break;
    }
    case "attack_push": {
      const t=unitById(enc,params.targetId);
      if(!t||!attackTargets(state,unit,spec).includes(t)) return {ok:false,msg:"隣接する対象を選んでください"};
      dealDamage(state,t,spec.dmg,cardName);
      if(t.alive) forcedMove(state,t,dirBetween(unit,t),spec.n);
      log(state,`${unit.name}: 『${cardName}』→ ${t.name} を撃ち飛ばした`);
      break;
    }
    case "attack_pull": {
      const t=unitById(enc,params.targetId);
      if(!t||!attackTargets(state,unit,spec).includes(t)) return {ok:false,msg:"同一直線上の対象を選んでください"};
      dealDamage(state,t,spec.dmg,cardName);
      if(t.alive){
        const dk=dirBetween(t,unit);
        forcedMove(state,t,dk,Math.min(spec.n,Math.max(0,lineDist(unit,t)-1)));
        if(t.alive) t.drift=dk;
      }
      log(state,`${unit.name}: 『${cardName}』→ ${t.name} に銛を打ち込んだ。来い!`);
      break;
    }
    case "warp": {
      if(!params.cell||unitAt(enc,params.cell.x,params.cell.y)) return {ok:false,msg:"空きマスを選んでください"};
      unit.x=params.cell.x; unit.y=params.cell.y; unit.drift=null;
      log(state,`${unit.name}: 死者の星図に従い、空間を跳んだ`,"warn");
      break;
    }
    case "attack": case "attack_line": {
      const t=unitById(enc,params.targetId);
      if(!t||!attackTargets(state,unit,spec).includes(t)) return {ok:false,msg:"射程内の敵を選んでください"};
      dealDamage(state,t,spec.dmg,cardName);
      log(state,`${unit.name}: 『${cardName}』→ ${t.name}`);
      break;
    }
    case "attack_all": {
      const ts=attackTargets(state,unit,spec);
      if(!ts.length) return {ok:false,msg:"射程内に敵がいない"};
      for(const t of ts) dealDamage(state,t,spec.dmg,cardName);
      log(state,`${unit.name}: 『${cardName}』— 周囲一掃!`);
      break;
    }
    case "attack_multi": {
      const ids=params.targetIds||[];
      if(!ids.length) return {ok:false,msg:"対象を選んでください"};
      if(ids.length>spec.count) return {ok:false,msg:"対象が多すぎる"};
      const valid=attackTargets(state,unit,spec);
      for(const id of ids){ const t=unitById(enc,id); if(!t||!valid.includes(t)) return {ok:false,msg:"射程外の敵が含まれている"}; }
      for(const id of ids) dealDamage(state,unitById(enc,id),spec.dmg,cardName);
      log(state,`${unit.name}: 『${cardName}』起動 — 古代の殺意が目覚める`);
      break;
    }
    case "push": {
      const t=unitById(enc,params.targetId);
      if(!t||!attackTargets(state,unit,spec).includes(t)) return {ok:false,msg:"隣接する敵を選んでください"};
      if(spec.dmg) dealDamage(state,t,spec.dmg,cardName);
      if(t.alive) forcedMove(state,t,dirBetween(unit,t),spec.n);
      log(state,`${unit.name}: 『${cardName}』→ ${t.name} を突き放した`);
      break;
    }
    case "pull": {
      const t=unitById(enc,params.targetId);
      if(!t||!attackTargets(state,unit,spec).includes(t)) return {ok:false,msg:"同一直線上(射程内)の敵を選んでください"};
      const dk=dirBetween(t,unit);
      const dist=lineDist(unit,t);
      forcedMove(state,t,dk,Math.min(spec.n,Math.max(0,dist-1)));
      t.drift=dk;
      log(state,`${unit.name}: 『${cardName}』→ ${t.name} を引き寄せた。落ちてこい`);
      break;
    }
    case "pull_all": {
      const ts=attackTargets(state,unit,spec);
      if(!ts.length) return {ok:false,msg:"射程内に敵がいない"};
      for(const t of ts){
        const dk=dirBetween(t,unit);
        forcedMove(state,t,dk,Math.min(spec.n,Math.max(0,lineDist(unit,t)-1)));
        if(t.alive) t.drift=dk;
      }
      log(state,`${unit.name}: 『${cardName}』— 重力が牙を剥く`);
      break;
    }
    case "setdrift": {
      const t=unitById(enc,params.targetId);
      if(!t||!attackTargets(state,unit,spec).includes(t)) return {ok:false,msg:"射程内の敵を選んでください"};
      if(!DIRS[params.dir]) return {ok:false,msg:"方向を選んでください"};
      if(spec.dmg) dealDamage(state,t,spec.dmg,cardName);
      if(t.alive) t.drift=params.dir;
      log(state,`${unit.name}: 『${cardName}』→ ${t.name} の慣性を書き換えた`);
      break;
    }
    case "execute": {
      // トドメ: 傷ついている敵に大ダメージ(コンボの締め)
      const t=unitById(enc,params.targetId);
      if(!t||!attackTargets(state,unit,spec).includes(t)) return {ok:false,msg:"射程内の対象を選んでください"};
      const total=spec.dmg + (t.hp<t.maxHp?spec.bonus:0);
      if(t.hp<t.maxHp) fx(state,{type:"float",x:t.x,y:t.y,text:"トドメ!",cls:"good"});
      dealDamage(state,t,total,cardName);
      log(state,`${unit.name}: 『${cardName}』→ ${t.name}(${total}ダメージ)`);
      break;
    }
    case "spawnhaz": {
      // 地形を作る: ビルド軸(物理派)の供給源
      const free=neighborCells(unit.x,unit.y).filter(c=>!unitAt(enc,c.x,c.y));
      if(!free.length) return {ok:false,msg:"隣接に空きマスがない"};
      const d=ENEMY_DEFS[spec.haz];
      let placed=0;
      for(const c of free){
        if(placed>=spec.count) break;
        enc.summonSeq=(enc.summonSeq||0)+1;
        enc.units.push({id:"ph"+enc.summonSeq, side:"hazard", type:spec.haz, name:d.name, icon:d.icon,
          x:c.x, y:c.y, hp:d.hp, maxHp:d.hp, dmg:d.dmg, drift:null, shield:0, alive:true});
        fx(state,{type:"boom",x:c.x,y:c.y});
        placed++;
      }
      log(state,`${unit.name}: 『${cardName}』— ${d.name}×${placed}を展開した`);
      break;
    }
    case "heal": {
      unit.hp=Math.min(unit.maxHp,unit.hp+spec.n);
      if(spec.shield) unit.shield+=spec.shield;
      log(state,`${unit.name}: 『${cardName}』修理完了 (HP${unit.hp})`);
      break;
    }
    case "shield": {
      unit.shield+=spec.n;
      if(spec.brake) unit.drift=null;
      log(state,`${unit.name}: 『${cardName}』シールド展開(${unit.shield})${spec.brake?"+制動":""}`);
      break;
    }
    case "salvage": {
      const c=cardByUid(state,params.salvageUid);
      if(!c||c.loc!=="discard") return {ok:false,msg:"消耗パイルから選んでください"};
      c.loc="hand";
      log(state,`${unit.name}: 『${cardName}』— ${defOf(c).name}を回収した`);
      break;
    }
    default: return {ok:false,msg:"unknown action: "+spec.kind};
  }
  finishHalf(state,idx);
  return {ok:true};
}

function fizzleAction(state, idx){
  const enc=state.enc;
  if(enc.step!=="player"||!enc.pending) return {ok:false,msg:"not player phase"};
  const p=enc.pending[idx];
  if(!p||p.done) return {ok:false,msg:"invalid"};
  log(state,`『${defOf(cardByUid(state,p.uid)).name}』の${p.half==="top"?"上":"下"}側は不発 — 宇宙は広い、当てが外れることもある`);
  finishHalf(state,idx,false);
  return {ok:true};
}

function finishHalf(state,idx,used){
  const enc=state.enc;
  enc.pending[idx].done=true;
  enc.pending[idx].used=(used!==false); // 不発ならロストアクションも燃えない
  checkContainer(state);
  // 勝利条件はイベント駆動で即時評価(L-015): 全滅したら残りの行動は不要
  if(enemies(enc).length===0 && !state.run.over && enc.pending.some(p=>!p.done)){
    log(state,"敵性反応消失 — 残りの行動は不要だ。","good");
    for(const p of enc.pending) p.done=true;
  }
  if(enc.pending.every(p=>p.done)){
    enc.awaitEnd=true;
    if(enemies(enc).length===0 || state.run.over) commitTurn(state);
  }
}

// プレイヤーターン確定 → 敵フェイズへ(ここまでは⟲やり直し可能)
function commitTurn(state){
  const enc=state.enc;
  if(!enc||!enc.awaitEnd) return {ok:false,msg:"確定できる状態ではない"};
  for(const p of enc.pending){
    const c=cardByUid(state,p.uid);
    if(c.loc!=="hand") continue;
    const sp=defOf(c)[p.half];
    if(sp.lost && p.used){
      c.loc="lost";
      fx(state,{type:"stamp",x:0,y:0,text:"🔥カードロスト"});
      log(state,`『${defOf(c).name}』は燃え尽きた — ロストアクションの代償。`,"warn");
    } else c.loc="discard";
  }
  enc.pending=null; enc.awaitEnd=false;
  enc.killStreak=0;
  enc.step="enemy";
  pump(state);
  return {ok:true};
}

// ---- encounter end / run flow ----
function finishEncounter(state){
  const run=state.run;
  for(const c of state.run.cards){ if(["hand","discard","reserve"].includes(c.loc)) c.loc="pool"; c.hot=false; } // 残骸の熱は戦域を跨がない
  const ship=unitById(state.enc,"ship"), drone=unitById(state.enc,"drone");
  chron(state,"clear",{rounds:state.enc.round, hull:ship?ship.hp:0});
  run.shipHp = ship?ship.hp:run.shipHp;
  run.droneHp = (drone&&drone.alive)?drone.hp:0;
  state.enc=null; state._snap=null;
  if(run.tutorial){ state.screen="tutorialdone"; return; }
  if(run.encIdx===0){
    run.encIdx=1;
    // 第1戦域クリア → 整備ドックへ。有料整備/解体があるので全強化済みでも必ず開く
    run.dockMainDone=false; run.dockPatch=false; run.dockRecover=false; run.dockSeq=(run.dockSeq||0)+1;
    state.screen="upgrade";
  }
  else {
    // 危険ルート第2戦域クリア報酬(Sol v2: ZONE1-3=₢2 / ZONE4-9=₢1。深度倍率との二重加速を抑える)
    if(run.route==="danger") earnRunCredits(state, run.zone<=3?2:1);
    state.screen="relic"; state.pendingRelic=rollRelic(state);
  }
}

function chooseRoute(state, route){
  state.run.route=route;
  state.run.routeTotal=(state.run.routeTotal||0)+1;
  if(route==="danger") state.run.routeDanger=(state.run.routeDanger||0)+1;
  log(state, route==="danger" ? "危険ルート選択 — 深部信号が強い。良い遺物の匂いだ。" : "安全ルート選択 — 賢明だ。臆病とも言うが。", "warn");
  state.screen="loadout";
}

function rollRelic(state){
  const seen=new Set(state.run.relicsSeen);
  let pool=RELIC_DEFS.filter(r=>!seen.has(r.id));
  if(!pool.length) return null;
  const wantRare = state.run.route==="danger" || (state.run.zone>=4 && state.rand()<0.5);
  let sub=pool.filter(r=>r.rare===wantRare);
  if(!sub.length) sub=pool;
  return sub[Math.floor(state.rand()*sub.length)];
}

function resolveRelic(state, choice){
  const r=state.pendingRelic;
  if(r){
    state.run.relicsSeen.push(r.id);
    if(choice==="seal"){
      state.run.cargo.push(r.id);
      chron(state,"relic",{name:r.name,choice:"seal"});
      log(state,`『${r.name}』をカーゴに封印した。家まで持って帰るんだ。`,"good");
    } else {
      const uid="u"+(state.run.nextUid++);
      state.run.cards.push({uid, defId:r.card, loc:"pool", relicId:r.id});
      state.run.deployed.push(r.id);
      chron(state,"relic",{name:r.name,choice:"deploy"});
      log(state,`『${r.name}』を展開! 『${CARD_DEFS[r.card].name}』がデッキに加わった。売却価値は放棄した — カードを失えば、遺物ごと永遠に消える。`,"warn");
    }
  }
  state.pendingRelic=null;
  if(isBossZone(state.run.zone) || state.run.zone>=CONFIG.ZONES){
    state.screen="leapkeep";
  } else {
    advanceArea(state);
  }
}

function canDeploy(state){ return aliveCards(state).length < CONFIG.DECK_CAP; }

function recoverTransitCard(state){
  const c=state.run.cards.find(c=>c.loc==="lost" && !c.relicId && !c.fuelLost);
  if(!c) return null;
  c.loc="pool";
  return c;
}

function advanceArea(state){
  if(state.run.zone>=CONFIG.ZONES){ state.screen="leapkeep"; return; }
  const from=state.run.zone;
  const sd=shipDef(state.run.shipId);
  const beforeHp=state.run.shipHp??sd.hp;
  state.run.shipHp=Math.min(sd.hp,beforeHp+2);
  state.run.droneHp=Math.min(sd.droneHp,(state.run.droneHp??sd.droneHp)+1);
  const recovered=recoverTransitCard(state);
  state.run.zone++;
  state.run.encIdx=0;
  state.run.route=null;
  chron(state,"advance",{from,to:state.run.zone, repair:state.run.shipHp-beforeHp, recovered:recovered?defOf(recovered).name:null});
  log(state,`《${ZONE_NAMES[from-1]}》を抜けた。帰還判断はまだ遠い — 航行補給で船体+${state.run.shipHp-beforeHp}${recovered?`、『${defOf(recovered).name}』を復帰`:""}。次は《${ZONE_NAMES[state.run.zone-1]}》。`,"warn");
  state.screen="loadout";
}

function doLeap(state, fuelUids){
  if(!isBossZone(state.run.zone) || state.run.zone>=CONFIG.ZONES) return {ok:false,msg:"リープ判断はボス撃破後のチェックポイントだけだ"};
  const uids=Array.isArray(fuelUids)?fuelUids:[fuelUids];
  const need=fuelCost(state);
  if(uids.length!==need || new Set(uids).size!==uids.length) return {ok:false,msg:`燃料はカード${need}枚(深淵IIの代償)`};
  const cs=uids.map(u=>cardByUid(state,u));
  if(cs.some(c=>!c||c.loc==="lost")) return {ok:false,msg:"そのカードは使えない"};
  for(const c of cs){ c.loc="lost"; c.fuelLost=true; state.run.fuelBurnt++; }
  state.run.leapStakes=(state.run.leapStakes||0)+1;
  state.run.zone++; state.run.encIdx=0; state.run.route=null;
  chron(state,"leap",{to:state.run.zone, burned:cs.map(c=>defOf(c).name).join("/"), cardsLeft:aliveCards(state).length, mult:rewardMultiplier(state.run)});
  log(state,`『${cs.map(c=>defOf(c).name).join("』『")}』を燃料に変換 — ジャンプ! 報酬倍率x${rewardMultiplier(state.run)}で${ZONE_NAMES[state.run.zone-1]}へ。`,"warn");
  if(aliveCards(state).length<2){ runOver(state,false,"exhausted"); return {ok:true}; }
  state.screen="loadout";
  return {ok:true};
}

function doKeep(state){ runOver(state,true,"returned"); }

// 集中型(勝利4類型): 同系統の封印は2個目×1.5・3個目×2.0 — 封印を「消去法」から「セット収集」に変える(design-economy-charter §2-②③)
// 同系統の集中階和(bonusValue抜き)。cargoValue と settlementValue が共有
function concentratedValue(relicIds){
  const cnt={};
  return relicIds.reduce((s,id)=>{
    const r=RELIC_DEFS.find(x=>x.id===id);
    const k=(cnt[r.tag]=(cnt[r.tag]||0)+1);
    return s+Math.round(r.value*(1+0.5*(k-1)));
  },0);
}
function cargoValue(state){ return state.run.bonusValue + concentratedValue(state.run.cargo); }
// 安全帰還ボーナス: 残り寿命6枚以上で+20%(Keep側の金銭的裏打ち。固定値でなく寿命参照=ラン長調整に強い)
function safeReturnBonus(state){ return aliveCards(state).length>=6?1.2:1; }
function cargoPayoutValue(state){
  return Math.round(cargoValue(state)*rewardMultiplier(state.run)*safeReturnBonus(state)); // Leap/Keepプレビュー: 帰還を仮定した「全部売れば」額
}
// pre0(2026-07-14): カーゴ精算の正本 — 集中階和×深度×安全帰還を「実際に」支払う。
// 旧実装は遺物ごとに value×mult で精算し、集中(×1.5/2.0)も安全帰還(×1.2)もプレビュー表示だけの絵に描いた餅だった(全観点監査が検出)。
// 個別売却額 = settlementValue(集合) − settlementValue(集合−その遺物) と定義すれば、売却順・分割インストールに依らず総額が一致する(望遠鏡和)。
function settlementValue(state, relicIds){
  const r=state.run;
  const base=(r.win?r.bonusValue:0)+concentratedValue(relicIds); // bonusValueと安全帰還は勝利時のみ。集中と深度は敗北でも払う(カーゴ没収なし)
  const safe=(r.win && aliveCards(state).length>=6)?1.2:1;
  return Math.round(base*rewardMultiplier(r)*safe);
}
function relicPayoutValue(state, value){ return value*rewardMultiplier(state.run); }

// 回収コンテナ: プレイヤーユニットが乗ったら回収(移動・ドリフトどちらでも)
function checkContainer(state){
  const enc=state.enc;
  if(!enc||!enc.container||enc.container.taken) return;
  const c=enc.container;
  const u=players(enc).find(p=>p.x===c.x&&p.y===c.y);
  if(u){
    c.taken=true;
    state.run.bonusValue+=2;
    fx(state,{type:"stamp",x:c.x,y:c.y,text:"コンテナ回収! 価値+2"});
    log(state,`${u.name} が漂流コンテナを回収 — 売却価値+2`,"good");
  }
}

function unlocks(state){
  const v=cargoValue(state);
  return UNLOCK_POOL.map(u=>({...u, name:CARD_DEFS[u.defId].name, got:v>=u.cost}));
}

// 展開遺物の生死(展開=売却価値の放棄。カードがlostなら遺物も消滅)
function deployedStatus(state){
  return state.run.deployed.map(id=>{
    const card=state.run.cards.find(c=>c.relicId===id);
    return { id, relic:RELIC_DEFS.find(r=>r.id===id), alive: !!card && card.loc!=="lost" };
  });
}

// ---------- WebAudio SE(依存ゼロの合成音) ----------
let _ac=null;
function sfx(kind, mul){
  if(META.muted) return;
  mul=mul||1;
  try{
    _ac=_ac||new (window.AudioContext||window.webkitAudioContext)();
    const t=_ac.currentTime;
    const def={
      click:[660,.05,"square",.04], pick:[520,.06,"triangle",.05],
      hit:[130,.12,"sawtooth",.09], boom:[55,.3,"square",.14],
      salvage:[880,.12,"triangle",.07], warp:[440,.25,"sine",.08],
      bad:[180,.2,"sawtooth",.08], good:[760,.1,"triangle",.06],
    }[kind]||[440,.08,"sine",.05];
    const [f0,dur,type,vol]=def;
    const f=f0*mul;
    const o=_ac.createOscillator(), g=_ac.createGain();
    o.type=type; o.frequency.setValueAtTime(f,t);
    if(kind==="boom"||kind==="hit") o.frequency.exponentialRampToValueAtTime(Math.max(30,f/3),t+dur);
    if(kind==="warp"||kind==="salvage") o.frequency.exponentialRampToValueAtTime(f*2,t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(g); g.connect(_ac.destination); o.start(t); o.stop(t+dur+.02);
  }catch(e){}
}

// 語順固定: 主効果→威力→射程→範囲/対象→追加効果。色はカテゴリ固定(移動=シアン/攻撃=コーラル/射程=黄/防御=緑/特殊=紫)。
function labelHtml(spec){
  const st=(cls,icon,label,v)=>`<span class="st st-${cls}">${ic(icon)}<i>${label}</i>${v!==undefined?`<b>${v}</b>`:""}</span>`;
  const tag=(cls,txt,v)=>`<span class="stag st-${cls}">${txt}${v!==undefined?`<b>${v}</b>`:""}</span>`;
  const SEP=`<span class="stsep">|</span>`;
  const mv=v=>st("mv","i-move","移動",v), atk=v=>st("atk","i-attack","攻撃",v), rg=v=>st("rg","i-range","射程",v);
  const wrap2=inner=>`<span class="statline">${inner}</span>`;
  switch(spec.kind){
    case "move": return wrap2(`${mv(spec.n)}${spec.phase?tag("sp","すり抜け"):""}${spec.selfDmg?tag("atk","自傷",spec.selfDmg):""}`);
    case "brake_move": return wrap2(`${st("mv","i-brake","制動")}${spec.n>0?mv(spec.n):""}`);
    case "ram": return wrap2(`${st("atk","i-ram","突進",spec.n)}`);
    case "pierce": return wrap2(`${atk(spec.dmg)}${SEP}${rg(spec.range)}${tag("sp","直線")}${tag("sp","貫通")}${spec.noRecoil?"":tag("rg","反動")}`);
    case "attack_push": return wrap2(`${atk(spec.dmg)}${tag("sp","押出",spec.n)}`);
    case "attack_pull": return wrap2(`${atk(spec.dmg)}${SEP}${rg(spec.range)}${tag("sp","引寄",spec.n)}`);
    case "warp": return wrap2(`${st("sp","i-warp","ワープ")}`);
    case "attack": return wrap2(`${atk(spec.dmg)}${SEP}${rg(spec.range)}${spec.cond?tag("atk","⚡"):""}`);
    case "attack_line": return wrap2(`${atk(spec.dmg)}${SEP}${rg(spec.range)}${tag("sp","直線")}`);
    case "attack_all": return wrap2(`${atk(spec.dmg)}${SEP}${rg(spec.range)}${tag("sp","全周")}`);
    case "attack_multi": return wrap2(`${atk(spec.dmg)}${SEP}${rg(spec.range)}${tag("sp","×",spec.count)}`);
    case "push": return wrap2(`${st("sp","i-push","押出",spec.n)}${spec.dmg?atk(spec.dmg):""}`);
    case "pull": return wrap2(`${st("sp","i-pull","引寄",spec.n)}${SEP}${rg(spec.range)}`);
    case "pull_all": return wrap2(`${st("sp","i-pull","引寄",spec.n)}${tag("sp","全体")}${rg(spec.range)}`);
    case "setdrift": return wrap2(`${spec.dmg?atk(spec.dmg)+SEP:""}${st("sp","i-drift","ドリフト")}${rg(spec.range)}`);
    case "execute": return wrap2(`${atk(spec.dmg)}${SEP}${rg(spec.range)}${tag("atk","傷+",spec.bonus)}`);
    case "spawnhaz": return wrap2(`${st("sp","i-card","設置")}<b class="stemoji">${spec.haz==="mine"?"☄️":"🪨"}×${spec.count}</b>`);
    case "heal": return wrap2(`${st("def","i-heal","修理",spec.n)}${spec.shield?st("def","i-shield","盾",spec.shield):""}`);
    case "shield": return wrap2(`${st("def","i-shield","盾",spec.n)}`);
    case "salvage": return wrap2(`${st("sp","i-salvage","回収",1)}`);
    default: return esc(spec.label);
  }
}

king (holding)","動かない":"not moving","✦位相転移(慣性・衝突無視)":"phase warp (ignores drift/collision)","選び直す":"reselect","方向:":"direction:","本当に帰る? 深淵はまだ、何かを隠しているよ。":"Really heading home? The abyss is still hiding something.","最深部からの生還だ。胸を張れ。":"You made it back from the deepest reach. Stand tall.","こじ開ける(旗艦HP-1) — ロストしたカードを1枚回収":"Force it open (flagship HP-1) — recover 1 lost card","立ち去る":"walk away","こじ開けて調査(60%で遺物 / 40%で何かが目を覚ます)":"Pry it open and investigate (60% a relic / 40% something wakes up)","祈りを捧げる — 次の休息1回、無償で選別できる":"Offer a prayer — your next rest lets you choose for free","石碑のような構造体が漂っている。死文明の墓標だ。微かな信号がまだ脈打っている。":"A monolithic structure drifts in the void. A grave marker of a dead civilization. A faint signal still pulses within.","航路の途中、漂流するコンテナ船。応答はない。ハッチは固く錆びついている。":"A derelict container ship drifts along the route. No response. The hatch is rusted shut.","埃を被ったコンテナの中に、見覚えのある部品が…(旗艦HP-1の代償は次の戦域で支払う)":"Inside the dust-caked container, a familiar-looking part... (the flagship HP-1 cost is paid at the start of next zone)","🪦 静かな墓標":"Silent Gravestone","📡 漂流船":"Derelict Ship","了解、行くぞ":"Understood, let's move","サルベージ屋の心得 (30秒で読める)":"The Salvager's Creed (30-second read)","❶ 毎ターン<b>カードを2枚</b>選ぶ。1枚目はクリックした側、2枚目は自動で<b>もう片方の側</b>(▲航行/▼戦闘)<br>":"❶ Pick <b>2 cards</b> every turn. The 1st is whichever half you click; the 2nd auto-fills <b>the other half</b> (▲Nav/▼Combat)<br>","❷ 行動は<b>船とドローンの好きな方</b>にやらせていい。順番も自由。両方同じユニットでもいい<br>":"❷ Assign actions to <b>either the ship or the drone</b>, any order. Both can go to the same unit<br>","❸ <b>🌀慣性</b>: 移動した者は次のラウンド開始時、同方向へ勝手に1マス滑る。<b>半透明の影が滑り先</b>。止まりたければ『制動』<br>":"❸ <b>🌀Drift</b>: whoever moves slides 1 more tile the same direction next round start. <b>The translucent ghost shows where.</b> Play 'Brake' to stop<br>","❹ <b>赤いマス</b>=このラウンド終わりに敵が撃つ場所(数字=ダメージ)。<b>敵も喰らう</b> — 触手や機雷に押し込め<br>":"❹ <b>Red tiles</b> = where enemies will fire at round's end (number = damage). <b>Enemies take it too</b> — shove them into tentacles or mines<br>","❺ カード=寿命。休息で<b>1枚永久ロスト</b>。被弾はカードで無効化できるが、それも永久に失う<br>":"❺ Cards = lifespan. Resting <b>permanently loses 1 card</b>. You can burn a card to cancel damage, but that's lost forever too<br>","❻ <b>船体はゾーンを越えて持ち越し</b>。回復は応急パッチ/整備ドック/物理キルの残骸修理だけ<br>":"❻ <b>Hull carries over between zones.</b> Healing only comes from patch kits / the repair dock / physkill wreckage salvage<br>","⟲ 敵ターン前なら<b>何度でもやり直せる</b>。怖がらず試せ":"⟲ You can <b>redo as many times as you want</b> before the enemy turn. Don't be afraid to experiment","❶ 手札からカードの<b>▲上半分(航行)</b>をクリック — 1枚目はクリックした側を使う":"❶ Click a card's <b>▲top half (Nav)</b> from your hand — the 1st pick uses whichever half you click","❷ 2枚目のカードをクリック — 自動で<b>▼下半分(戦闘)</b>になる":"❷ Click a 2nd card — it auto-becomes <b>▼bottom half (Combat)</b>","❸ 光るマスをクリックで移動。<b>端はループする</b>。黄色い機雷の近くに敵を誘うと…?":"❸ Click a glowing tile to move. <b>Edges wrap around.</b> Lure an enemy near a yellow mine and...?","❹ 赤く光る敵をクリックで攻撃(届かなければ「不発にする」でもOK)":"❹ Click a red-glowing enemy to attack (if out of range, 'fizzle' is fine too)","❺ <b>Enter</b>か「敵ターンへ」で確定。⟲でターン丸ごとやり直せる":"❺ Confirm with <b>Enter</b> or 'End Turn'. ⟲ redoes the whole turn","❻ 薄い影=<b>慣性の滑り先</b>。敵を機雷に押し込む/ぶつけると<b>物理キル</b>=残骸から回収!":"❻ Faint ghost = <b>where drift will slide you</b>. Shove/ram an enemy into a mine for a <b>physkill</b> = salvage from the wreck!","⚠ WARNING ⚠":"⚠ WARNING ⚠","桁外れのエネルギー反応":"An off-the-charts energy signature","交戦開始":"Engage","🏠 帰還する (KEEP)":"🏠 Head Home (KEEP)","🚀 跳ぶ (LEAP)":"🚀 Leap Deeper (LEAP)","🔓標準: 基準難易度":"🔓Standard: baseline difficulty","FS HP 8 / 随伴機HP 4":"FS HP 8 / Escort HP 4","FS HP 10 / 随伴機HP 3":"FS HP 10 / Escort HP 3","₢15で就役(不足)":"Commission for ₢15 (insufficient)","FS HP 7 / 随伴機HP 4":"FS HP 7 / Escort HP 4","₢30で就役(不足)":"Commission for ₢30 (insufficient)","出撃デッキ編成 — 10枚を選べ (10/10)":"Sortie deck build — pick 10 cards (10/10)","🛡 重装編成 ✓":"🛡 Heavy Loadout ✓","📯 増援協定":"📯 Reinforcement Pact","⛽ 過給機関":"⛽ Overcharged Engine","🚫 補給封鎖 ✓":"🚫 Supply Blockade ✓","☄️ 機 Blank Volley — Attack 3, Range 1","ドローン・スウォーム — 移動2(直線)":"Drone Swarm — Move 2 (straight line)","ドローン・スウォーム — 攻撃2 射程2":"Drone Swarm — Attack 2, Range 2","応急パッチ — 制動+移動1(ドリフト消去)":"Quick Patch — Brake + Move 1 (clears drift)","応急パッチ — 修理2(HP回復)":"Quick Patch — Repair 2 (HP restore)","HPを回復(最大値まで)。船とドローンどちらに使うかは選べる。":"Restores HP (up to max). Choose whether to apply it to the ship or a drone.","リパルサー・ブラスト — 移動1(直線)":"Repulsor Blast — Move 1 (straight line)","リパルサー・ブラスト — 隣接敵を2マス押し飛ばす(ドリフト付与)":"Repulsor Blast — Knocks an adjacent enemy back 2 tiles (grants drift)","押し: 対象を直線に移動させ、その方向のドリフトを与える。途中で誰かにぶつかると双方1ダメージ。敵同士をぶつけろ。":"Push: moves the target in a straight line and gives it drift in that direction. Colliding with anyone en route deals 1 damage to both. Slam enemies into each other.","衝突: ドリフトや押しで他ユニットにぶつかると、双方1ダメージ+ドリフト消滅(味方同士は無傷で停止)。":"Collision: colliding with another unit via drift or a push deals 1 damage to both and clears drift (allies stop unharmed instead).","狙撃レールガン — 移動1(直線)":"Sniper Railgun — Move 1 (straight line)","狙撃レールガン — 貫通2 直線射程3(敵味方無差別)・反動ドリフト":"Sniper Railgun — Pierce 2, straight-line range 3 (hits friend and foe alike), recoil drift","貫通射撃: 直線上・射程内の全ユニットを撃ち抜く(敵も岩も…味方も!)。":"Piercing Shot: fires through every unit in a straight line within range (enemies, rocks... allies too!).","⚠ 反動: 撃った逆方向に自分がドリフトする。位置取りとセットで使え。":"⚠ Recoil: you drift in the direction opposite your shot. Pair it with your positioning.","直線: 自分と同じ行/列の敵だけが対象(ループ込み)。":"Straight line: only targets enemies sharing your row/column (loops included).","回避機動 — 移動2(直線)":"Evasive Maneuver — Move 2 (straight line)","回避機動 — シールド2(このラウンド)":"Evasive Maneuver — Shield 2 (this round)","シールド: このラウンドの被ダメージを数値ぶん吸収。次のラウンド開始時に消える。":"Shield: absorbs that much damage taken this round. Expires at the start of next round.","ラムアタック — 突進2: 直線上の標的に2ダメージして停止":"Ram Attack — Charge 2: deals 2 damage to the first target in line and stops","突進2: 直進し、最初にぶつかった標的に2ダメージして停止(突進力=移動距離=威力の単値)。何もいなければ全距離進んで滑る。":"Charge   // pre0 精算表示(集中×深度×安全帰還を反映した売却額)

  ["^集中×深度倍率x(\\d+)を反映した確定額。今売れば ₢(\\d+)\\(残りカーゴの集中ボーナスも動く\\)$","Locked-in value with concentration × depth ×$1. Sell now for ₢$2 (the remaining cargo's concentration bonus shifts too)"],
  ["^ ?\\(回収ボーナス₢(\\d+)×([\\d.]+)=\\+₢(\\d+)込み\\)$"," (salvage bonus ₢$1×$2 = +₢$3 incl.)"],
);
let EN_RULES_C=[];
function trText(s){
  if(LANG!=="en"||!s) return s;
  const t=s.trim(); if(!t||!/[　-鿿！-｠぀-ヿ]/.test(t)) return s;
  const hit=EN_EXACT[t];
  if(hit!=null) return s.replace(t,()=>hit);
  for(const [re,tpl] of EN_RULES_C){
    const m=re.exec(t);
    if(m) return s.replace(t,()=>tpl.replace(/\$(\d)/g,(x,i)=>{const g=m[+i]??"";return EN_EXACT[g]??(g&&g!==t?trText(g):g);})); // 捕獲群は再帰翻訳(旗艦ヴァグランツ→FS Vagrants等の入れ子)
  }
  return s;
}
function translateDom(root){
  if(LANG!=="en"||!root) return;
  if(root.nodeType===3){ root.nodeValue=trText(root.nodeValue); return; }
  const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT);
  let n; while(n=w.nextNode()) n.nodeValue=trText(n.nodeValue);
  const list=root.matches&&root.matches("[data-tt]")?[root,...root.querySelectorAll("[data-tt]")]:root.querySelectorAll("[data-tt]");
  for(const el of list) el.dataset.tt=el.dataset.tt.split(/<br\/?>/).map(x=>trSeg(x)).join("<br>");
}
function trSeg(seg){
  // ツールチップ断片: <b>等のタグを保ったまま素片ごとに翻訳し、日本語が残るならタグを捨てて全文翻訳(強調より完訳を優先)
  let out=seg.split(/(<[^>]+>)/).map(x=>x.startsWith("<")?x:trText(x)).join("");
  if(/[぀-ヿ㐀-鿿]/.test(out)){
    const plain=trText(seg.replace(/<[^>]+>/g,""));
    if(!/[぀-ヿ㐀-鿿]/.test(plain)) out=plain;
  }
  return out;
}
function initI18n(){
  const q=new URLSearchParams(location.search).get("lang");
  LANG=q||META.lang||"ja";
  if(q&&META.lang!==q){ META.lang=q; saveMeta(); }
  document.documentElement.lang=LANG;
  EN_RULES_C=EN_RULES.map(([r,t])=>{ try{ return [new RegExp(r),t]; }catch(e){ return null; } }).filter(Boolean);
  // 以後の描画は全て自動翻訳(モーダル後差し込み・fxスタンプ含む)
  new MutationObserver(muts=>{
    if(LANG!=="en") return;
    for(const m of muts) for(const nd of m.addedNodes) translateDom(nd);
  }).observe(document.getElementById("app"),{childList:true,subtree:true});
}

function startGame(seed){

// ---------- render dispatch ----------
function render(){
  const app=document.getElementById("app");
  if(!S){ holoSync(); app.innerHTML=""; return; }
  if(S.screen!=="battle") holoSync(); // battle離脱時の3D停止(battle中の同期はflip()が担う)
  H.pvOff();
  if(typeof updateArtLayers==="function") updateArtLayers();
  if(S.screen==="title") return renderTitle(app);
  if(S.screen==="hangar") return renderHangar(app);
  if(S.screen==="shipselect") return renderShipSelect(app);
  if(S.screen==="deckbuild") return renderDeckBuild(app);
  if(S.screen==="upgrade") return renderUpgrade(app);
  if(S.screen==="event") return renderEvent(app);
  if(S.screen==="tutorialdone"){
    app.innerHTML=`<div class="modal" style="margin:80px auto; text-align:center; border-color:var(--green);">
      <h2 style="color:var(--green)">📚 訓練航行 修了</h2>
      <p class="muted" style="line-height:2;">2枚プレイ、慣性、そして物理キル — 基本は叩き込んだ。<br>
      本番は船体が持ち越しだ。慎重に、しかし大胆に。<br><b style="color:var(--txt)">深淵があんたを待ってる。</b></p>
      <div class="opts" style="justify-content:center;"><button class="primary cue" onclick="H.toTitle()">出撃準備へ</button></div>
    </div>`;
    return;
  }
  if(S.screen==="loadout") return renderLoadout(app);
  if(S.screen==="battle"){ renderBattle(app); flip(); drainFx(); maybeRunDriftPhase(); maybeRunEnemyPhase(); return; }
  if(S.screen==="route") return renderRoute(app);
  if(S.screen==="relic") return renderRelic(app);
  if(S.screen==="leapkeep") return renderLeapKeep(app);
  if(S.screen==="summary") return renderSummary(app);
}

// ---- Phase 2: ホロ盤面フック(全てガード付き — holo.jsが無い/死んだ環境では素通り。R19) ----
let HOLO=null, HOLO_DEAD=false;
const holoOn=()=>!!HOLO&&document.body.classList.contains("holo");
function holoKill(e){
  HOLO_DEAD=true; window.__holoFailed=true;
  try{ if(HOLO&&HOLO.dispose) HOLO.dispose(); }catch(_){}
  HOLO=null; document.body.classList.remove("holo");
  try{ console.warn("holo3d disabled:", e); }catch(_){}
}
function holoSync(){ if(!HOLO) return null; try{ return HOLO.sync()||null; }catch(e){ holoKill(e); return null; } }
function holoFx(ev){ if(!HOLO) return; try{ HOLO.fx(ev); }catch(e){ holoKill(e); } }
function holoHitStop(ms){ if(!HOLO) return; try{ HOLO.hitStop(ms); }catch(e){ holoKill(e); } }
function holoHover(x,y){ if(!holoOn()) return; try{ HOLO.hover(x,y); }catch(e){ holoKill(e); } }
function holoHoverOff(){ if(!HOLO) return; try{ HOLO.hoverOff(); }catch(e){ holoKill(e); } }

function flip(){
  const beat=holoSync(); // wrapFxのspliceより先に呼ぶ(3D側はwrap情報を非破壊で読む — D3)
  // ラップ(縁越え)したユニットは盤面横断スライドではなく「端から退場→反対側から入場」を描く
  const wraps={};
  if(S&&S.enc&&S.enc.wrapFx) for(const w of S.enc.wrapFx.splice(0)) wraps[w.unitId]=w.dir;
  const useOff=holoOn(); // R4: holo時はuntransformed(offset)座標で距離を出す(tilt投影の歪んだ軌道でラベルが3Dコマから剥離するのを防ぐ)
  // ドリフトビート中はDOMラベルも3Dの慣性オーバーシュートと同尺・同系イージング(D4)
  const slideDur=(useOff&&beat&&beat.driftBeat)?500:340;
  const slideEase=(useOff&&beat&&beat.driftBeat)?"cubic-bezier(.22,.9,.32,1.16)":"ease-out";
  document.querySelectorAll(".unit[data-uid]").forEach(el=>{
    const uid=el.dataset.uid;
    let r;
    if(useOff){ const c=el.closest(".cell"); r={left:c?c.offsetLeft:0, top:c?c.offsetTop:0, width:c?c.offsetWidth:0, m:1}; }
    else { const b=el.getBoundingClientRect(); r={left:b.left, top:b.top, width:b.width, m:0}; }
    const p=prevRects[uid];
    if(p && p.m===r.m){
      const dx=p.left-r.left, dy=p.top-r.top;
      if((dx||dy) && wraps[uid]){
        if(useOff) el.animate([{opacity:0},{opacity:0,offset:.4},{opacity:1}],{duration:430,easing:"ease-out"}); // 3D側が2相ワープを描く(R15)。ラベルは入場フェードのみ
        else wrapJumpAnim(el,p,el.getBoundingClientRect(),wraps[uid]);
      }
      else if(dx||dy) el.animate([{transform:`translate(${dx}px,${dy}px)`},{transform:"none"}],{duration:slideDur,easing:slideEase});
    }
    prevRects[uid]={left:r.left,top:r.top,m:r.m};
  });
}
// 世界一周の2相アニメ: 旧位置のゴーストが縁の外へ消え、本体が反対の縁の外から滑り込む
function wrapJumpAnim(el,p,r,dirKey){
  const d=DIRS[dirKey], cs=r.width*1.1;
  const g=el.cloneNode(true);
  g.style.cssText=`position:fixed;left:${p.left}px;top:${p.top}px;width:${r.width}px;height:${r.height}px;margin:0;z-index:90;pointer-events:none;`;
  document.body.appendChild(g);
  g.animate([{transform:"none",opacity:.95},{transform:`translate(${d.x*cs}px,${d.y*cs}px) scale(.7)`,opacity:0}],
    {duration:170,easing:"ease-in"}).onfinish=()=>g.remove();
  el.animate([
    {transform:`translate(${-d.x*cs}px,${-d.y*cs}px) scale(.7)`, opacity:0},
    {transform:`translate(${-d.x*cs}px,${-d.y*cs}px) scale(.7)`, opacity:0, offset:.4},
    {transform:"translate(0,0) scale(1)", opacity:1},
  ],{duration:430,easing:"ease-out"});
}

function cellCenter(x,y,board){
  const cell=document.querySelector(`[data-xy="${x},${y}"]`);
  if(!cell) return null;
  if(holoOn()) // R4: #fxは盤ローカル座標系(CSS変換前)なのでoffset値が正 — tilt時のスクリーン座標流用歪みを避ける
    return {x:cell.offsetLeft+cell.offsetWidth/2, y:cell.offsetTop+cell.offsetHeight/2};
  const cr=cell.getBoundingClientRect(), br=board.getBoundingClientRect();
  return {x:cr.left-br.left+cr.width/2, y:cr.top-br.top+cr.height/2};
}
function drainFx(){
  const enc=S&&S.enc; if(!enc||!enc.fxQueue||!enc.fxQueue.length) return;
  const board=document.getElementById("board");
  if(!board){ enc.fxQueue.length=0; return; }
  let layer=document.getElementById("fx");
  if(!layer){ layer=document.createElement("div"); layer.id="fx"; board.appendChild(layer); }
  for(const ev of enc.fxQueue.splice(0)){
    // 遅延付きイベント(連鎖の波及演出): 時間になったらキューへ戻して再ドレイン
    if(ev.d){
      const e=ev, delay=ev.d; e.d=0;
      setTimeout(()=>{ if(S&&S.enc===enc){ enc.fxQueue.push(e); drainFx(); } },delay);
      continue;
    }
    if(ev.type==="hitflash"){
      const el=document.querySelector(`.unit[data-uid="${ev.unitId}"]`);
      if(el){ el.classList.remove("hitfx"); void el.offsetWidth; el.classList.add("hitfx"); }
      holoFx(ev); // 3D: 投影グリッチ
      sfx("hit");
      continue;
    }
    if(ev.type==="shake"){
      if(!META.fxLite){
        const cls=ev.n>=3?"shake3":(ev.n===2?"shake2":"shake"); // 連鎖段数でパンチが強くなる
        board.classList.remove("shake","shake2","shake3"); void board.offsetWidth; board.classList.add(cls);
      }
      holoFx(ev); // 3D: canvasにも同じ揺れクラス(R5 — 二重軌道を避けるためカメラでは揺らさない)
      continue;
    }
    if(ev.type==="chainx"){
      // 連鎖コンボカウンタ: 一箇所で数字が育つ(重ね置きしない — スタンプ重畳の文字化け対策)
      let el=document.getElementById("fxchain");
      if(!el){ el=document.createElement("div"); el.id="fxchain"; layer.appendChild(el); }
      el.textContent=trText(ev.n>=4?`花火大会 ×${ev.n}!!!`:(ev.n===3?"連鎖爆発 ×3!!":"誘爆 ×2!")); // 既存要素の更新はObserver対象外なので直接翻訳
      el.style.fontSize=(1.6+0.35*Math.min(ev.n,6))+"rem";
      el.classList.remove("pop"); void el.offsetWidth; el.classList.add("pop");
      clearTimeout(UI._chainT); UI._chainT=setTimeout(()=>el.remove(),950);
      sfx("salvage");
      continue;
    }
    if(ev.type==="beam"){
      // 誘爆ビーム: 爆心→巻き込み先(なぜ連鎖したかを見せる)
      const p1=cellCenter(ev.x1,ev.y1,board), p2=cellCenter(ev.x2,ev.y2,board);
      if(p1&&p2){
        const dx=p2.x-p1.x, dy=p2.y-p1.y;
        const el=document.createElement("span"); el.className="fxbeam";
        el.style.left=p1.x+"px"; el.style.top=p1.y+"px";
        el.style.width=Math.hypot(dx,dy)+"px";
        el.style.transform=`rotate(${Math.atan2(dy,dx)}rad)`;
        layer.appendChild(el); setTimeout(()=>el.remove(),280);
      }
      continue;
    }
    if(ev.type==="confetti"){
      if(META.fxLite) continue;
      for(let i=0;i<44;i++){
        const p=document.createElement("span"); p.className="fxconf";
        p.style.left=(Math.random()*100)+"%"; p.style.top="-8px";
        p.style.background=["var(--gold)","var(--cyan)","var(--red)","var(--green)","#fff"][i%5];
        p.style.animationDelay=(Math.random()*0.5)+"s";
        p.style.animationDuration=(1+Math.random()*0.9)+"s";
        layer.appendChild(p); setTimeout(()=>p.remove(),2600);
      }
      continue;
    }
    if(ev.type==="stamp"){
      const pos=cellCenter(ev.x,ev.y,board)||{x:board.clientWidth/2,y:board.clientHeight/2};
      const el=document.createElement("div"); el.className="fxstamp"+(ev.big?" big":"");
      // 縦ずらしは時間減衰式(連鎖の遅延スタンプは別ドレインで来るのでローカルカウンタでは重なる)
      const now=performance.now();
      if(now-(drainFx._sT||0)<450) drainFx._sN=(drainFx._sN||0)+1; else drainFx._sN=0;
      drainFx._sT=now;
      const sx=Math.max(90,Math.min(board.clientWidth-90,pos.x)); // 盤端で見切れない
      const sy=Math.max(40,pos.y) - 34*drainFx._sN;
      el.textContent=ev.text; el.style.left=sx+"px"; el.style.top=sy+"px";
      layer.appendChild(el); setTimeout(()=>el.remove(),1100);
      sfx("salvage");
      continue;
    }
    if(ev.type==="flash"){
      for(const c of ev.cells){
        const cell=document.querySelector(`[data-xy="${c.x},${c.y}"]`);
        if(cell){ cell.classList.remove("firing"); void cell.offsetWidth; cell.classList.add("firing"); } // holo時はCSSでアニメ無効(3Dタイルが光る)
      }
      holoFx(ev);
      continue;
    }
    const pos=cellCenter(ev.x,ev.y,board); if(!pos) continue;
    if(ev.type==="float"){
      const el=document.createElement("div"); el.className="fxfloat "+(ev.cls||"");
      el.textContent=ev.text; el.style.left=pos.x+"px"; el.style.top=pos.y+"px";
      // ダメージ数字はダメージ量に比例して大きく(VS式)
      const m=/^-(\d+)$/.exec(ev.text);
      if(m) el.style.fontSize=(0.9+Math.min(3,+m[1])*0.28)+"rem";
      layer.appendChild(el); setTimeout(()=>el.remove(),1100);
    } else if(ev.type==="boom"){
      holoFx(ev); // 3D: リング+火花(R7: holo時はDOM側の爆発ビジュアルを抑制して二重描画を避ける)
      // 大物撃破はヒットストップ(連鎖が深いほど長く世界が止まる)
      if(ev.big && !META.fxLite){
        const st=document.createElement("style"); st.textContent="*{animation-play-state:paused!important}";
        document.head.appendChild(st); setTimeout(()=>st.remove(),ev.stop||90);
        holoHitStop(ev.stop||90); // R18: 3D側は環境アニメのみ停止(移動トゥイーンはDOM同様止めない)
        // 爆発中はHUDを沈めて盤面に視線を固定
        const app=document.getElementById("app");
        if(app){ app.classList.add("boomdim"); clearTimeout(UI._boomdimT); UI._boomdimT=setTimeout(()=>app.classList.remove("boomdim"),500); }
      }
      if(holoOn()){ sfx("boom"); continue; } // DOMのring/粒子/芯はスキップ(座標系も異なるため二重かつズレる — R7)
      if(ev.core && !META.fxLite){
        // 白い芯: 白→黄→橙→赤の発光階層
        const core=document.createElement("span"); core.className="fxcore";
        core.style.left=pos.x+"px"; core.style.top=pos.y+"px";
        layer.appendChild(core); setTimeout(()=>core.remove(),300);
        const sh=document.createElement("span"); sh.className="fxshock"; // 着弾ショックリング(瞬間と熱の分離)
        sh.style.left=pos.x+"px"; sh.style.top=pos.y+"px";
        layer.appendChild(sh); setTimeout(()=>sh.remove(),340);
        const sc=document.createElement("span"); sc.className="fxscorch"; // 焦げ跡の残光
        sc.style.left=pos.x+"px"; sc.style.top=pos.y+"px";
        layer.appendChild(sc); setTimeout(()=>sc.remove(),1400);
      }
      sfx("boom");
      const ring=document.createElement("span"); ring.className="fxring";
      ring.style.left=pos.x+"px"; ring.style.top=pos.y+"px";
      if(ev.big){ ring.style.borderColor="var(--red)"; }
      layer.appendChild(ring); setTimeout(()=>ring.remove(),520);
      const n=ev.big?14:8;
      for(let i=0;i<n;i++){
        const p=document.createElement("span"); p.className="fxp";
        const a=Math.random()*Math.PI*2, r=(ev.big?44:26)*(0.5+Math.random()*0.8);
        p.style.setProperty("--dx",Math.cos(a)*r+"px");
        p.style.setProperty("--dy",Math.sin(a)*r+"px");
        p.style.left=pos.x+"px"; p.style.top=pos.y+"px";
        if(Math.random()<0.5) p.style.background="var(--red)";
        layer.appendChild(p); setTimeout(()=>p.remove(),720);
      }
    }
  }
}

// ラウンド頭の慣性解決ビート(L-004)
function maybeRunDriftPhase(){
  if(!S.enc||S.enc.phase!=="drift"||UI.stepping||S.run.over) return;
  UI.stepping=true;
  (async()=>{
    try{
      const app=document.getElementById("app");
      const had=aliveUnits(S.enc).some(u=>u.drift);
      if(had && holoOn() && !META.fxLite) document.body.classList.add("gaze-breath"); // 視線: 慣性解決は短い呼吸1回(Sol: 持続ズームは強すぎ)
      if(had) await sleep(300);
      LK.driftPhase(S);
      renderBattle(app); flip(); drainFx();
      if(had) await sleep(640);
    } finally {
      document.body.classList.remove("gaze-breath");
      UI.stepping=false;
      render();
    }
  })();
}

  }).join("");
  return `<div class="lifebar" data-tt="${attrEsc("<b>寿命ゲージ</b>: カード=行動=命。<br>水色=手札 / 青=消耗・予備 / ×=永久ロスト。<br>全部失えば船は漂う棺。")}">${segs}</div>`;
}
function hudHtml(){
  const alive=aliveCards(S).length;
  const low=alive<=4?"flash":"";
  const cargo=S.run.cargo.map(id=>{const r=RELIC_DEFS.find(r=>r.id===id);return `<span class="cargochip" data-tt="${attrEsc(esc(r.desc)+"<br>売却価値 "+r.value+" — 帰還すれば確定")}">◆${esc(r.name)}</span>`;}).join("") || `<span class="muted">カーゴ: 空</span>`;
  const sd=shipDef(S.run.shipId);

    ${(S.run.contracts||[]).length?`<span style="color:var(--amber)" data-tt="${attrEsc("航行契約: "+S.run.contracts.map(id=>{const c=CONTRACT_DEFS.find(x=>x.id===id);return c.icon+c.name+"("+c.desc+")";}).join("<br>")+"<br>スコア×"+contractMult(S.run).toFixed(1)+" / 帰還時 危険手当₢"+(S.run.contracts.length*2))}">☠${S.run.contracts.length} ×${contractMult(S.run).toFixed(1)}</span>`:""}

// ---------- 整備ドック(第1戦域クリア報酬: 強化/補給/物資の三択 — StSの焚き火) ----------
function renderUpgrade(app){
  const sd=shipDef(S.run.shipId);
  const hp=S.run.shipHp??sd.hp;
  if(UI.campPick){
    // 強化ピッカー: 「強化後の姿」をそのまま見せる(事前にわかる)
    const cands=LK.aliveCards(S).filter(c=>!c.up);
    app.innerHTML=hudHtml()+`
    <div class="panel" style="max-width:980px;margin:20px auto;">
      <h2 style="color:var(--amber)">⚙ 強化 — どれを「+」にする?(表示は強化後の姿)</h2>
      <p class="muted">🔥印つきの強化は使い方そのものが変わる(無反動化・攻撃付与・制動付与)。</p>
      <div class="pickgrid">${cands.map(c=>`<div onclick="H.upgradePick('${c.uid}')">${cardFaceHtml({...c,up:true},{mini:false})}</div>`).join("")}</div>
      <div class="opts"><button onclick="H.campBack()">戻る</button></div>
    </div>`;
    return;
  }
  const run=S.run, cr=run.credits;
  if(!run.dockMainDone){
    // ① 無料の主作業をひとつ
    app.innerHTML=hudHtml()+`
    <div class="panel" style="max-width:880px;margin:20px auto;">
      <h2 style="color:var(--amber)">🛠 整備ドック ① — まず主作業をひとつ</h2>
      <p class="muted">強化は投資、補給は保険。選んだあとに、ラン内クレジット(HUDの💠)で追加整備を買える。</p>
      <div class="routebox">
        <div class="rt" onclick="H.campUpgrade()">
          <h4 style="color:var(--gold)">⚙ 強化</h4>
          <p class="muted">カード1枚を恒久強化(+)。<br>将来へ複利で効く。</p>
        </div>
        ${LK.hasContract(run,"norepair")?`
        <div class="rt" style="opacity:.45; cursor:not-allowed;" data-tt="${attrEsc("⛔ 契約『補給封鎖』により使用不可 — 回復は物理キルの装甲板だけだ")}">
          <h4 style="color:var(--dim)">🔧 補給 ⛔</h4>
          <p class="muted">契約『補給封鎖』発動中。</p>
        </div>`:`
        <div class="rt" onclick="H.campResupply()">
          <h4 style="color:var(--green)">🔧 補給</h4>
          <p class="muted">旗艦HP+3(現在 ${hp}/${sd.hp})<br>随伴機を完全復帰。</p>
        </div>`}
        <div class="rt" onclick="H.campScrap()">
          <h4 style="color:var(--cyan)">📦 物資回収</h4>
          <p class="muted">売却価値+1。<br>地味だが、確実。</p>
        </div>
      </div>
    </div>`;
    return;
  }
  // ② 有料の追加整備 + 封印遺物の緊急解体 + 出航
  const norepair=LK.hasContract(run,"norepair");
  const recov=LK.dockRecoverable(S);
  const patchOk=!norepair && !run.dockPatch && hp<sd.hp && cr>=LK.DOCK_PATCH_COST;
  const recovOk=!run.dockRecover && recov.length>0 && cr>=LK.DOCK_RECOVER_COST;
  const patchWhy = run.dockPatch?"このドックでは溶接済み":norepair?"契約『補給封鎖』で封鎖":hp>=sd.hp?"旗艦は満タン":cr<LK.DOCK_PATCH_COST?`₢${LK.DOCK_PATCH_COST}に足りない(現在₢${cr})`:"";
  const recovWhy = run.dockRecover?"このドックでは回収済み":!recov.length?"回収できるロストカードがない":cr<LK.DOCK_RECOVER_COST?`₢${LK.DOCK_RECOVER_COST}に足りない(現在₢${cr})`:"";
  const cargoLiq = run.cargo.map(id=>{const r=RELIC_DEFS.find(x=>x.id===id);
    return `<button class="danger" style="margin:2px" onclick="H.campLiquidate('${id}')" data-tt="${attrEsc("『"+esc(r.name)+"』を素価値₢"+r.value+"で今すぐ現金化。帰還時の集中×1.5〜2.0・深度倍率・安全帰還+20%は全部捨てる=常に損切り。生存閾値に届く現金が今すぐ要る時の非常弁")}">🔗 ${esc(r.name)} 解体 +₢${r.value}</button>`;
  }).join("") || `<span class="muted">カーゴは空(解体するものがない)</span>`;
  app.innerHTML=hudHtml()+`
  <div class="panel" style="max-width:880px;margin:20px auto;">
    <h2 style="color:var(--amber)">🛠 整備ドック ② — 追加整備</h2>
    <p class="muted">主作業は済んだ。ラン内クレジットで追加整備を買うか、封印遺物を解体して現金化するか、そのまま出航するか。残額は帰還でも撃沈でも精算で1:1メタへ持ち越す。</p>
    <div class="routebox">
      <div class="rt ${patchOk?"":"disabled"}" ${patchOk?'onclick="H.campPatch()"':`style="opacity:.45;cursor:not-allowed" data-tt="${attrEsc("⛔ "+patchWhy)}"`}>
        <h4 style="color:var(--green)">🔧 応急溶接 — ₢${LK.DOCK_PATCH_COST}</h4>
        <p class="muted">旗艦HP+1(${hp}→${Math.min(sd.hp,hp+1)} / 最大${sd.hp})。<br>${patchOk?"「次の1発で即死」から出る。":esc(patchWhy)}</p>
      </div>
      <div class="rt ${recovOk?"":"disabled"}" ${recovOk?'onclick="H.campRecover()"':`style="opacity:.45;cursor:not-allowed" data-tt="${attrEsc("⛔ "+recovWhy)}"`}>
        <h4 style="color:var(--cyan)">📼 ブラックボックス回収 — ₢${LK.DOCK_RECOVER_COST}</h4>
        <p class="muted">ロストカード1枚をデッキへ戻す(${recov.length}枚回収可)。<br>${recovOk?"寿命5→6で安全帰還+20%を跨ぐ。":esc(recovWhy)}</p>
      </div>
    </div>
    <div style="margin:14px 0 6px;"><b style="color:var(--amber)">🔗 緊急解体(非常弁)</b> <span class="muted">— 封印遺物を素価値で今すぐ現金化。上乗せ精算は捨てる=常に損切り。</span></div>
    <div style="line-height:2;">${cargoLiq}</div>
    <div class="opts" style="margin-top:16px;">
      <button class="primary" onclick="H.campLeave()">出航する →</button>
    </div>
  </div>`;
}

// ---------- deck build (出撃前編成: コレクション>10のとき) ----------
function renderDeckBuild(app){
  const coll=collectionDefIds();
  if(!UI.deckSel.length){
    // 前回の編成を覚えている(L-013)。lastDeckはインデックス配列
    const last=(META.lastDeck||[]).filter(i=>Number.isInteger(i)&&i<coll.length);
    UI.deckSel = last.length===10 ? [...last] : coll.map((_,i)=>i).slice(0,10);
    // 契約も前回を引き継ぐ(L-013)
    UI.contractSel=(META.lastContracts||[]).filter(id=>CONTRACT_DEFS.some(c=>c.id===id));
  }
  app.innerHTML=`
  <div class="panel" style="max-width:980px;margin:20px auto;">
    <h2 style="color:var(--amber)">出撃デッキ編成 — 10枚を選べ (${UI.deckSel.length}/10)</h2>
    <p class="muted">これがこのランの全寿命だ。攻め・守り・機動・切り札(🔥)の配分を考えろ。</p>
    <div class="pickgrid">
      ${coll.map((defId,i)=>`<div onclick="H.toggleDeck(${i})">${cardFaceHtml({uid:"d"+i,defId,loc:"pool"},{mini:true,selected:UI.deckSel.includes(i)})}</div>`).join("")}
    </div>
    <h3 style="color:var(--amber);margin-top:14px;">☠ 航行契約 <span class="muted" style="font-weight:400;">— 任意。盛るほどスコア倍率と危険手当が増える(自分の苦手だけ避けて選べ)</span></h3>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;">
      ${CONTRACT_DEFS.map(c=>{
        const on=UI.contractSel.includes(c.id);
        return `<div onclick="H.toggleContract('${c.id}')" data-tt="${attrEsc("<b>"+c.icon+" "+esc(c.name)+"</b><br>"+esc(c.desc)+"<br><span style='color:#9aa7c4'>"+esc(c.counter)+"</span>")}"
          style="cursor:pointer; padding:7px 12px; border-radius:8px; font-size:.85rem; user-select:none;
          border:1px solid ${on?"var(--amber)":"var(--line)"}; background:${on?"#2a1c08":"transparent"}; color:${on?"var(--amber)":"var(--dim)"};">
          ${c.icon} ${esc(c.name)}${on?" ✓":""}</div>`;
      }).join("")}
      <div style="padding:7px 12px; font-size:.9rem; color:${UI.contractSel.length?"var(--gold)":"var(--dim)"};">
        リスク${UI.contractSel.length} → スコア<b>×${(1+0.2*UI.contractSel.length).toFixed(1)}</b>${UI.contractSel.length?` + 帰還時₢${UI.contractSel.length*2}`:""}${UI.contractSel.length>=3?' <b style="color:var(--gold)">+称号</b>':""}
      </div>
    </div>
    <div class="opts">
      <button class="primary" ${UI.deckSel.length===10?"":"disabled"} onclick="H.confirmDeck()">この編成で出撃 (${UI.deckSel.length}/10)${UI.contractSel.length?` ☠${UI.contractSel.length}`:""}</button>
      <button onclick="H.backTitle()">戻る</button>
    </div>
  </div>`;
}

// ---------- zone event (M5) ----------
function renderEvent(app){
  const ev=S.pendingEvent;
  if(!ev){ S.screen="loadout"; return render(); }
  let body="";
  if(ev.type==="wreckpick"){
    const lost=S.run.cards.filter(c=>c.loc==="lost");
    body=`<p class="muted" style="font-style:italic;">埃を被ったコンテナの中に、見覚えのある部品が…(旗艦HP-1の代償は次の戦域で支払う)</p>
      ${cardPickFaces(lost,"H.eventWreckPick")}`;
  } else if(ev.type==="wreck"){
    body=`<p class="muted" style="font-style:italic;">航路の途中、漂流するコンテナ船。応答はない。ハッチは固く錆びついている。</p>
      <div class="opts">
        <button class="danger" ${unitOk()?"":"disabled"} onclick="H.eventWreckOpen()">こじ開ける(旗艦HP-1) — ロストしたカードを1枚回収</button>
        <button onclick="H.eventSkip()">立ち去る</button>
      </div>`;
  } else {
