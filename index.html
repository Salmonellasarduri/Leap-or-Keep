    praise:"全ての射撃に根拠がある。「生存率」という言葉が服を着て歩いている。", weak:"乾杯すら誰よりも慎重にやる。"},
  merchant:{name:"商人型",  title:"儲かったら帰る人",            f:0,r:0,c:0, rarity:21,
    praise:"欲をかかず、確実に持ち帰る。母港で一番愛されるのはこういう船長だ。", weak:"伝説にはならないが、長生きはする。"},
};
function captainType(state){
  const r=state.run;
  const kills=r.kills||0, phys=r.physKills||0;
  // F軸: 撃破の3割以上が物理(衝突/激突/爆発)ならこぶし派
  const F=(kills>0 && phys/kills>=0.3) || phys>=4 ? 1 : 0;
  // R軸: 危険ルート率×2 + 契約×0.6 + 遺物展開×0.7
  const riskScore=(r.routeTotal? (r.routeDanger||0)/r.routeTotal : 0)*2 + (r.contracts||[]).length*0.6 + (r.deployed||[]).length*0.7;
  const R=riskScore>=1.4 ? 1 : 0;
  // C軸: やり直し + 休息の自選(=制御にコストを払う)
  const ctrlScore=(r.undoCount||0) + (r.chooseRest||0)*2;
  const C=ctrlScore>=2 ? 1 : 0;
  const id=Object.keys(CAPTAIN_TYPES).find(k=>{const t=CAPTAIN_TYPES[k]; return t.f===F&&t.r===R&&t.c===C;});
  const t=CAPTAIN_TYPES[id];
  // サブ称号(レア実績 — Refind Self式の組合せ表示でバリエーションを増やす)
  const subs=[];
  if(r.bossKilled) subs.push("👑伝説");
  if(phys>=8) subs.push("💥轢断魔");
  if(r.win && (r.contracts||[]).length>=3) subs.push("☠鉄の契約者");
  if(r.win && (r.shipHp??99)<=1) subs.push("🫀九死一生");
  if(r.win && (r.burnCount||0)===0 && (r.restCount||0)<=1) subs.push("✨無傷の帰還者");
  // 図星(プレイデータ由来の言い当て — 演技できない=本物)
  let jab;
  if(phys>=5) jab=`物理キル${phys}回 — 弾代をだいぶ浮かせたでしょ。`;
  else if((r.undoCount||0)>=4) jab=`やり直し${r.undoCount}回 — 石橋、叩きすぎ。`;
  else if((r.contracts||[]).length>=2) jab=`契約${r.contracts.length}件持ちで出撃する船長、そう多くない。`;
  else if(r.routeTotal>=2 && r.routeDanger===r.routeTotal) jab="危険ルートしか選んでない。自覚ある?";
  else if(r.routeTotal>=2 && !(r.routeDanger||0)) jab="危険ルートを一度も踏んでない。それも才能。";
  else if((r.burnCount||0)>=3) jab=`カードを${r.burnCount}枚燃やしてでも生き残った。正しい。`;
  else jab=`ZONE${r.zone}まで${r.totalRounds}ラウンド — その足取りに性格が出てる。`;
  return {id, name:t.name, title:t.title, praise:t.praise, weak:t.weak, rarity:t.rarity, axes:{F,R,C}, subs, jab};
}

// ---- 航海記録(クロニクル): LLMなしでランのドラマを再構成する ----
// 設計(イナンナRun#002の知見): 機械検出(イベント重み)+船長マーク(wow)の併用。文はテンプレ+決定論的バリエーション
const CHRON_W={bosskill:12, rampage:8, neardeath:7, physkill:6, chain:6, friendly:5, flarekill:4, burnsave:4, wellpull:3, relic:2, leap:2, clear:1, rest:1, end:99};
function chronLine(ev){
  const pick=arr=>arr[(ev.z*7+ev.r+ev.i)%arr.length];
  switch(ev.t){
    case "physkill":{
      const how={"衝突":"滑ってきた軌道ごと","激突":"叩きつけられて","機雷の爆発":"機雷の花火に呑まれて","自爆":"爆風に攫われて"}[ev.src]||"物理に屈して";
      return pick([`${ev.name}、${how}砕けた — 引き金は引いていない`,`${ev.name}が${how}宇宙塵になった。これがこの宇宙の正しい錬金術`]);
    }
    case "chain": return pick(["誘爆が連鎖して、盤面が一瞬だけ花火大会になった","爆発が爆発を呼んだ。誰も止めなかったし、止める気もなかった"]);
    case "double": return null;
    case "rampage": return ev.n>=5?`${ev.n}連続撃破 — もはや誰も数えていなかった`:`${ev.n}連続撃破 — 静寂が戻るまで、誰も口を開かなかった`;
    case "neardeath": return pick(["船体、残り1。警報の中で、それでも舵は離さなかった",`${ev.src||"一撃"}が装甲を裂いた。残りHP1 — ここからが船長の仕事`]);
    case "burnsave": return `『${ev.card}』を炎に焼べて${ev.dmg}ダメージを打ち消した — 寿命で命を買い戻す取引`;
    case "friendly": return `${ev.by}の一撃が${ev.hit}に吸い込まれた。同士討ちは、誘い込んだ者の戦果だ`;
    case "flarekill": return `太陽フレアが${ev.name}を焼き払った。退避しなかったのは敵のほうだ`;
    case "wellpull": return `${ev.name}が重力渦に呑まれて、描いていた未来ごと狂った`;
    case "bosskill": return `《${ev.title}》${ev.name}、沈黙。深淵が一拍だけ、静かになった`;
    case "relic": return ev.choice==="deploy"?`『${ev.name}』を展開 — 眠っていた力を、いま叩き起こした`:`『${ev.name}』をカーゴに封印 — 家まで持って帰る、という約束`;
    case "leap": return `『${ev.burned}』を燃料に、ZONE${ev.to}へ跳んだ(残カード${ev.cardsLeft}枚=寿命)`;
    case "rest": return ev.mode==="choose"?`船体を軋ませ、自らの手で『${ev.card}』を手放した`:`成り行きの休息 — 『${ev.card}』が静かに宇宙へ流れていった`;
    case "clear": return ev.hull<=2?`船体${ev.hull}で戦域を制圧 — 紙一重を、勝ちと呼ぶ`:null;
    case "end": return ev.win?(ev.reason==="returned"?"帰還。母港の灯りが、ちゃんと待っていた":"生還。"):
      (ev.reason==="ship"?"船体崩壊 — 最後の通信は、ノイズに溶けた":"全カード喪失 — 船はもう、漂うだけの棺だ");
    case "mark": return ev.text ? `${ev.text}` : "ここで船長は、言葉にならない何かを刻んだ — 後から思えば、それが航海の頂点だった";
  }
  return null;
}
// marks: [{z,e,r}] — プレイヤー/エージェントが「今の瞬間」を刻んだ位置(★がつき採用優先)
function voyageChronicle(state, marks){
  marks=marks||[];
  const base=(state.run.events||[]).map((ev,i)=>({...ev, _seq:i}));
  // --wowで刻んだ瞬間=「船長が宣言した頂点」。挿入順(時系列)を保ったまま、必ず航海記録に残す(イナンナRun#003指摘)
  const promoted=new Set(); // textなしwowは近傍イベント1件だけを★昇格(過剰昇格の防止)
  const synth=[];
  marks.forEach((m,k)=>{
    const beat=ev=>ev.z===m.z&&ev.e===m.e&&Math.abs((ev.r||0)-(m.r||0))<=1;
    if(m.text){ // テキスト付きwowは独立した★行に(実況がそのまま頂点の記録になる)
      let anchor=-1; for(const ev of base){ if(ev.z<m.z||(ev.z===m.z&&(ev.e<m.e||(ev.e===m.e&&(ev.r||0)<=(m.r||0))))) anchor=ev._seq; }
      synth.push({z:m.z,e:m.e,r:m.r||0,t:"mark",text:m.text,_seq:anchor+0.5,_mark:true});
      return;
    }
    let best=null,bd=9; // textなし: 同戦域・最寄り1件を★昇格、無ければ独立行
    for(const ev of base){ if(beat(ev)&&!promoted.has(ev._seq)){ const d=Math.abs((ev.r||0)-(m.r||0)); if(d<bd){bd=d;best=ev;} } }
    if(best) promoted.add(best._seq);
    else { let anchor=-1; for(const ev of base){ if(ev.z<m.z||(ev.z===m.z&&(ev.r||0)<=(m.r||0))) anchor=ev._seq; }
      synth.push({z:m.z,e:m.e,r:m.r||0,t:"mark",text:null,_seq:anchor+0.5,_mark:true}); }
  });
  const all=[...base,...synth].sort((a,b)=>a._seq-b._seq); // 挿入順=時系列を維持
  const evs=all.map((ev,i)=>{
    let w=CHRON_W[ev.t]??1;
    if(ev.t==="clear"&&ev.hull<=2) w=6;
    if(ev.t==="mark") w=99;
    const starred = ev._mark || promoted.has(ev._seq);
    return {...ev, i, w: starred?w+8:w, starred};
  });
  // 採用: 背骨(leap/end/bosskill/★wow)は常時。残りは「同種を取るほど割引」の貪欲選択で多様性を確保 → 時系列へ戻す
  const spine=evs.filter(e=>["leap","end","bosskill","mark"].includes(e.t)||e.starred);
  const pool=evs.filter(e=>!(["leap","end","bosskill","mark"].includes(e.t)||e.starred));
  const slots=Math.max(0,14-spine.length);
  const flesh=[], counts={};
  while(flesh.length<slots && pool.length){
    let best=-1, bw=-Infinity;
    pool.forEach((ev,j)=>{ const ew=ev.w-2.2*(counts[ev.t]||0); if(ew>bw){bw=ew;best=j;} });
    if(best<0||bw<=0) break;
    const ev=pool.splice(best,1)[0];
    counts[ev.t]=(counts[ev.t]||0)+1;
    flesh.push(ev);
  }
  const chosen=[...spine,...flesh].sort((a,b)=>a.i-b.i);
  const lines=[];
  let lastZ=0;
  for(const ev of chosen){
    const line=chronLine(ev);
    if(!line) continue;
    if(ev.z!==lastZ){ lines.push(`— ZONE ${ev.z}《${ZONE_NAMES[ev.z-1]}》—`); lastZ=ev.z; }
    lines.push(`${ev.starred?"★":"・"}${line}`);
  }
  return lines;
}

// ---- エージェント記憶インターフェース(汎用・任意のエージェントが利用可) ----
// 2チャンネル: A=想い出(voyageMemory: 何をどう感じたかの素材→記憶へ) / B=引き継ぎ(carryover: 次ランで確実に読む軽量サマリ)
// ゲームは状態を持たない: Bはエージェントが永続化し new 時に渡し返す(汎用性のため)

// A) 想い出: ランの全体像+機械が綴った航海+本人が試合中に呟いた声。エージェントはこれを自分の記憶に保存/蒸留する
function voyageMemory(state, says, wows){
  const r=state.run, ct=captainType(state), sd=shipDef(r.shipId);
  return {
    kind:"voyage-memory", game:"Leap or Keep",
    setup:{ ship:r.shipId, shipName:sd.name, asc:r.asc, contracts:r.contracts||[] },
    outcome:{ win:!!r.win, reason:r.reason||null, zone:r.zone, score:runScore(state),
      physKills:r.physKills||0, cargo:cargoValue(state), bossKilled:!!r.bossKilled,
      boss: r.bossKilled ? ((ENEMY_DEFS[r.bossType]||{}).name||null) : null },
    captain:{ id:ct.id, name:ct.name, title:ct.title, jab:ct.jab, praise:ct.praise, weak:ct.weak, subs:ct.subs },
    chronicle: voyageChronicle(state, wows||[]),   // ★=本人が刻んだ頂点
    voice: (says||[]).map(s=>s.text),              // 本人の生の感情(--say)
  };
}
// 想い出を「そのまま記憶にできる」散文に。蒸留しないエージェントはこれを保存するだけでよい
function voyageMemoryProse(mem){
  const o=mem.outcome, c=mem.captain, L=[];
  L.push(`# ${mem.game} 航海の記憶`);
  L.push(`${mem.setup.shipName}${mem.setup.contracts.length?`(契約: ${mem.setup.contracts.join("/")})`:""}で深淵へ出航した。`);
  L.push(o.win?`ZONE${o.zone}まで潜り、${o.boss?`《${o.boss}》を討って`:""}生きて帰った(SCORE ${o.score}/物理キル${o.physKills})。`
             :`ZONE${o.zone}で力尽きた(${o.reason})。`);
  L.push(`船としての私は『${c.name}』— ${c.title}。${c.jab}${c.subs.length?" "+c.subs.join(" "):""}`);
  if(mem.chronicle.length){ L.push("","## 航海の断片"); mem.chronicle.forEach(l=>L.push(l)); }
  // 呟きは散文では「出航時」と「帰投時」の括弧だけ(全文は構造化voice[]へ。記憶は要点で持つ)
  if(mem.voice.length){
    L.push("","## 出航のとき", `「${mem.voice[0]}」`);
    if(mem.voice.length>1) L.push("## 航海の終わりに", `「${mem.voice[mem.voice.length-1]}」`);
    if(mem.voice.length>2) L.push(`(その間に${mem.voice.length-2}の独白 — 全文は voice[] に残してある)`);
  }
  return L.join("\n");
}
// B) 引き継ぎ: 次ランで確実に読む軽量レコード。noteはエージェントが書く「心残り/抱負」(汎用の自由文)
function carryoverRecord(state, note){
  const r=state.run, ct=captainType(state);
  return { ship:r.shipId, result:r.win?"win":"loss", zone:r.zone, score:runScore(state),
    captain:ct.name, boss: r.bossKilled ? ((ENEMY_DEFS[r.bossType]||{}).name||null) : null,
    note: note||null };
}
// 過去の引き継ぎ群を、ゲーム開始時に読める数行のダイジェストへ(エージェントの「記憶の想起」)
function carryoverDigest(records){
  records=(records||[]).filter(Boolean);
  if(!records.length) return [];
  const wins=records.filter(r=>r.result==="win").length;
  const bestZ=Math.max(1,...records.map(r=>r.zone||1));
  const bestS=Math.max(0,...records.map(r=>r.score||0));
  const types={}; records.forEach(r=>{ if(r.captain) types[r.captain]=(types[r.captain]||0)+1; });
  const L=[`【記憶】これまで${records.length}回潜航(生還${wins})/最高ZONE${bestZ}・最高SCORE${bestS}`];
  const t=Object.entries(types).map(([k,v])=>`${k}×${v}`).join(" ");
  if(t) L.push(`これまでの船長像: ${t}`);
  const lastNote=[...records].reverse().find(r=>r.note);
  if(lastNote) L.push(`前回の言葉: 「${lastNote.note}」`);
  return L;
}

// 敗北しても拾うものはある(アンロックドリップ — 失敗ランを無駄にしない)
function lossCredits(state){
  return Math.max(0,(state.run.zone-1)*2) + Math.floor(cargoValue(state)/3);
}

// ラム突進の到達マス(移動系と同じ「マスを選ぶ」UIに統一 — L-012)
function ramOptions(state, unit, spec){
  const enc=state.enc; const out=[];
  for(const k of DIR_KEYS){
    const d=DIRS[k];
    let x=unit.x, y=unit.y, steps=0, hit=null;
    for(let i=1;i<=spec.n;i++){
      const nx=wrap(x+d.x), ny=wrap(y+d.y);
      const occ=unitAt(enc,nx,ny);
      if(occ){ if(occ.side!=="player") hit={x:nx,y:ny}; break; }
      x=nx; y=ny; steps=i;
    }
    if(hit) out.push({x:hit.x,y:hit.y,dir:k,hit:true});
    else if(steps>0) out.push({x,y,dir:k,hit:false});
  }
  return out;
}

function dirBetween(a,b){
  const dx=tdelta(a.x,b.x), dy=tdelta(a.y,b.y);
  if(Math.abs(dx)>=Math.abs(dy)) return dx>0?"right":(dx<0?"left":(dy>0?"down":"up"));
  return dy>0?"down":"up";
}

function forcedMove(state, victim, dirKey, n){
  const enc=state.enc; const d=DIRS[dirKey];
  for(let i=0;i<n;i++){
    const nx=wrap(victim.x+d.x), ny=wrap(victim.y+d.y);
    const occ=unitAt(enc,nx,ny);
    if(occ){
      log(state,`${victim.name} が ${occ.name} に叩きつけられた!`,"good");
      fx(state,{type:"boom",x:nx,y:ny});
      dealDamage(state,victim,CONFIG.COLLISION_DMG,"激突");
      dealDamage(state,occ,CONFIG.COLLISION_DMG,"激突");
      victim.drift=null; if(occ.alive) occ.drift=null;
      return;
    }
    if(victim.x+d.x!==nx || victim.y+d.y!==ny) wrapNote(state,victim,dirKey); // 縁越え押し/引き
    victim.x=nx; victim.y=ny;
  }
  victim.drift=dirKey;
}

function execAction(state, idx, params){
  const enc=state.enc;
  if(enc.step!=="player"||!enc.pending) return {ok:false,msg:"not player phase"};
  const p=enc.pending[idx];
  if(!p||p.done) return {ok:false,msg:"invalid action"};
  const spec=actionSpec(state,idx);
  const unit=unitById(enc,params.unitId);
  if(!unit||!unit.alive||unit.side!=="player") return {ok:false,msg:"ユニットを選んでください"};
  const cardName=defOf(cardByUid(state,p.uid)).name;

  switch(spec.kind){
    case "move": case "brake_move": {
      if(params.cell){
        const opts=moveOptions(state,unit,spec);
        const cands=opts.filter(o=>o.x===params.cell.x&&o.y===params.cell.y);
        // トーラスでは複数方向が同じマスに着く(L-001)。方向指定があればそれを優先、曖昧なら拒否。
        const hit = params.dir ? cands.find(o=>o.dir===params.dir)
                  : (cands.length===1 ? cands[0] : null);
        if(!hit){
          if(spec.kind==="brake_move"&&params.cell.x===unit.x&&params.cell.y===unit.y){
            unit.drift=null; // その場で制動のみ
          }
          else if(cands.length>1) return {ok:false,msg:"方向が2通りある — 矢印で選んでください"};
          else return {ok:false,msg:"そこへは行けない"};
        } else {
          if(spec.kind==="brake_move") unit.drift=null;
          const hd=DIRS[hit.dir], hs=hit.steps||spec.n;
          if(hd && (unit.x+hd.x*hs!==hit.x || unit.y+hd.y*hs!==hit.y)) wrapNote(state,unit,hit.dir); // 縁越え移動
          unit.x=hit.x; unit.y=hit.y;
          unit.drift = spec.kind==="move" ? hit.dir : null;
        }
        if(spec.selfDmg) dealDamage(state,unit,spec.selfDmg,"オーバーバーンの熱");
      } else if(spec.kind==="move"){ return {ok:false,msg:"移動先を選んでください"}; }
      else { unit.drift=null; } // cell無しのbrake_move=制動のみ
      log(state,`${unit.name}: 『${cardName}』${spec.label}`);
      break;
    }
    case "ram": {
      // 単値仕様: 突進力n = 移動距離も与ダメージもn(特殊効果つき移動)
      const d=DIRS[params.dir]; if(!d) return {ok:false,msg:"突進先のマスを選んでください"};
      let hit=false;
      for(let i=0;i<spec.n;i++){
        const nx=wrap(unit.x+d.x), ny=wrap(unit.y+d.y);
        const occ=unitAt(enc,nx,ny);
        if(occ){
          if(occ.side!=="player"){ dealDamage(state,occ,spec.n,"激突"); unit.drift=null; hit=true; }
          break;
        }
        if(unit.x+d.x!==nx || unit.y+d.y!==ny) wrapNote(state,unit,params.dir); // 縁越え突進
        unit.x=nx; unit.y=ny;
      }
      if(!hit) unit.drift=params.dir;
      log(state,`${unit.name}: 突進${spec.n}! ${hit?"標的に艦体を叩き込んだ":"空振り — 慣性だけが残った"}`);
      break;
    }
    case "pierce": {
      // 貫通射撃: 直線上の全ユニット(敵味方無差別・自分以外)を撃ち抜き、反動で後方ドリフト
      const t=unitById(enc,params.targetId);
      if(!t||!attackTargets(state,unit,spec).includes(t)) return {ok:false,msg:"同一直線上(射程内)の標的を選んでください"};
      const dk=dirBetween(unit,t);
      const d=DIRS[dk];
      const cells=[];
      let x=unit.x, y=unit.y;
      for(let i=1;i<=spec.range;i++){
        x=wrap(x+d.x); y=wrap(y+d.y);
        cells.push({x,y});
        const v=unitAt(enc,x,y);
        if(v && v.id!==unit.id) dealDamage(state,v,spec.dmg,cardName);
      }
      fx(state,{type:"flash",cells,beam:true});
      if(!spec.noRecoil){
        unit.drift=OPP[dk];
        log(state,`${unit.name}: 『${cardName}』フルパワー斉射 — 反動で後方へ流される!`,"warn");
      } else log(state,`${unit.name}: 『${cardName}』安定化済み斉射`);
      break;
    }
    case "attack_push": {
      const t=unitById(enc,params.targetId);
      if(!t||!attackTargets(state,unit,spec).includes(t)) return {ok:false,msg:"隣接する対象を選んでください"};
      dealDamage(state,t,spec.dmg,cardName);
      if(t.alive) forcedMove(state,t,dirBetween(unit,t),spec.n);
      log(state,`${unit.name}: 『${cardName}』→ ${t.name} を撃ち飛ばした`);
      break;
    }
    case "attack_pull": {
      const t=unitById(enc,params.targetId);
      if(!t||!attackTargets(state,unit,spec).includes(t)) return {ok:false,msg:"同一直線上の対象を選んでください"};
      dealDamage(state,t,spec.dmg,cardName);
      if(t.alive){
        const dk=dirBetween(t,unit);
        forcedMove(state,t,dk,Math.min(spec.n,Math.max(0,lineDist(unit,t)-1)));
        if(t.alive) t.drift=dk;
      }
      log(state,`${unit.name}: 『${cardName}』→ ${t.name} に銛を打ち込んだ。来い!`);
      break;
    }
    case "warp": {
      if(!params.cell||unitAt(enc,params.cell.x,params.cell.y)) return {ok:false,msg:"空きマスを選んでください"};
      unit.x=params.cell.x; unit.y=params.cell.y; unit.drift=null;
      log(state,`${unit.name}: 死者の星図に従い、空間を跳んだ`,"warn");
      break;
    }
    case "attack": case "attack_line": {
      const t=unitById(enc,params.targetId);
      if(!t||!attackTargets(state,unit,spec).includes(t)) return {ok:false,msg:"射程内の敵を選んでください"};
      dealDamage(state,t,spec.dmg,cardName);
      log(state,`${unit.name}: 『${cardName}』→ ${t.name}`);
      break;
    }
    case "attack_all": {
      const ts=attackTargets(state,unit,spec);
      if(!ts.length) return {ok:false,msg:"射程内に敵がいない"};
      for(const t of ts) dealDamage(state,t,spec.dmg,cardName);
      log(state,`${unit.name}: 『${cardName}』— 周囲一掃!`);
      break;
    }
    case "attack_multi": {
      const ids=params.targetIds||[];
      if(!ids.length) return {ok:false,msg:"対象を選んでください"};
      if(ids.length>spec.count) return {ok:false,msg:"対象が多すぎる"};
      const valid=attackTargets(state,unit,spec);
      for(const id of ids){ const t=unitById(enc,id); if(!t||!valid.includes(t)) return {ok:false,msg:"射程外の敵が含まれている"}; }
      for(const id of ids) dealDamage(state,unitById(enc,id),spec.dmg,cardName);
      log(state,`${unit.name}: 『${cardName}』起動 — 古代の殺意が目覚める`);
      break;
    }
    case "push": {
      const t=unitById(enc,params.targetId);
      if(!t||!attackTargets(state,unit,spec).includes(t)) return {ok:false,msg:"隣接する敵を選んでください"};
      if(spec.dmg) dealDamage(state,t,spec.dmg,cardName);
      if(t.alive) forcedMove(state,t,dirBetween(unit,t),spec.n);
      log(state,`${unit.name}: 『${cardName}』→ ${t.name} を突き放した`);
      break;
    }
    case "pull": {
      const t=unitById(enc,params.targetId);
      if(!t||!attackTargets(state,unit,spec).includes(t)) return {ok:false,msg:"同一直線上(射程内)の敵を選んでください"};
      const dk=dirBetween(t,unit);
      const dist=lineDist(unit,t);
      forcedMove(state,t,dk,Math.min(spec.n,Math.max(0,dist-1)));
      t.drift=dk;
      log(state,`${unit.name}: 『${cardName}』→ ${t.name} を引き寄せた。落ちてこい`);
      break;
    }
    case "pull_all": {
      const ts=attackTargets(state,unit,spec);
      if(!ts.length) return {ok:false,msg:"射程内に敵がいない"};
      for(const t of ts){
        const dk=dirBetween(t,unit);
        forcedMove(state,t,dk,Math.min(spec.n,Math.max(0,lineDist(unit,t)-1)));
        if(t.alive) t.drift=dk;
      }
      log(state,`${unit.name}: 『${cardName}』— 重力が牙を剥く`);
      break;
    }
    case "setdrift": {
      const t=unitById(enc,params.targetId);
      if(!t||!attackTargets(state,unit,spec).includes(t)) return {ok:false,msg:"射程内の敵を選んでください"};
      if(!DIRS[params.dir]) return {ok:false,msg:"方向を選んでください"};
      if(spec.dmg) dealDamage(state,t,spec.dmg,cardName);
      if(t.alive) t.drift=params.dir;
      log(state,`${unit.name}: 『${cardName}』→ ${t.name} の慣性を書き換えた`);
      break;
    }
    case "execute": {
      // トドメ: 傷ついている敵に大ダメージ(コンボの締め)
      const t=unitById(enc,params.targetId);
      if(!t||!attackTargets(state,unit,spec).includes(t)) return {ok:false,msg:"射程内の対象を選んでください"};
      const total=spec.dmg + (t.hp<t.maxHp?spec.bonus:0);
      if(t.hp<t.maxHp) fx(state,{type:"float",x:t.x,y:t.y,text:"トドメ!",cls:"good"});
      dealDamage(state,t,total,cardName);
      log(state,`${unit.name}: 『${cardName}』→ ${t.name}(${total}ダメージ)`);
      break;
    }
    case "spawnhaz": {
      // 地形を作る: ビルド軸(物理派)の供給源
      const free=neighborCells(unit.x,unit.y).filter(c=>!unitAt(enc,c.x,c.y));
      if(!free.length) return {ok:false,msg:"隣接に空きマスがない"};
      const d=ENEMY_DEFS[spec.haz];
      let placed=0;
      for(const c of free){
        if(placed>=spec.count) break;
        enc.summonSeq=(enc.summonSeq||0)+1;
        enc.units.push({id:"ph"+enc.summonSeq, side:"hazard", type:spec.haz, name:d.name, icon:d.icon,
          x:c.x, y:c.y, hp:d.hp, maxHp:d.hp, dmg:d.dmg, drift:null, shield:0, alive:true});
        fx(state,{type:"boom",x:c.x,y:c.y});
        placed++;
      }
      log(state,`${unit.name}: 『${cardName}』— ${d.name}×${placed}を展開した`);
      break;
    }
    case "heal": {
      unit.hp=Math.min(unit.maxHp,unit.hp+spec.n);
      if(spec.shield) unit.shield+=spec.shield;
      log(state,`${unit.name}: 『${cardName}』修理完了 (HP${unit.hp})`);
      break;
    }
    case "shield": {
      unit.shield+=spec.n;
      if(spec.brake) unit.drift=null;
      log(state,`${unit.name}: 『${cardName}』シールド展開(${unit.shield})${spec.brake?"+制動":""}`);
      break;
    }
    case "salvage": {
      const c=cardByUid(state,params.salvageUid);
      if(!c||c.loc!=="discard") return {ok:false,msg:"消耗パイルから選んでください"};
      c.loc="hand";
      log(state,`${unit.name}: 『${cardName}』— ${defOf(c).name}を回収した`);
      break;
    }
    default: return {ok:false,msg:"unknown action: "+spec.kind};
  }
  finishHalf(state,idx);
  return {ok:true};
}

function fizzleAction(state, idx){
  const enc=state.enc;
  if(enc.step!=="player"||!enc.pending) return {ok:false,msg:"not player phase"};
  const p=enc.pending[idx];
  if(!p||p.done) return {ok:false,msg:"invalid"};
  log(state,`『${defOf(cardByUid(state,p.uid)).name}』の${p.half==="top"?"上":"下"}側は不発 — 宇宙は広い、当てが外れることもある`);
  finishHalf(state,idx,false);
  return {ok:true};
}

function finishHalf(state,idx,used){
  const enc=state.enc;
  enc.pending[idx].done=true;
  enc.pending[idx].used=(used!==false); // 不発ならロストアクションも燃えない
  checkContainer(state);
  // 勝利条件はイベント駆動で即時評価(L-015): 全滅したら残りの行動は不要
  if(enemies(enc).length===0 && !state.run.over && enc.pending.some(p=>!p.done)){
    log(state,"敵性反応消失 — 残りの行動は不要だ。","good");
    for(const p of enc.pending) p.done=true;
  }
  if(enc.pending.every(p=>p.done)){
    enc.awaitEnd=true;
    if(enemies(enc).length===0 || state.run.over) commitTurn(state);
  }
}

// プレイヤーターン確定 → 敵フェイズへ(ここまでは⟲やり直し可能)
function commitTurn(state){
  const enc=state.enc;
  if(!enc||!enc.awaitEnd) return {ok:false,msg:"確定できる状態ではない"};
  for(const p of enc.pending){
    const c=cardByUid(state,p.uid);
    if(c.loc!=="hand") continue;
    const sp=defOf(c)[p.half];
    if(sp.lost && p.used){
      c.loc="lost";
      fx(state,{type:"stamp",x:0,y:0,text:"🔥カードロスト"});
      log(state,`『${defOf(c).name}』は燃え尽きた — ロストアクションの代償。`,"warn");
    } else c.loc="discard";
  }
  enc.pending=null; enc.awaitEnd=false;
  enc.killStreak=0;
  enc.step="enemy";
  pump(state);
  return {ok:true};
}

// ---- encounter end / run flow ----
function finishEncounter(state){
  const run=state.run;
  for(const c of state.run.cards) if(["hand","discard","reserve"].includes(c.loc)) c.loc="pool";
  const ship=unitById(state.enc,"ship"), drone=unitById(state.enc,"drone");
  chron(state,"clear",{rounds:state.enc.round, hull:ship?ship.hp:0});
  run.shipHp = ship?ship.hp:run.shipHp;
  run.droneHp = (drone&&drone.alive)?drone.hp:0;
  state.enc=null; state._snap=null;
  if(run.tutorial){ state.screen="tutorialdone"; return; }
  if(run.encIdx===0){
    run.encIdx=1;
    // 第1戦域クリア報酬: カード強化(全強化済みならスキップ)
    state.screen = aliveCards(state).some(c=>!c.up) ? "upgrade" : "route";
  }
  else { state.screen="relic"; state.pendingRelic=rollRelic(state); }
}

function chooseRoute(state, route){
  state.run.route=route;
  state.run.routeTotal=(state.run.routeTotal||0)+1;
  if(route==="danger") state.run.routeDanger=(state.run.routeDanger||0)+1;
  log(state, route==="danger" ? "危険ルート選択 — 深部信号が強い。良い遺物の匂いだ。" : "安全ルート選択 — 賢明だ。臆病とも言うが。", "warn");
  state.screen="loadout";
}

function rollRelic(state){
  const seen=new Set(state.run.relicsSeen);
  let pool=RELIC_DEFS.filter(r=>!seen.has(r.id));
  if(!pool.length) return null;
  const wantRare = state.run.route==="danger" || (state.run.zone>=4 && state.rand()<0.5);
  let sub=pool.filter(r=>r.rare===wantRare);
  if(!sub.length) sub=pool;
  return sub[Math.floor(state.rand()*sub.length)];
}

function resolveRelic(state, choice){
  const r=state.pendingRelic;
  if(r){
    state.run.relicsSeen.push(r.id);
    if(choice==="seal"){
      state.run.cargo.push(r.id);
      chron(state,"relic",{name:r.name,choice:"seal"});
      log(state,`『${r.name}』をカーゴに封印した。家まで持って帰るんだ。`,"good");
    } else {
      const uid="u"+(state.run.nextUid++);
      state.run.cards.push({uid, defId:r.card, loc:"pool", relicId:r.id});
      state.run.deployed.push(r.id);
      chron(state,"relic",{name:r.name,choice:"deploy"});
      log(state,`『${r.name}』を展開! 『${CARD_DEFS[r.card].name}』がデッキに加わった。売却価値は放棄した — カードを失えば、遺物ごと永遠に消える。`,"warn");
    }
  }
  state.pendingRelic=null;
  state.screen="leapkeep";
}

function canDeploy(state){ return aliveCards(state).length < CONFIG.DECK_CAP; }

function doLeap(state, fuelUids){
  const uids=Array.isArray(fuelUids)?fuelUids:[fuelUids];
  const need=fuelCost(state);
  if(uids.length!==need || new Set(uids).size!==uids.length) return {ok:false,msg:`燃料はカード${need}枚(深淵IIの代償)`};
  const cs=uids.map(u=>cardByUid(state,u));
  if(cs.some(c=>!c||c.loc==="lost")) return {ok:false,msg:"そのカードは使えない"};
  for(const c of cs){ c.loc="lost"; state.run.fuelBurnt++; }
  state.run.zone++; state.run.encIdx=0; state.run.route=null;
  chron(state,"leap",{to:state.run.zone, burned:cs.map(c=>defOf(c).name).join("/"), cardsLeft:aliveCards(state).length});
  log(state,`『${cs.map(c=>defOf(c).name).join("』『")}』を燃料に変換 — ジャンプ! ${ZONE_NAMES[state.run.zone-1]}へ。`,"warn");
  if(aliveCards(state).length<2){ runOver(state,false,"exhausted"); return {ok:true}; }
  state.screen="loadout";
  return {ok:true};
}

function doKeep(state){ runOver(state,true,"returned"); }

function cargoValue(state){ return state.run.bonusValue + state.run.cargo.reduce((s,id)=>s+RELIC_DEFS.find(r=>r.id===id).value,0); }

// 回収コンテナ: プレイヤーユニットが乗ったら回収(移動・ドリフトどちらでも)
function checkContainer(state){
  const enc=state.enc;
  if(!enc||!enc.container||enc.container.taken) return;
  const c=enc.container;
  const u=players(enc).find(p=>p.x===c.x&&p.y===c.y);
  if(u){
    c.taken=true;
    state.run.bonusValue+=2;
    fx(state,{type:"stamp",x:c.x,y:c.y,text:"コンテナ回収! 価値+2"});
    log(state,`${u.name} が漂流コンテナを回収 — 売却価値+2`,"good");
  }
}

function unlocks(state){
  const v=cargoValue(state);
  return UNLOCK_POOL.map(u=>({...u, name:CARD_DEFS[u.defId].name, got:v>=u.cost}));
}

// 展開遺物の生死(展開=売却価値の放棄。カードがlostなら遺物も消滅)
function deployedStatus(state){
  return state.run.deployed.map(id=>{
    const card=state.run.cards.find(c=>c.relicId===id);
    return { id, relic:RELIC_DEFS.find(r=>r.id===id), alive: !!card && card.loc!=="lost" };
  });
}

// ---------- WebAudio SE(依存ゼロの合成音) ----------
let _ac=null;
function sfx(kind, mul){
  if(META.muted) return;
  mul=mul||1;
  try{
    _ac=_ac||new (window.AudioContext||window.webkitAudioContext)();
    const t=_ac.currentTime;
    const def={
      click:[660,.05,"square",.04], pick:[520,.06,"triangle",.05],
      hit:[130,.12,"sawtooth",.09], boom:[55,.3,"square",.14],
      salvage:[880,.12,"triangle",.07], warp:[440,.25,"sine",.08],
      bad:[180,.2,"sawtooth",.08], good:[760,.1,"triangle",.06],
    }[kind]||[440,.08,"sine",.05];
    const [f0,dur,type,vol]=def;
    const f=f0*mul;
    const o=_ac.createOscillator(), g=_ac.createGain();
    o.type=type; o.frequency.setValueAtTime(f,t);
    if(kind==="boom"||kind==="hit") o.frequency.exponentialRampToValueAtTime(Math.max(30,f/3),t+dur);
    if(kind==="warp"||kind==="salvage") o.frequency.exponentialRampToValueAtTime(f*2,t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(g); g.connect(_ac.destination); o.start(t); o.stop(t+dur+.02);
  }catch(e){}
}

  } else {
    const d=ENEMY_DEFS[u.type];
    L.push(`<b>${d.icon} ${esc(u.name)}</b><br>HP ${u.hp}/${u.maxHp} / 攻撃${d.dmg}<br>${esc(d.desc)}`);
  }
  if(u.drift) L.push(`🌀 ドリフト中(${DIRS[u.drift].ch}): 次のラウンド開始時に1マス滑る`);

function flip(){
  // ラップ(縁越え)したユニットは盤面横断スライドではなく「端から退場→反対側から入場」を描く
  const wraps={};
  if(S&&S.enc&&S.enc.wrapFx) for(const w of S.enc.wrapFx.splice(0)) wraps[w.unitId]=w.dir;
  document.querySelectorAll(".unit[data-uid]").forEach(el=>{
    const uid=el.dataset.uid, r=el.getBoundingClientRect(), p=prevRects[uid];
    if(p){
      const dx=p.left-r.left, dy=p.top-r.top;
      if((dx||dy) && wraps[uid]) wrapJumpAnim(el,p,r,wraps[uid]);
      else if(dx||dy) el.animate([{transform:`translate(${dx}px,${dy}px)`},{transform:"none"}],{duration:340,easing:"ease-out"});
    }
    prevRects[uid]={left:r.left,top:r.top};
  });
}
// 世界一周の2相アニメ: 旧位置のゴーストが縁の外へ消え、本体が反対の縁の外から滑り込む
function wrapJumpAnim(el,p,r,dirKey){
  const d=DIRS[dirKey], cs=r.width*1.1;
  const g=el.cloneNode(true);
  g.style.cssText=`position:fixed;left:${p.left}px;top:${p.top}px;width:${r.width}px;height:${r.height}px;margin:0;z-index:90;pointer-events:none;`;
  document.body.appendChild(g);
  g.animate([{transform:"none",opacity:.95},{transform:`translate(${d.x*cs}px,${d.y*cs}px) scale(.7)`,opacity:0}],
    {duration:170,easing:"ease-in"}).onfinish=()=>g.remove();
  el.animate([
    {transform:`translate(${-d.x*cs}px,${-d.y*cs}px) scale(.7)`, opacity:0},
    {transform:`translate(${-d.x*cs}px,${-d.y*cs}px) scale(.7)`, opacity:0, offset:.4},
    {transform:"translate(0,0) scale(1)", opacity:1},
  ],{duration:430,easing:"ease-out"});
}

function cellCenter(x,y,board){
  const cell=document.querySelector(`[data-xy="${x},${y}"]`);
  if(!cell) return null;
  const cr=cell.getBoundingClientRect(), br=board.getBoundingClientRect();
  return {x:cr.left-br.left+cr.width/2, y:cr.top-br.top+cr.height/2};
}
function drainFx(){
  const enc=S&&S.enc; if(!enc||!enc.fxQueue||!enc.fxQueue.length) return;
  const board=document.getElementById("board");
  if(!board){ enc.fxQueue.length=0; return; }
  let layer=document.getElementById("fx");
  if(!layer){ layer=document.createElement("div"); layer.id="fx"; board.appendChild(layer); }
  let stampN=0; // 同時スタンプは縦にずらす(重なり潰れ防止)
  for(const ev of enc.fxQueue.splice(0)){
    if(ev.type==="hitflash"){
      const el=document.querySelector(`.unit[data-uid="${ev.unitId}"]`);
      if(el){ el.classList.remove("hitfx"); void el.offsetWidth; el.classList.add("hitfx"); }
      sfx("hit");
      continue;
    }
    if(ev.type==="shake"){
      if(!META.fxLite){ board.classList.remove("shake"); void board.offsetWidth; board.classList.add("shake"); }
      continue;
    }
    if(ev.type==="confetti"){
      if(META.fxLite) continue;
      for(let i=0;i<44;i++){
        const p=document.createElement("span"); p.className="fxconf";
        p.style.left=(Math.random()*100)+"%"; p.style.top="-8px";
        p.style.background=["var(--gold)","var(--cyan)","var(--red)","var(--green)","#fff"][i%5];
        p.style.animationDelay=(Math.random()*0.5)+"s";
        p.style.animationDuration=(1+Math.random()*0.9)+"s";
        layer.appendChild(p); setTimeout(()=>p.remove(),2600);
      }
      continue;
    }
    if(ev.type==="stamp"){
      const pos=cellCenter(ev.x,ev.y,board)||{x:board.clientWidth/2,y:board.clientHeight/2};
      const el=document.createElement("div"); el.className="fxstamp"+(ev.big?" big":"");
      el.textContent=ev.text; el.style.left=pos.x+"px"; el.style.top=(pos.y - 34*stampN++)+"px";
      layer.appendChild(el); setTimeout(()=>el.remove(),1100);
      sfx("salvage");
      continue;
    }
    if(ev.type==="flash"){
      for(const c of ev.cells){
        const cell=document.querySelector(`[data-xy="${c.x},${c.y}"]`);
        if(cell){ cell.classList.remove("firing"); void cell.offsetWidth; cell.classList.add("firing"); }
      }
      continue;
    }
    const pos=cellCenter(ev.x,ev.y,board); if(!pos) continue;
    if(ev.type==="float"){
      const el=document.createElement("div"); el.className="fxfloat "+(ev.cls||"");
      el.textContent=ev.text; el.style.left=pos.x+"px"; el.style.top=pos.y+"px";
      // ダメージ数字はダメージ量に比例して大きく(VS式)
      const m=/^-(\d+)$/.exec(ev.text);
      if(m) el.style.fontSize=(0.9+Math.min(3,+m[1])*0.28)+"rem";
      layer.appendChild(el); setTimeout(()=>el.remove(),1100);
    } else if(ev.type==="boom"){
      // 大物撃破はヒットストップ(90msだけ世界が止まる)
      if(ev.big && !META.fxLite){
        const st=document.createElement("style"); st.textContent="*{animation-play-state:paused!important}";
        document.head.appendChild(st); setTimeout(()=>st.remove(),90);
      }
      sfx("boom");
      const ring=document.createElement("span"); ring.className="fxring";
      ring.style.left=pos.x+"px"; ring.style.top=pos.y+"px";
      if(ev.big){ ring.style.borderColor="var(--red)"; }
      layer.appendChild(ring); setTimeout(()=>ring.remove(),520);
      const n=ev.big?14:8;
      for(let i=0;i<n;i++){
        const p=document.createElement("span"); p.className="fxp";
        const a=Math.random()*Math.PI*2, r=(ev.big?44:26)*(0.5+Math.random()*0.8);
        p.style.setProperty("--dx",Math.cos(a)*r+"px");
        p.style.setProperty("--dy",Math.sin(a)*r+"px");
        p.style.left=pos.x+"px"; p.style.top=pos.y+"px";
        if(Math.random()<0.5) p.style.background="var(--red)";
        layer.appendChild(p); setTimeout(()=>p.remove(),720);
      }
    }
  }
}

// ラウンド頭の慣性解決ビート(L-004)
function maybeRunDriftPhase(){
  if(!S.enc||S.enc.phase!=="drift"||UI.stepping||S.run.over) return;
  UI.stepping=true;
  (async()=>{
    try{
      const app=document.getElementById("app");
      const had=aliveUnits(S.enc).some(u=>u.drift);
      if(had) await sleep(300);
      LK.driftPhase(S);
      renderBattle(app); flip(); drainFx();
      if(had) await sleep(640);
    } finally {
      UI.stepping=false;
      render();
    }
  })();
}

function lifebarHtml(){
  const cards=S.run.cards;
  const segs=cards.map(c=>{
    const cls=c.loc==="lost"?"lost":(c.loc==="hand"?"hand":(c.loc==="discard"?"discard":"reserve"));
    return `<span class="seg ${cls}" data-tt="${attrEsc(`${esc(defOf(c).name)}<br>${{hand:"手札",discard:"消耗(休息で戻る)",reserve:"予備(この戦闘では使えない)",pool:"所持",lost:"<b>永久ロスト</b>"}[c.loc]||c.loc}`)}"></span>`;
  }).join("");
  return `<div class="lifebar" data-tt="${attrEsc("<b>寿命ゲージ</b>: カード=行動=命。<br>水色=手札 / 青=消耗・予備 / ×=永久ロスト。<br>全部失えば船は漂う棺。")}">${segs}</div>`;
}
function hudHtml(){
  const alive=aliveCards(S).length;
  const low=alive<=4?"flash":"";
  const cargo=S.run.cargo.map(id=>{const r=RELIC_DEFS.find(r=>r.id===id);return `<span class="cargochip" data-tt="${attrEsc(esc(r.desc)+"<br>売却価値 "+r.value+" — 帰還すれば確定")}">◆${esc(r.name)}</span>`;}).join("") || `<span class="muted">カーゴ: 空</span>`;
  const sd=shipDef(S.run.shipId);
  const liveShip=S.enc&&unitById(S.enc,"ship");
  const hullNow=liveShip?liveShip.hp:(S.run.shipHp??sd.hp);

  return `<div id="hud">
    <span class="zone">ZONE ${S.run.zone}/${CONFIG.ZONES} 《${esc(ZONE_NAMES[S.run.zone-1])}》</span>
    <span class="${hullCls}" style="color:${hullNow<=sd.hp/3?"var(--red)":"var(--txt)"}" data-tt="${attrEsc("旗艦の船体。<b>ゾーンをまたいで持ち越される</b>。回復は応急パッチ/補給/残骸修理のみ。0=ラン終了")}">🚀 ${hullNow}/${sd.hp}</span>
    <span class="${low}" data-tt="${attrEsc("残りカード総数=寿命。休息・被弾無効化・リープ燃料で減る。")}">🂠 ${alive}枚</span>
    ${(S.run.contracts||[]).length?`<span style="color:var(--amber)" data-tt="${attrEsc("航行契約: "+S.run.contracts.map(id=>{const c=CONTRACT_DEFS.find(x=>x.id===id);return c.icon+c.name+"("+c.desc+")";}).join("<br>")+"<br>スコア×"+contractMult(S.run).toFixed(1)+" / 帰還時 危険手当₢"+(S.run.contracts.length*2))}">☠${S.run.contracts.length} ×${contractMult(S.run).toFixed(1)}</span>`:""}
    ${lifebarHtml()}
    <div id="cargo">${cargo}</div>
  </div>`;
}

// ---------- battle: intent overlays ----------
function intentOverlays(){
  const cells={}; // key -> {threat:[{i,name,dmg}], charge:[...], move:[{i,icon,dirCh}]}
  if(!S.enc) return cells;
  const get=k=>cells[k]||(cells[k]={threat:[],charge:[],move:[]});
  S.enc.intents.forEach((it,i)=>{
    const u=unitById(S.enc,it.unitId); if(!u||!u.alive) return;
    for(const c of it.attackCells) get(c.x+","+c.y).threat.push({i:i+1,name:u.name,dmg:it.dmg,fire:it.fire});
    const chg=it.chargeCells || (u.charge&&!it.fire?u.charge:null);
    if(chg) for(const c of chg) get(c.x+","+c.y).charge.push({i:i+1,name:u.name});
    if(it.moveTo) get(it.moveTo.x+","+it.moveTo.y).move.push({i:i+1,icon:u.icon,dirCh:it.teleport?"✦":(it.moveDir?DIRS[it.moveDir].ch:"")});
    if(it.summon) get(it.summon.x+","+it.summon.y).move.push({i:i+1,icon:ENEMY_DEFS[it.summon.type||"mine"].icon,dirCh:"⊕"});
  });
  return cells;
}

function driftGhosts(){
  // uid -> 滑り先表示 {key, icon, ch, boom, tt}
  const out=[];
  if(!S.enc) return out;
  for(const u of aliveUnits(S.enc)){
    if(!u.drift) continue;
    const d=DIRS[u.drift];
    const nx=wrap(u.x+d.x), ny=wrap(u.y+d.y);
    const occ=unitAt(S.enc,nx,ny);
    if(occ){
      const ally=u.side==="player"&&occ.side==="player";
      out.push({key:nx+","+ny, icon:"💥", ch:d.ch, boom:true,
        tt:attrEsc(`<b>衝突予報</b>: ${esc(u.name)}が滑ってきて${esc(occ.name)}に${ally?"接触(味方同士: 停止のみ・無傷)":"激突 — <b>双方1ダメージ</b>"}`)});
    } else {
      const w=S.enc.well;
      const wellNote=(w && tdist({x:nx,y:ny},w)<=1 && !(nx===w.x&&ny===w.y))?"<br>⚠ 滑り先は重力渦の隣 — ラウンド頭、さらに渦へ引き込まれる":"";
      out.push({key:nx+","+ny, icon:u.icon, ch:d.ch, boom:false,
        tt:attrEsc(`🌀 <b>慣性</b>: ${esc(u.name)}は次のラウンド開始時、ここまで滑る(${d.ch})。<br>${u.side==="player"?"滑りたくなければ『制動』。":"これを読んで位置取りしろ。"}${wellNote}`)});
    }
  }
  return out;
}

function selectableCells(){
  // units値: "must"=一次(今選ぶべき) / "switch"=二次(任意の交代/予約) / "target"=攻撃対象(一次)
  const res={cells:{}, units:{}, dirs:false, blocked:{}};
  const enc=S.enc;
  if(!enc||enc.step!=="player") return res;
  // ユニット先行選択(タクティクスの文法): ペア未選択時も自軍ユニットはクリック可
  if(!enc.pending){
    for(const p of players(enc)) res.units[p.id]="switch";
    return res;
  }
  if(UI.actIdx===null) return res;
  if(enc.pending[UI.actIdx] && enc.pending[UI.actIdx].done) return res;
  const spec=actionSpec(S,UI.actIdx);
  if(UI.mode==="unit"){ for(const p of players(enc)) res.units[p.id]="must"; return res; }
  if(UI.mode!=="target") return res;
  const unit=unitById(enc,UI.unitId);
  if(!unit) return res;
  // 対象選択中でも操縦ユニットはワンクリックで切替可能(L-006)
  for(const p of players(enc)) if(p.id!==UI.unitId) res.units[p.id]="switch";
  switch(spec.kind){
    case "move": case "brake_move":
      for(const o of moveOptions(S,unit,spec)){
        const k=o.x+","+o.y;
        (res.cells[k]=res.cells[k]||{x:o.x,y:o.y,opts:[]}).opts.push(o);
      }
      for(const b of moveBlocked(S,unit,spec)){
        const k=b.x+","+b.y;
        if(!res.cells[k]) res.blocked[k]=b;
      }
      if(spec.kind==="brake_move") res.cells[unit.x+","+unit.y]={x:unit.x,y:unit.y,opts:[{x:unit.x,y:unit.y,dir:null,stay:true}]};
      break;
    case "warp":
      for(let x=0;x<CONFIG.GRID;x++)for(let y=0;y<CONFIG.GRID;y++) if(!unitAt(enc,x,y)) res.cells[x+","+y]={x,y,opts:[{x,y,dir:null}]};
      break;
    case "ram":
      for(const o of ramOptions(S,unit,spec)){
        const k=o.x+","+o.y;
        (res.cells[k]=res.cells[k]||{x:o.x,y:o.y,opts:[]}).opts.push(o);
      }
      break;
    case "setdrift":
      res.dirs=UI.multi.length===1;
      for(const t of attackTargets(S,unit,spec)) res.units[t.id]="target";
      break;
    case "attack": case "attack_line": case "push": case "pull": case "attack_multi":
      for(const t of attackTargets(S,unit,spec)) res.units[t.id]="target";
      break;
    default: break;
  }
  return res;
}

function forecastTT(unit,spec,t){
  // 攻撃/押し/引きの結果予測ツールチップ
  if(spec.kind==="attack"||spec.kind==="attack_line"||spec.kind==="attack_multi"||spec.kind==="attack_all"){
    const armor=(t.side!=="player"&&(ENEMY_DEFS[t.type]||{}).armor)?1:0;
    const eff=Math.max(0,effDamage(t,spec.dmg)-armor);
    const after=t.hp-eff;
    return attrEsc(`<b>予測</b>: 攻撃${spec.dmg}${t.shield?` − 🛡${t.shield}`:""}${armor?" − 🦀装甲1":""} → <b>${eff}ダメージ</b><br>HP ${t.hp} → ${Math.max(0,after)}${after<=0?' <span class="kill">撃破!</span>':""}${armor?"<br><span style='color:#9aa7c4'>物理(衝突/激突/爆発)なら装甲は素通し</span>":""}`);
  }
  if(spec.kind==="push"||spec.kind==="pull"){
    const dk = spec.kind==="push" ? dirBetweenUI(unit,t) : dirBetweenUI(t,unit);
    const n = spec.kind==="push" ? spec.n : Math.min(spec.n,Math.max(0,LK.tdist(unit,t)-1));
    const sim=predictForce(t,dk,n);
    let s=`<b>予測</b>: ${DIRS[dk].ch}へ${spec.kind==="push"?"押し出す":"引き寄せる"}`;
    if(spec.dmg) s+=` + ${spec.dmg}ダメージ`;
    if(sim.hit) s+=`<br>💥 途中で${esc(sim.hit)}に激突 — 双方1ダメージ`;
    else s+=`<br>移動後、${DIRS[dk].ch}向きのドリフト付与(次ラウンドさらに滑る)`;
    return attrEsc(s);
  }
  if(spec.kind==="setdrift") return attrEsc("対象を選んでから方向ボタンでドリフトを書き換える");
  return unitTT(t);
}
function dirBetweenUI(a,b){
  const dx=tdelta(a.x,b.x), dy=tdelta(a.y,b.y);
  if(Math.abs(dx)>=Math.abs(dy)) return dx>0?"right":(dx<0?"left":(dy>0?"down":"up"));
  return dy>0?"down":"up";
}
function predictForce(t,dirKey,n){
  const d=DIRS[dirKey]; let x=t.x,y=t.y;
  for(let i=0;i<n;i++){
    const nx=wrap(x+d.x), ny=wrap(y+d.y);
    const occ=unitAt(S.enc,nx,ny);
    if(occ) return {hit:occ.name,x,y};
    x=nx;y=ny;
  }
  return {hit:null,x,y};
}

function promptText(){
  const enc=S.enc;
  if(!enc) return "";
  if(enc.phase==="damage"||enc.phase==="rest"||enc.phase==="cleared") return "";
  if(enc.phase==="drift") return `<span style="color:var(--cyan)">🌀 慣性解決中…</span>`;
  if(enc.phase==="enemy"||enc.step==="enemy") return `<span style="color:var(--red)">敵の行動中…</span>`;
  if(enc.step!=="player") return "";
  if(enc.awaitEnd) return `行動完了 — <span class="sub">⟲でやり直すか、「敵ターンへ」で確定</span>`;
  if(!enc.pending){
    if(UI.selA) return `1枚目: 『${esc(defOf(cardByUid(S,UI.selA.uid)).name)}』の${UI.selA.half==="top"?"▲航行":"▼戦闘"} — <span class="sub">2枚目のカードを選べ(自動でもう片方の側を使う)</span>`;
    return `手札から2枚選べ — <span class="sub">1枚目はクリックした側(▲航行/▼戦闘)。先にユニットをクリックして操縦予約もできる</span>`;
  }
  if(UI.actIdx===null) return `下のボタンから、先に実行する行動を選べ <span class="sub">(順番は自由 / 同じユニットに両方使ってもいい)</span>`;
  const spec=actionSpec(S,UI.actIdx);
  if(UI.mode==="unit") return `『${esc(spec.label)}』— <span class="sub">どっちにやらせる? 🚀旗艦 か 🛰️随伴機 をクリック</span>`;
  if(UI.mode==="target"){
    if(spec.kind==="move") return `光るマスをクリックで移動(ちょうど${spec.n}マス) <span class="sub">操縦: ${esc((unitById(S.enc,UI.unitId)||{}).name||"")} — もう片方のユニットをクリックで交代 / ホバーで滑り先プレビュー</span>`;
    if(spec.kind==="brake_move") return `移動先をクリック(自分のマス=その場で制動) <span class="sub">制動済み: 移動後も滑らない</span>`;
    if(spec.kind==="warp") return `ワープ先の空きマスをクリック`;
    if(spec.kind==="ram") return `光る到達マスをクリック(突進) <span class="sub">(同じマスに2方向から届くときはマス上の矢印で向きを選ぶ)</span>`;
    if(spec.kind==="setdrift") return UI.multi.length?`方向ボタンでドリフトを書き換えろ`:`対象の敵をクリック`;
    if(spec.kind==="attack_multi") return `対象を最大${spec.count}体クリック → 確定`;
    if(spec.kind==="salvage") return `回収するカードを選べ`;
    return `赤く光る対象をクリック <span class="sub">(カーソルを乗せるとダメージ予測)</span>`;
  }
  return "";
}

    if(o&&o.move.length) cls+=" intent-move";
    let click="", hover="";
    const bk=sel.blocked&&sel.blocked[key];

      hover=`onmouseenter="H.pv(${x},${y},'${d0}')" onmouseleave="H.pvOff()"`;

    }
    let inner="";
    if(sc && sc.opts.length>1){
      inner+=`<span class="dirpick">${sc.opts.map(o=>
        `<button onclick="event.stopPropagation();H.cellClick(${x},${y},'${o.dir}')"
          onmouseenter="H.pv(${x},${y},'${o.dir}')" onmouseleave="H.pvOff()"
          data-tt="${attrEsc(`${DIRS[o.dir].ch}回りで進入 — ドリフトも${DIRS[o.dir].ch}向きになる`)}">${DIRS[o.dir].ch}</button>`).join("")}</span>`;
    }
    if(o&&o.move.length&&!u) inner+=o.move.map(m=>`<span class="mghost">${m.icon}<span class="mN">${m.i}${m.dirCh}</span></span>`).join("");
    for(const g of ghosts) if(g.key===key) inner+=`<span class="dghost ${g.boom?"boom":""}" >${g.icon}<i class="darr">${g.ch}</i></span>`;
    if(enc.container && !enc.container.taken && enc.container.x===x && enc.container.y===y){
      inner+=`<span class="container-item">📦</span>`;
      if(!cellTT.length) cellTT.push("📦 <b>漂流コンテナ</b>: ユニットが乗れば回収 — 売却価値+2(移動でもドリフトでも)。<b>敵を全滅させる前に</b>踏むこと — 掃討完了と同時に戦域は終わる");
    }
    if(enc.well && enc.well.x===x && enc.well.y===y){
      cls+=" gravwell";
      inner+=`<span class="wellswirl">🌀</span>`;

      <p class="muted">船体がHP1分軋む。選んだカードは永遠に失われる。</p>

        <div class="opts" style="justify-content:center;"><button class="primary lkbtn cue" onclick="H.afterClear()">凱旋する</button></div>

// 敵ターンを1体ずつアニメーション実行
function maybeRunEnemyPhase(){
  if(!S.enc||S.enc.phase!=="enemy"||UI.stepping||S.run.over) return;
  UI.stepping=true;
  (async()=>{
    try{
      let guard=0;
      const dl=META.fxLite?110:430, dl2=META.fxLite?90:400;
      while(S.enc && S.enc.step==="enemy" && !S.run.over && guard++<20){
        UI.acting=nextActingEnemy(S);
        if(UI.acting){ renderBattle(document.getElementById("app")); flip(); drainFx(); await sleep(dl); }
        const r=enemyStep(S);
        renderBattle(document.getElementById("app")); flip(); drainFx();
        if(r.done) break;
        await sleep(dl2);
      }
    } finally {
      UI.acting=null; UI.stepping=false;
      render();
    }
  })();
}

// ---------- summary ----------
function renderSummary(app){
  const run=S.run;
  const cv=cargoValue(S);
  const ct = run.captain || (run.captain = LK.captainType(S)); // 船長診断(ラン内で1回だけ計算)
  // メタ進行の確定(一度だけ): クレジット加算はボーナス分+遺物は売却/インストールの選択制
  if(!run.metaApplied && !run.tutorial){
    run.metaApplied=true;
    // ローカル戦績(トップ5)
    META.history=META.history||[];
    META.history.push({score:run.score??runScore(S), zone:run.zone, ship:run.shipId, asc:run.asc, win:run.win,
      risk:(run.contracts||[]).length, legend:!!run.bossKilled, type:ct.name, date:new Date().toISOString().slice(5,10)});
    META.types=META.types||{}; META.types[ct.id]=(META.types[ct.id]||0)+1; // 型図鑑(8種コンプ=リプレイ動機)
    META.history.sort((a,b)=>b.score-a.score);
    run.rank=META.history.findIndex(h=>h.score===(run.score??runScore(S)))+1;
    META.history=META.history.slice(0,5);
    META.runs++;
    META.bestZone=Math.max(META.bestZone,run.zone);
    run.score=runScore(S);
    if(run.score>META.bestScore){ META.bestScore=run.score; run.newBest=true; }
    if(run.win){
      META.wins++;
      META.credits+=run.bonusValue;
      // 危険手当: 契約1件につき₢2(実利は線形 — 名誉は称号で青天井、が荒れない鉄則)
      if((run.contracts||[]).length){ run.contractPay=run.contracts.length*2; META.credits+=run.contractPay; }
      META.bestValue=Math.max(META.bestValue,cv);
      // アセンション解放: 現在の挑戦レベルで勝つと次が開く
      if(run.asc>=META.maxAsc && META.maxAsc<3){ META.maxAsc=run.asc+1; run.ascUnlocked=ASC_DEFS[META.maxAsc].name; }
      sfx("good");
    } else {
      // 負けても拾うものはある(アンロックドリップ)
      run.lossCredits=lossCredits(S);
      META.credits+=run.lossCredits;
      sfx("bad");
    }
    saveMeta();
  }
  const reason={returned:"自発的帰還 — 生きて帰ることが勝利だ",ship:"船体大破 — 深淵はあんたを離さなかった",exhausted:"全カード喪失 — 燃料も、武器も、希望も尽きた"}[run.reason]||"";
  const legend=run.win&&run.bossKilled;
  const title=run.win?(legend?"伝 説":"帰 還"):"M I A";
  const color=legend?"var(--gold)":(run.win?"var(--green)":"var(--red)");
  const cargoRows=run.cargo.map(id=>{
    const r=RELIC_DEFS.find(x=>x.id===id);
    const st=UI.sold[id];
    const installed=META.installed.includes(id);
    let act;
    if(st==="sold") act=`<span style="color:var(--gold)">売却済 +₢${r.value}</span>`;
    else if(st==="installed") act=`<span style="color:var(--green)">インストール済(次ランから使用可)</span>`;
    else act=`<button onclick="H.sellRelic('${id}')" data-tt="${attrEsc("クレジット₢"+r.value+"に換える — カード解放の資金")}">売却 +₢${r.value}</button>
      <button onclick="H.installRelic('${id}')" ${installed?"disabled":""} data-tt="${attrEsc("遺物カード『"+esc(CARD_DEFS[r.card].name)+"』を恒久的にコレクションへ(死んでも残る)。売却益は放棄")}">${installed?"既に保有":"インストール"}</button>`;
    return `<tr><td>◆${esc(r.name)}</td><td>${r.rare?"★レア":"コモン"}</td><td>${act}</td></tr>`;
  }).join("");
  app.innerHTML=`
  <div style="max-width:720px;margin:40px auto;">
    <div class="bigtitle" style="color:${color}">${title}</div>
    <p style="text-align:center;color:var(--amber)">${esc(reason)}</p>
    <div class="panel" style="margin-top:18px;">
      <h3>ラン記録</h3>
      <div style="text-align:center; margin:6px 0 12px;">
        <div class="muted">SCORE — 挑戦: ${esc(ASC_DEFS[run.asc].name)} / ${esc(shipDef(run.shipId).name)}${(run.contracts||[]).length?` / <span style="color:var(--amber)">☠契約${run.contracts.length} ×${LK.contractMult(run).toFixed(1)}</span>`:""}</div>
        <div id="scoreNum" style="font-size:3.2rem; font-weight:900; color:var(--gold); text-shadow:0 0 24px #ffd70055; letter-spacing:.04em;">0</div>
        ${run.newBest?'<div class="bestburst">★ 自己ベスト更新! ★</div>':(run.rank&&run.rank<=5?`<div style="color:var(--cyan);font-weight:800;">🏆 歴代${run.rank}位</div>`:"")}
        ${run.win&&(run.contracts||[]).length>=3?`<div style="color:var(--gold);font-weight:800;">☠ 称号『${run.contracts.length>=5?"狂気の契約者":"鉄の契約者"}』 — 契約${run.contracts.length}件を生き延びた</div>`:""}
      </div>
      <table class="sum">
        <tr><td>到達ゾーン</td><td>ZONE ${run.zone} 《${esc(ZONE_NAMES[run.zone-1])}》</td></tr>
        <tr><td>総ラウンド</td><td>${run.totalRounds}</td></tr>
        <tr><td>物理キル</td><td>${run.physKills||0}回 ${run.physKills>=3?"💥":""}</td></tr>
        <tr><td>休息/被弾/燃料で失った</td><td>${run.restCount} / ${run.burnCount} / ${run.fuelBurnt}枚</td></tr>
      </table>
      ${run.ascUnlocked?`<p style="color:var(--amber)">🔓 新たな挑戦『${esc(run.ascUnlocked)}』が解放された!</p>`:""}
    </div>
    ${run.tutorial?"":`
    <div class="panel" style="margin-top:12px; border-color:var(--gold); background:linear-gradient(180deg,#141022,#0e1322);">
      <h3 style="color:var(--gold)">🧭 船長診断</h3>
      <div style="text-align:center; margin:10px 0 6px;">
        <div style="font-size:2.5rem; font-weight:900; color:var(--gold); letter-spacing:.12em; text-shadow:0 0 18px #ffd70044;">『${esc(ct.name)}』</div>
        <div style="color:var(--cyan); font-weight:800; font-size:1.05rem; margin-top:2px;">— ${esc(ct.title)} —</div>
        <div class="muted" style="margin-top:6px; font-size:.82rem;">推定艦隊比 ${ct.rarity}%
          ${ct.subs.map(s=>`<span style="border:1px solid var(--gold); border-radius:6px; padding:1px 8px; margin-left:5px; color:var(--gold);">${esc(s)}</span>`).join("")}</div>
      </div>
      <p style="line-height:1.9; margin:8px 4px;">
        <span style="color:var(--amber)">▸ ${esc(ct.jab)}</span><br>
        ${esc(ct.praise)}<br>
        <span class="muted">${esc(ct.weak)}</span>
      </p>
      <div class="muted" style="text-align:center; font-size:.8rem; margin-bottom:8px;">
        こぶし: <b style="color:var(--txt)">${ct.axes.F?"物理":"砲撃"}</b> ／ リスク: <b style="color:var(--txt)">${ct.axes.R?"山師":"堅実"}</b> ／ 判断: <b style="color:var(--txt)">${ct.axes.C?"計画":"即興"}</b>
        　<span data-tt="${attrEsc("8種の型図鑑: "+Object.keys(CAPTAIN_TYPES).map(k=>((META.types||{})[k]?"●":"○")+CAPTAIN_TYPES[k].name).join(" "))}">図鑑 ${Object.keys(META.types||{}).length}/8</span>
      </div>
      <div class="opts" style="justify-content:center;">
        <button class="primary cue" onclick="H.shareX()" data-tt="${attrEsc("Xの投稿画面が開く(診断結果+スコア+ゲームURL入り)")}">𝕏 結果をポスト</button>
        <button onclick="H.saveCard()" data-tt="${attrEsc("1200×675の診断カード画像をダウンロード — 投稿に添付できる")}">🖼 カード画像を保存</button>
      </div>
    </div>
    ${(()=>{const ch=LK.voyageChronicle(S); if(!ch.length) return "";
      return `<div class="panel" style="margin-top:12px;">
        <h3>📜 航海記録</h3>
        <div style="line-height:1.9; font-size:.86rem;">${ch.map(l=>l.startsWith("—")
          ?`<div style="color:var(--amber); font-weight:800; margin-top:4px;">${esc(l)}</div>`
          :`<div class="${l.startsWith("★")?"":"muted"}">${esc(l)}</div>`).join("")}</div>
      </div>`;})()}`}
    ${run.win?`
    <div class="panel" style="margin-top:12px;">
      <h3>精算 — 所持クレジット: <b style="color:var(--gold)">₢${META.credits}</b>${run.bonusValue?` (回収ボーナス+₢${run.bonusValue}込み)`:""}${run.contractPay?` <span style="color:var(--amber)">(危険手当+₢${run.contractPay})</span>`:""}</h3>
      <p class="muted">遺物は<b>売却</b>(クレジット=格納庫でカード解放)か<b>インストール</b>(遺物カードを恒久コレクションへ)か。両方は取れない。</p>
      <table class="sum">${cargoRows||"<tr><td class='muted'>封印遺物なし — 命だけ持って帰った。それも才能だ。</td></tr>"}</table>
      ${(()=>{const ds=deployedStatus(S); if(!ds.length) return "";
        const ok=ds.filter(d=>d.alive), ng=ds.filter(d=>!d.alive);
        return `${ok.length?`<p class="muted">展開して生還した遺物: ${ok.map(d=>{
          const inst=META.installed.includes(d.id)||UI.sold[d.id]==="installed";
          return `◆${esc(d.relic.name)} ${inst?'<span style="color:var(--green)">インストール済</span>':`<button onclick="H.installRelic('${d.id}')" data-tt="${attrEsc("使い込んだ遺物を母港で完全修復し、恒久コレクションへ(売却益はない)")}">インストール</button>`}`;
        }).join(" / ")}</p>`:""}
        ${ng.length?`<p class="muted" style="color:var(--red)">永遠に失われた遺物: ${ng.map(d=>"✝"+esc(d.relic.name)+"(価値"+d.relic.value+"相当)").join("、")} — 使った力の代金だ。</p>`:""}`;})()}
      <p class="muted" style="margin-top:6px;">クレジットの使い道は <b>格納庫</b> で(タイトル画面から)。</p>
    </div>`:`
    <div class="panel" style="margin-top:12px;">
      <h3>失われたもの</h3>
      <p class="muted">カーゴの遺物(価値${cv})は星間に散った。<br>
      ${run.lossCredits?`それでも回収班が残骸から <b style="color:var(--gold)">₢${run.lossCredits}</b> ぶん拾い上げた — 失敗ランも無駄ではない。`:""}
      格納庫の資産(₢${META.credits}とコレクション)は次のあんたが使う。</p>
    </div>`}
    <div style="text-align:center;margin-top:18px;">
      <button class="primary cue" onclick="H.restart()">もう一度跳ぶ</button>
      <button onclick="H.toTitle()">タイトルへ</button>
    </div>
  </div>`;
  // スコアのカウントアップ祝福(Balatroの教訓: 数字は祝え)
  const el=document.getElementById("scoreNum");
  if(el){
    const target=run.score||0, t0=performance.now(), dur=900;
    (function tick(now){
      const p=Math.min(1,(now-t0)/dur);
      el.textContent=Math.round(target*(1-Math.pow(1-p,3)));
      if(p<1) requestAnimationFrame(tick);
      else if(run.newBest) sfx("salvage");
    })(t0);
  }
}

// ---------- handlers ----------
const H={
  begin(){
    sfx("click");
    S.screen="shipselect"; render();
  },
  tutorial(){
    S=newRun(7777, null, {tutorial:true});
    UI.hintsSeen=true; resetUI();
    startEncounter(S, null);
    // 教習用の固定配置: 敵2+機雷1を所定位置へ
    const es=enemies(S.enc);
    if(es[0]){es[0].x=3;es[0].y=1;} if(es[1]){es[1].x=3;es[1].y=3;}
    const mine=S.enc.units.find(u=>u.type==="mine");
    if(mine){ mine.x=2; mine.y=2; }
    S.enc.intents=[]; LK.pump(S); // 配置替え後に意図を引き直す
    S.enc.step="intents"; LK.pump(S);
    S.screen="battle"; sfx("warp"); render();
  },
  pickShip(id){
    META.lastShip=id; saveMeta();
    const coll=collectionDefIds(id);
    if(coll.length>10){ S.screen="deckbuild"; UI.deckSel=[]; render(); return; }
    S=newRun(S.seed, coll.slice(0,10), {asc:META.ascension, shipId:id});
    S.screen="loadout"; resetUI(); UI.loadout=[]; UI.loadoutTouched=false; render();
  },
  buyShip(id,cost){
    if(META.credits<cost||META.ships.includes(id)) return;
    META.credits-=cost; META.ships.push(id); saveMeta(); sfx("salvage"); render();
  },
  cycleAsc(){
    META.ascension=(META.ascension+1)%(META.maxAsc+1||1);
    saveMeta(); sfx("click"); render();
  },
  upgradePick(uid){ const r=LK.applyUpgrade(S,uid); if(!r.ok) UI.msg=r.msg; UI.campPick=false; sfx("good"); render(); },
  upgradeSkip(){ LK.applyUpgrade(S,null); UI.campPick=false; render(); },
  campUpgrade(){ UI.campPick=true; sfx("click"); render(); },
  campBack(){ UI.campPick=false; render(); },
  campResupply(){ LK.applyResupply(S); sfx("good"); render(); },
  campScrap(){ LK.applyScrapLoot(S); sfx("salvage"); render(); },
  crashRepair(){ const r=LK.crashSalvageRepair(S); if(!r.ok) UI.msg=r.msg; UI.salvageReady=false; render(); },
  bossEngage(){ S.enc.bossIntro=false; sfx("bad"); render(); },
  hangar(){ S.screen="hangar"; render(); },
  backTitle(){ S.screen="title"; UI.deckSel=[]; render(); },
  toggleMute(){ META.muted=!META.muted; saveMeta(); render(); },
  toggleTilt(){ META.tilt=!META.tilt; saveMeta(); render(); },
  toggleFxLite(){ META.fxLite=!META.fxLite; saveMeta(); render(); },
  buyUnlock(defId,cost){
    if(META.credits<cost||META.unlocked.includes(defId)) return;
    META.credits-=cost; META.unlocked.push(defId); saveMeta(); sfx("salvage"); render();
  },
  toggleDeck(i){
    if(UI.deckSel.includes(i)) UI.deckSel=UI.deckSel.filter(x=>x!==i);
    else if(UI.deckSel.length<10) UI.deckSel.push(i);
    sfx("pick"); render();
  },
  toggleContract(id){
    if(UI.contractSel.includes(id)) UI.contractSel=UI.contractSel.filter(x=>x!==id);
    else UI.contractSel.push(id);
    sfx("pick"); render();
  },
  confirmDeck(){
    const coll=collectionDefIds(META.lastShip);
    META.lastDeck=[...UI.deckSel]; META.lastContracts=[...UI.contractSel]; saveMeta();
    S=newRun(S.seed, UI.deckSel.map(i=>coll[i]), {asc:META.ascension, shipId:META.lastShip, contracts:UI.contractSel});
    S.screen="loadout"; resetUI(); UI.loadout=[]; UI.loadoutTouched=false; UI.deckSel=[]; UI.contractSel=[];
    render();
  },
  // ---- ゾーンイベント ----
  eventSkip(){ S.pendingEvent=null; S.screen="loadout"; render(); },
  eventWreckOpen(){
    const lost=S.run.cards.filter(c=>c.loc==="lost");
    if(!lost.length){ LK.log(S,"中は空だった。骨折り損だ。"); S.pendingEvent=null; S.screen="loadout"; render(); return; }
    S.pendingEvent={type:"wreckpick"};
    render();
  },
  eventWreckPick(uid){
    const c=LK.cardByUid(S,uid);
    if(c&&c.loc==="lost"){ c.loc="pool"; LK.log(S,`漂流船から『${LK.defOf(c).name}』を取り戻した!`,"good"); }
    S.run.shipEventDmg=(S.run.shipEventDmg||0)+1; // 次の戦域開始時に旗艦HP-1
    S.pendingEvent=null; S.screen="loadout"; sfx("salvage"); render();
  },
  eventGraveDig(){
    if(S.rand()<0.6){
      const pool=RELIC_DEFS.filter(r=>!r.rare&&!S.run.relicsSeen.includes(r.id));
      const r=pool.length?pool[Math.floor(S.rand()*pool.length)]:null;
      if(r){ S.run.relicsSeen.push(r.id); S.run.cargo.push(r.id); LK.log(S,`墓標の中から『${r.name}』を見つけた(封印済みとしてカーゴへ)`,"good"); }
      else { S.run.bonusValue+=2; LK.log(S,"値打ち物の破片を回収 — 価値+2","good"); }
      sfx("salvage");
    } else {
      S.run.extraMiner=true;
      LK.log(S,"墓標が警報を放った…何かがこちらへ向かっている","bad");
      sfx("bad");
    }
    S.pendingEvent=null; S.screen="loadout"; render();
  },
  eventGravePray(){
    S.run.freeChooseRest=(S.run.freeChooseRest||0)+1;
    LK.log(S,"祈りを捧げた。次の休息では心静かに選べるだろう。","good");
    S.pendingEvent=null; S.screen="loadout"; render();
  },
  toggleLoad(uid){
    const want=Math.min(CONFIG.HAND,cardsIn(S,"pool").length);
    UI.loadoutTouched=true;
    if(UI.loadout.includes(uid)) UI.loadout=UI.loadout.filter(u=>u!==uid);
    else if(UI.loadout.length<want) UI.loadout.push(uid);
    render();
  },
  autoLoad(){ UI.loadoutTouched=false; render(); },
  confirmLoad(){
    for(const k in prevRects) delete prevRects[k];
    S.run.lastLoadout=[...UI.loadout];
    startEncounter(S,UI.loadout);
    S.screen="battle"; resetUI(); UI.loadout=[]; UI.loadoutTouched=false;
    render();
  },
  halfClick(uid,half){
    UI.msg="";
    if(S.enc.awaitEnd) return;
    if(!UI.selA){ UI.selA={uid,half}; }
    else if(UI.selA.uid===uid){ UI.selA= UI.selA.half===half?null:{uid,half}; }
    else {
      const r=selectPair(S,UI.selA.uid,UI.selA.half,uid);
      if(!r.ok){ UI.msg=r.msg; } else { UI.selA=null; autoAdvance(); }
    }
    render();
  },
  cancelSel(){ UI.selA=null; UI.msg=""; render(); },
  unpair(){
    const enc=S.enc;
    if(enc.pending && !enc.pending.some(p=>p.done)){ enc.pending=null; resetUI(); sfx("click"); }
    render();
  },
  chipClick(i){
    if(!S.enc.pending||S.enc.pending[i].done) return;
    enterAction(i);
    const spec=actionSpec(S,i);
    if(spec.kind==="salvage"&&!cardsIn(S,"discard").length) UI.msg="消耗パイルが空だ — 不発にするしかない";
    render();
  },
  backChip(){ UI.actIdx=null; UI.mode="idle"; UI.multi=[]; UI.msg=""; render(); },
  unitClick(id){
    UI.msg="";
    const enc=S.enc;
    // ユニット先行選択: ペア未選択時に自軍をクリック → 次の操縦の既定にする
    if(!enc.pending && enc.step==="player"){
      const u=unitById(enc,id);
      if(u&&u.side==="player"&&u.alive){
        UI.lastUnit=id;
        fx(S,{type:"float",x:u.x,y:u.y,text:"操縦予約",cls:"good"});
        sfx("pick"); render();
      }
      return;
    }
    if(UI.mode==="unit"){
      const u=unitById(enc,id);
      if(u.side!=="player") return;
      UI.unitId=id;
      const spec=actionSpec(S,UI.actIdx);
      if(["heal","shield","attack_all","pull_all","spawnhaz"].includes(spec.kind)){
        const r=execAction(S,UI.actIdx,{unitId:id});
        if(!r.ok){ UI.msg=r.msg+"(不発も選べる)"; UI.mode="target"; }
        else afterAct();
        render(); return;
      }
      if(spec.kind==="salvage"){ UI.mode="salvage"; render(); return; }
      UI.mode="target"; render(); return;
    }
    if(UI.mode==="target"){
      const cu=unitById(enc,id);
      if(cu&&cu.side==="player"){ UI.unitId=id; UI.multi=[]; render(); return; } // 操縦ユニット切替
      const spec=actionSpec(S,UI.actIdx);
      if(spec.kind==="attack_multi"){
        if(!UI.multi.includes(id)) UI.multi.push(id);
        if(UI.multi.length>=spec.count) H.multiConfirm(); else render();
        return;
      }
      if(spec.kind==="setdrift"){ UI.multi=[id]; render(); return; }
      const r=execAction(S,UI.actIdx,{unitId:UI.unitId,targetId:id});
      if(!r.ok){ UI.msg=r.msg; } else afterAct();
      render();
    }
  },
  cellClick(x,y,dir){
    UI.msg="";
    const r=execAction(S,UI.actIdx,{unitId:UI.unitId,cell:{x,y},dir:dir||undefined});
    if(!r.ok){ UI.msg=r.msg; } else afterAct();
    render();
  },
  dirClick(k){
    UI.msg="";
    const spec=actionSpec(S,UI.actIdx);
    let params={unitId:UI.unitId,dir:k};
    if(spec.kind==="setdrift"){ if(!UI.multi.length){UI.msg="先に対象を選べ";render();return;} params.targetId=UI.multi[0]; }
    const r=execAction(S,UI.actIdx,params);
    if(!r.ok){ UI.msg=r.msg; } else afterAct();
    render();
  },
  multiConfirm(){
    const r=execAction(S,UI.actIdx,{unitId:UI.unitId,targetIds:UI.multi});
    if(!r.ok){ UI.msg=r.msg; } else afterAct();
    render();
  },
  salvagePick(uid){
    const r=execAction(S,UI.actIdx,{unitId:UI.unitId,salvageUid:uid});
    if(!r.ok){ UI.msg=r.msg; } else afterAct();
    render();
  },
  fizzle(){ fizzleAction(S,UI.actIdx); afterAct(); render(); },
  undo(){ const r=undoTurn(S); if(!r.ok) UI.msg=r.msg; resetUI(); render(); },
  endTurn(){ commitTurn(S); resetUI(); render(); },
  dmgHp(){ resolveDamage(S,"hp"); render(); },
  dmgBurn(uid){ const r=resolveDamage(S,"burn",uid); if(!r.ok) UI.msg=r.msg; render(); },
  restRandom(){ UI.restChoosing=false; const r=doRest(S,"random"); if(!r.ok) UI.msg=r.msg; render(); },
  restChoose(){ UI.restChoosing=true; render(); },
  restBack(){ UI.restChoosing=false; render(); },
  restLose(uid){ const r=doRest(S,"choose",uid); if(!r.ok){ UI.msg=r.msg; } else UI.restChoosing=false; render(); },
  crashPick(uid){ const r=crashSalvagePick(S,uid); if(!r.ok) UI.msg=r.msg; UI.salvageReady=false; render(); },
  afterClear(){ finishEncounter(S); resetUI(); UI.loadoutTouched=false; render(); },
  route(r){ chooseRoute(S,r); resetUI(); UI.loadoutTouched=false; render(); },
  relic(c){ resolveRelic(S,c); render(); },
  keepAsk(){
    const cv=cargoValue(S);
    const el=document.getElementById("lkExtra");
    const tease= S.run.zone<CONFIG.ZONES && S.run.cargo.length
      ? `カーゴの${esc(RELIC_DEFS.find(r=>r.id===S.run.cargo[S.run.cargo.length-1]).name)}、次のゾーンならもっと見つかるけど?`
      : "本当に帰る? 深淵はまだ、何かを隠しているよ。";
    el.innerHTML=`<div style="text-align:center;margin-top:12px;">
      <p style="color:var(--amber)">${S.run.zone>=CONFIG.ZONES?"最深部からの生還だ。胸を張れ。":tease}</p>
      <button class="primary" onclick="H.keepGo()">それでも帰る — 価値${cv}を確定</button></div>`;
  },
  keepGo(){ doKeep(S); render(); },
  leapAsk(){
    UI.fuelSel=[];
    H.renderFuel();
  },
  renderFuel(){
    const el=document.getElementById("lkExtra");
    if(!el) return;
    const need=fuelCost(S);
    const cards=aliveCards(S).filter(c=>!UI.fuelSel.includes(c.uid));
    el.innerHTML=`<div style="margin-top:12px;">
      <p style="color:var(--amber);text-align:center;">燃料にするカードを選べ(${UI.fuelSel.length}/${need}) — 永遠に失われる。${need>1?"<b>深淵IIの代償: 2枚</b>":""}</p>
      ${cardPickFaces(cards,"H.fuelPick")}</div>`;
  },
  fuelPick(uid){
    UI.fuelSel.push(uid);
    if(UI.fuelSel.length>=fuelCost(S)){
      const r=doLeap(S,UI.fuelSel);
      UI.fuelSel=[];
      if(r.ok){
        resetUI(); sfx("warp");
        if(!S.run.over && S.rand()<0.35){
          S.pendingEvent={type: S.rand()<0.5?"wreck":"grave"};
          S.screen="event";
        }
      }
      render();
    } else H.renderFuel();
  },
  restart(){ startGame(); H.begin(); },
  toTitle(){ startGame(); },
  // ---- 共有(なばて公開ループ: 診断→X→流入→診断) ----
  shareX(){
    const run=S.run, ct=run.captain;
    if(!ct) return;
    const text=`【船長診断】私は『${ct.name}』 — ${ct.title}。SCORE ${run.score??LK.runScore(S)} / ZONE ${run.zone}${run.bossKilled?" / 墓所制圧👑":""}${ct.subs.length?` ${ct.subs[0]}`:""}`;
    const url=`${SHARE_URL}?r=${encResult({n:ct.name,t:ct.title,s:run.score??LK.runScore(S),z:run.zone,w:run.win?1:0,b:run.bossKilled?1:0})}`;
    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}&hashtags=LeapOrKeep`,"_blank");
  },
  saveCard(){
    const run=S.run, ct=run.captain;
    if(!ct) return;
    drawShareCard(ct,run).toBlob(b=>{
      const a=document.createElement("a");
      a.href=URL.createObjectURL(b);
      a.download=`leap-or-keep_${ct.id}.png`;
      a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),5000);
    },"image/png");
    sfx("good");
  },
  sellRelic(id){
    if(UI.sold[id]) return;
    const r=RELIC_DEFS.find(x=>x.id===id);
    UI.sold[id]="sold"; META.credits+=r.value; saveMeta();
    UI.sellN=(UI.sellN||0)+1; sfx("salvage", 1+UI.sellN*0.18); // 連続売却でピッチ上昇(コンボ感)
    render();
  },
  installRelic(id){
    if(UI.sold[id]==="installed"||META.installed.includes(id)) return;
    UI.sold[id]="installed"; META.installed.push(id); saveMeta(); sfx("good"); render();
  },
  dismissHints(){ UI.hintsSeen=true; render(); },
  hl(i,on){
    const it=S.enc&&S.enc.intents[i];
    if(!it) return;
    const u=unitById(S.enc,it.unitId);
    const keys=[...it.attackCells.map(c=>c.x+","+c.y), ...(it.chargeCells||[]).map(c=>c.x+","+c.y)];
    if(it.moveTo) keys.push(it.moveTo.x+","+it.moveTo.y);
    for(const k of keys){
      const el=document.querySelector(`[data-xy="${k}"]`);
      if(el) el.classList.toggle("hl",on);
    }
    if(u&&u.alive){
      const el=document.querySelector(`.unit[data-uid="${u.id}"]`);
      if(el) el.classList.toggle("hl",on);
    }
  },
  pv(x,y,dir){
    H.pvOff();
    const enc=S.enc;
    if(!enc||!enc.pending||UI.actIdx===null) return;
    const spec=actionSpec(S,UI.actIdx);
    const u=unitById(enc,UI.unitId);
    if(!u) return;
    const cell=document.querySelector(`[data-xy="${x},${y}"]`);
    if(!cell) return;
    const g=document.createElement("span"); g.className="pvghost";
    g.innerHTML=unitSvg(u); g.firstElementChild&&g.firstElementChild.setAttribute("style","width:44px;height:44px");
    cell.appendChild(g); pvEls.push(g);
    if(spec.kind==="move"){
      const opts=moveOptions(S,u,spec);
      const o= dir ? opts.find(o=>o.x===x&&o.y===y&&o.dir===dir) : opts.find(o=>o.x===x&&o.y===y);
      if(o){
        const d=DIRS[o.dir];
        const dx=wrap(x+d.x), dy=wrap(y+d.y);
        const c2=document.querySelector(`[data-xy="${dx},${dy}"]`);
        if(c2){
          const occ=unitAt(enc,dx,dy);
          const g2=document.createElement("span"); g2.className="pvghost2";
          g2.innerHTML=(occ?"💥":"⬡")+`<i>${d.ch}</i>`;
          c2.appendChild(g2); pvEls.push(g2);
        }
      }
    } else if(spec.kind==="brake_move"||spec.kind==="warp"){
      const b=document.createElement("span"); b.className="pvbrake"; b.textContent="滑らない";
      cell.appendChild(b); pvEls.push(b);
    }
  },
  pvOff(){ for(const el of pvEls){ try{el.remove();}catch(e){} } pvEls=[]; },
  hlU(uid,on){
    const i=S.enc?S.enc.intents.findIndex(it=>it.unitId===uid):-1;
    if(i>=0) H.hl(i,on);
  },
};

function afterAct(){
  if(UI.unitId) UI.lastUnit=UI.unitId;
  UI.multi=[];
  autoAdvance();
}

// 次の未実行アクションへ自動進行+直前ユニットを既定操縦対象に(L-006 クリック削減)
function autoAdvance(){
  const enc=S.enc;
  if(!enc||!enc.pending){ UI.actIdx=null; UI.unitId=null; UI.mode="idle"; return; }
  const idx=enc.pending.findIndex(p=>!p.done);
  if(idx<0){ UI.actIdx=null; UI.mode="idle"; return; }
  enterAction(idx);
}
function enterAction(idx){
  const enc=S.enc;
  UI.actIdx=idx; UI.multi=[]; UI.msg="";
  const spec=actionSpec(S,idx);
  if(["heal","shield","attack_all","pull_all","salvage","spawnhaz"].includes(spec.kind)){
    // 効果先(誰に効くか)の明示クリックが必要なアクション
    UI.unitId=null; UI.mode="unit"; return;
  }
  let u=unitById(enc,UI.lastUnit||"ship");
  if(!u||!u.alive||u.side!=="player") u=players(enc)[0];
  UI.unitId=u?u.id:null;
  UI.mode=UI.unitId?"target":"unit";
}

// キーボード: Enter/Space=敵ターンへ確定, Esc=戻る, Ctrl+Z=ターンやり直し(L-014 標準操作の約束事)
document.addEventListener("keydown",e=>{
  if(!S||S.screen!=="battle"||!S.enc) return;
  if((e.key==="Enter"||e.key===" ") && S.enc.awaitEnd){ e.preventDefault(); H.endTurn(); }
  else if(e.key==="Escape"){ cancelOneLevel(); }
  else if((e.key==="z"||e.key==="Z")&&(e.ctrlKey||e.metaKey)){ if(LK.canUndo(S)){ e.preventDefault(); H.undo(); } }
});
// 右クリック=1段階キャンセル(L-014)
document.addEventListener("contextmenu",e=>{
  if(!S||S.screen!=="battle"||!S.enc) return;
  e.preventDefault();
  cancelOneLevel();
});
function cancelOneLevel(){
  if(UI.restChoosing){ H.restBack(); return; }
  if(UI.actIdx!==null){ H.backChip(); return; }
  if(S.enc.pending && !S.enc.pending.some(p=>p.done)){ H.unpair(); return; }
  if(UI.selA){ H.cancelSel(); return; }
}

// ---------- tooltip engine ----------
(function(){
  const tt=document.getElementById("tt");
  let visible=false;
  function position(e){
    const pad=14;
    let x=e.clientX+pad, y=e.clientY+pad;
    const r=tt.getBoundingClientRect();
    if(x+r.width>innerWidth-8) x=Math.max(4,e.clientX-r.width-pad);
    if(y+r.height>innerHeight-8) y=Math.max(4,e.clientY-r.height-pad);
    tt.style.left=x+"px"; tt.style.top=y+"px";
  }
  document.addEventListener("mouseover",e=>{
    const el=e.target.closest&&e.target.closest("[data-tt]");
    if(el){ tt.innerHTML=el.dataset.tt; tt.style.display="block"; visible=true; position(e); }
    else if(visible){ tt.style.display="none"; visible=false; }
  });
  document.addEventListener("mousemove",e=>{ if(visible) position(e); });
})();

// boot
for(const sid of ["stars1","stars2","zonebg","titlehero","vig"]){ const d=document.createElement("div"); d.id=sid; document.body.prepend(d); }
// 大判アートの存在確認(無ければ層は透明のまま)
const ART={};
function artBg(el, name){
  if(ART[name]===false){ el.classList.remove("on"); return; }
  if(ART[name]===true){ el.style.backgroundImage=`url(art/${name}.webp)`; el.classList.add("on"); return; }
  const img=new Image();
  img.onload=()=>{ ART[name]=true; el.style.backgroundImage=`url(art/${name}.webp)`; el.classList.add("on"); };
  img.onerror=()=>{ ART[name]=false; };
  img.src=`art/${name}.webp`;
}
function updateArtLayers(){
  const hero=document.getElementById("titlehero"), zone=document.getElementById("zonebg");
  hero.classList.remove("on"); zone.classList.remove("on");
  if(!S) return;
  if(S.screen==="title"||S.screen==="shipselect"||S.screen==="hangar"||S.screen==="summary") artBg(hero,"title-hero");
  else if(S.screen==="battle"||S.screen==="loadout") artBg(zone,"zone"+S.run.zone);
}
// ---- 共有カード(1200×675 = X推奨OGPサイズ。スクショ前提デザイン) ----
const SHARE_URL="https://salmonellasarduri.github.io/Leap-or-Keep/";
function encResult(o){ return btoa(unescape(encodeURIComponent(JSON.stringify(o)))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function decResult(s){ try{ return JSON.parse(decodeURIComponent(escape(atob(s.replace(/-/g,"+").replace(/_/g,"/"))))); }catch(e){ return null; } }
function drawShareCard(ct,run){
  const W=1200,H2=675, cv=document.createElement("canvas");
  cv.width=W; cv.height=H2;
  const g=cv.getContext("2d");
  const bg=g.createLinearGradient(0,0,0,H2);
  bg.addColorStop(0,"#0a0f1c"); bg.addColorStop(.6,"#10142a"); bg.addColorStop(1,"#141022");
  g.fillStyle=bg; g.fillRect(0,0,W,H2);
  for(let i=0;i<140;i++){ // 星空
    g.fillStyle=`rgba(${180+Math.random()*75|0},${200+Math.random()*55|0},255,${.15+Math.random()*.6})`;
    g.beginPath(); g.arc(Math.random()*W,Math.random()*H2,Math.random()*1.6+.3,0,7); g.fill();
  }
  g.strokeStyle="#39d0ff44"; g.lineWidth=2; g.strokeRect(14,14,W-28,H2-28);
  g.textAlign="center";
  g.fillStyle="#39d0ff"; g.font="700 30px sans-serif";
  g.fillText("LEAP OR KEEP — 船長診断",W/2,76);
  g.fillStyle="#ffd24a"; g.font="900 120px sans-serif";
  g.shadowColor="#ffd24a55"; g.shadowBlur=30;
  g.fillText(`『${ct.name}』`,W/2,250);
  g.shadowBlur=0;
  g.fillStyle="#7fd4ff"; g.font="800 40px sans-serif";
  g.fillText(`— ${ct.title} —`,W/2,320);
  g.fillStyle="#ffb347"; g.font="600 30px sans-serif";
  g.fillText(ct.jab,W/2,388);
  g.fillStyle="#e8edf7"; g.font="700 34px sans-serif";
  const sd=shipDef(run.shipId);
  g.fillText(`SCORE ${run.score??0}　/　ZONE ${run.zone}　/　${sd.name}${run.bossKilled?"　/　墓所制圧👑":""}`,W/2,470);
  if(ct.subs.length){ g.fillStyle="#ffd24a"; g.font="600 28px sans-serif"; g.fillText(ct.subs.join("　"),W/2,524); }
  g.fillStyle="#9aa7c4"; g.font="600 26px sans-serif";
  g.fillText(`推定艦隊比 ${ct.rarity}%　#LeapOrKeep`,W/2,586);
  g.fillStyle="#56e39f"; g.font="700 26px sans-serif";
  g.fillText(SHARE_URL.replace("https://",""),W/2,632);
  return cv;
}
